# CodeRabbit configuration. https://docs.coderabbit.ai/getting-started/configure-coderabbit
# Read from the default branch (master); applies to PRs opened after it lands there.
language: en-US
reviews:
  profile: chill
  request_changes_workflow: false
  auto_review:
    enabled: true
    drafts: false
    # Explicitly listing the base removes the "base branch other than the default
    # branch" skip, and lets PRs targeting non-default bases be auto-reviewed too.
    base_branches:
      - master
  # Vendored subchart tarballs are generated by `helm dependency build`, not authored,
  # so there is nothing to review in them.
  path_filters:
    - "!**/charts/*.tgz"
