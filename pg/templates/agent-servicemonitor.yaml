{{- if and (eq (include "pg.agentMode" .) "true") (dig "serviceMonitor" "enabled" false (.Values.repmgr.agent.monitoring | default dict)) }}
{{- /*
Scrapes the pg-ha-agent's read-only metrics (port 9200, /metrics) off the
per-pod headless Service endpoints. The selector is scoped to the postgresql
component so it matches only the headless Service (the sole Service carrying both
that label and the agent-metrics port). Requires the Prometheus Operator CRDs.
*/}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "pg.fullname" . }}-agent
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    {{- with .Values.repmgr.agent.monitoring.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "pg.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: agent-metrics
      path: /metrics
      interval: {{ .Values.repmgr.agent.monitoring.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.repmgr.agent.monitoring.serviceMonitor.scrapeTimeout }}
{{- end }}
