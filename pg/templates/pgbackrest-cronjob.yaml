{{- if .Values.pgbackrest.enabled }}
{{- $root := . -}}
{{- range $type, $schedule := dict "full" $root.Values.pgbackrest.schedule.full "diff" $root.Values.pgbackrest.schedule.diff }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "pg.fullname" $root }}-pgbackrest-{{ $type }}
  labels:
    {{- include "pg.labels" $root | nindent 4 }}
    app.kubernetes.io/component: pgbackrest
    pgbackrest.type: {{ $type }}
  annotations:
    # one-shot CronJob: liveness/readiness probes do not apply (kube-linter waiver).
    ignore-check.kube-linter.io/no-liveness-probe: "one-shot pgbackrest CronJob"
    ignore-check.kube-linter.io/no-readiness-probe: "one-shot pgbackrest CronJob"
    {{- with (include "pg.annotations" $root) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  schedule: {{ $schedule | quote }}
  concurrencyPolicy: {{ $root.Values.pgbackrest.cronjob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ $root.Values.pgbackrest.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ $root.Values.pgbackrest.cronjob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ $root.Values.pgbackrest.cronjob.backoffLimit }}
      activeDeadlineSeconds: {{ $root.Values.pgbackrest.cronjob.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            {{- include "pg.selectorLabels" $root | nindent 12 }}
            app.kubernetes.io/component: pgbackrest
            pgbackrest.type: {{ $type }}
        spec:
          {{- with $root.Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $root.Values.pgbackrest.cronjob.priorityClassName }}
          priorityClassName: {{ . }}
          {{- end }}
          serviceAccountName: {{ include "pg.fullname" $root }}-pgbackrest
          restartPolicy: Never
          securityContext:
            {{- toYaml $root.Values.pgbackrest.cronjob.podSecurityContext | nindent 12 }}
          containers:
            - name: pgbackrest
              image: {{ include "pg.image" $root.Values.pgbackrest.cronjob.image | quote }}
              imagePullPolicy: {{ $root.Values.pgbackrest.cronjob.image.pullPolicy }}
              securityContext:
                {{- toYaml $root.Values.pgbackrest.cronjob.containerSecurityContext | nindent 16 }}
              command: ["/bin/bash", "-eu", "-o", "pipefail", "-c"]
              args:
                - |
                  # Resolve the primary pod from the write Service's EndpointSlices
                  # (the core Endpoints API is deprecated). The write Service selects
                  # only the primary, but during a failover + scale-down collision
                  # stale EndpointSlices can briefly expose more than one Ready
                  # endpoint; taking the first blindly could target a standby, and
                  # with backoffLimit:0 the failed backup is silently skipped (#212).
                  # So validate every Ready candidate with pg_is_in_recovery() and
                  # pick the one true read-write primary (=f). The check runs in the
                  # candidate's postgresql container over its local socket -- the same
                  # invocation the readiness probe uses, so no extra creds are needed.
                  CANDIDATES=$(kubectl -n "$NAMESPACE" get endpointslices \
                    -l "kubernetes.io/service-name=$PRIMARY_SVC" \
                    -o jsonpath='{.items[*].endpoints[?(@.conditions.ready==true)].targetRef.name}')
                  if [ -z "$CANDIDATES" ]; then
                    echo "ERROR: no ready endpoint found in endpointslices for $PRIMARY_SVC" >&2
                    exit 1
                  fi
                  PRIMARY=""
                  for cand in $CANDIDATES; do
                    rec=$(kubectl -n "$NAMESPACE" exec "$cand" -c postgresql -- \
                      sh -c 'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc "SELECT pg_is_in_recovery()"' 2>/dev/null \
                      | tr -d '[:space:]')
                    if [ "$rec" = "f" ]; then
                      PRIMARY="$cand"
                      break
                    fi
                    echo "Skipping $cand: pg_is_in_recovery=${rec:-unreadable} (not the read-write primary)"
                  done
                  if [ -z "$PRIMARY" ]; then
                    echo "ERROR: none of the ready endpoints ($CANDIDATES) is a read-write primary for $PRIMARY_SVC" >&2
                    exit 1
                  fi
                  echo "Primary pod resolved to: $PRIMARY"

                  # Required so the first backup after a fresh install (or after a
                  # failover that promoted a node which was a standby at boot) creates
                  # the stanza on the actual primary. stanza-create is natively
                  # idempotent -- it exits 0 when the stanza already exists -- so it is
                  # NOT guarded with `|| true`: a real failure (S3 permissions, repo
                  # lock, a kubectl exec error, or a needed stanza-upgrade after a PG
                  # major upgrade) must abort here with the root-cause message under
                  # `set -eu -o pipefail`, not be masked into a misleading backup error.
                  echo "Ensuring stanza '$STANZA' exists..."
                  kubectl -n "$NAMESPACE" exec "$PRIMARY" -c pgbackrest -- \
                    pgbackrest --stanza="$STANZA" stanza-create

                  echo "Starting $BACKUP_TYPE backup..."
                  kubectl -n "$NAMESPACE" exec "$PRIMARY" -c pgbackrest -- \
                    pgbackrest --stanza="$STANZA" --type="$BACKUP_TYPE" backup

                  echo "$BACKUP_TYPE backup completed. Repository state:"
                  kubectl -n "$NAMESPACE" exec "$PRIMARY" -c pgbackrest -- \
                    pgbackrest --stanza="$STANZA" info
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: PRIMARY_SVC
                  value: {{ include "pg.fullname" $root | quote }}
                - name: STANZA
                  value: {{ $root.Values.pgbackrest.stanza | quote }}
                - name: BACKUP_TYPE
                  value: {{ $type | quote }}
                # kubectl writes its discovery/http cache under $HOME; point it at the
                # writable /tmp emptyDir so the read-only root filesystem is enough (#117).
                - name: HOME
                  value: /tmp
              resources:
                {{- toYaml $root.Values.pgbackrest.cronjob.resources | nindent 16 }}
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 64Mi
{{- end }}
{{- end }}
