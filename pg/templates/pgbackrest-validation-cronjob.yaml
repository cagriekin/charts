{{- if and .Values.pgbackrest.enabled .Values.pgbackrest.validation.enabled }}
{{- /* targetType enum and the "target required when targetType is set" rule are
       enforced by values.schema.json (an `if/then` on validation), which validates
       even when this CronJob is gated off -- so the misconfiguration is caught at the
       point of bad input, not deferred to the next render that enables validation. */}}
# Automated PITR restore-validation (#38): on a schedule, restore the pgBackRest
# repository into a THROWAWAY PostgreSQL inside this Job pod (never the live cluster),
# replay archived WAL to a consistent state, run a sanity query, then exit. Proves the
# backups are actually restorable end to end. Read-only against S3; the throwaway data
# lives on an emptyDir that is discarded when the pod terminates.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "pg.fullname" . }}-pgbackrest-validation
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbackrest-validation
  annotations:
    # one-shot CronJob: liveness/readiness probes do not apply (kube-linter waiver).
    ignore-check.kube-linter.io/no-liveness-probe: "one-shot pgbackrest-validation CronJob"
    ignore-check.kube-linter.io/no-readiness-probe: "one-shot pgbackrest-validation CronJob"
    {{- with (include "pg.annotations" .) }}
    {{- . | nindent 4 }}
    {{- end }}
spec:
  schedule: {{ .Values.pgbackrest.validation.schedule | quote }}
  concurrencyPolicy: {{ .Values.pgbackrest.cronjob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.pgbackrest.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.pgbackrest.cronjob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.pgbackrest.validation.activeDeadlineSeconds }}
      backoffLimit: {{ .Values.pgbackrest.validation.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "pg.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: pgbackrest-validation
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.pgbackrest.cronjob.priorityClassName }}
          priorityClassName: {{ . }}
          {{- end }}
          restartPolicy: Never
          # Reuse the postgresql pods' ServiceAccount: it carries the cloud
          # workload-identity annotation (postgresql.serviceAccount.annotations) that
          # pgbackrest needs to reach S3 under s3.keyType=auto -- the same identity the
          # backups use. The script never calls the Kubernetes API (it only restores
          # from S3 and runs a local PostgreSQL), so its token is not mounted.
          serviceAccountName: {{ include "pg.fullname" . }}-repmgr
          automountServiceAccountToken: false
          # Runs pgbackrest restore + a throwaway postgres from the repmgr image, whose
          # postgres user is uid 101 -- so reuse the postgresql pods' security contexts
          # (uid 101, gid 103, fsGroup 103) rather than the official-image uid 999 the
          # pg_dump validation uses. The image ships the matching PG major, so the
          # restored cluster starts under the same binaries that wrote the backup.
          securityContext:
            {{- toYaml .Values.postgresql.podSecurityContext | nindent 12 }}
          containers:
            - name: pgbackrest-validation
              image: "{{ include "pg.repmgrImage" . }}"
              imagePullPolicy: {{ .Values.repmgr.image.pullPolicy }}
              securityContext:
                {{- toYaml .Values.postgresql.containerSecurityContext | nindent 16 }}
              command: ["/bin/bash", "-eu", "-o", "pipefail", "-c"]
              args:
                - |
                  WORK=/work
                  # Restore into a throwaway PGDATA on the emptyDir. PGBACKREST_PG1_PATH
                  # (env) overrides the pg1-path baked into the mounted pgbackrest.conf
                  # for BOTH the restore and the archive-get the recovery runs, so we
                  # never touch /var/lib/postgresql/data. restartPolicy:Never gives a
                  # fresh pod each run, but clear defensively in case of a manual rerun.
                  rm -rf "$PGDATA" "$WORK/run"
                  mkdir -p "$PGDATA" "$WORK/run" "$PGBACKREST_LOG_PATH" "$PGBACKREST_LOCK_PATH"

                  echo "Restoring stanza '$PGBACKREST_STANZA' into the throwaway PGDATA ($PGDATA)..."
                  # No --type => recover to the end of the archived WAL stream (latest).
                  # With a target, pgbackrest writes the recovery target + promote action
                  # so the instance becomes queryable once it reaches the target.
                  if [ -n "$TARGET_TYPE" ]; then
                    echo "PITR target: type=$TARGET_TYPE target=$TARGET"
                    # --target-action=promote is REQUIRED: with a recovery target,
                    # PostgreSQL's default recovery_target_action is `pause`, which would
                    # leave the instance paused in recovery (never accepting connections),
                    # so `pg_ctl -w` below would hang until the Job times out. The
                    # latest-only branch promotes on its own (end of WAL + recovery.signal).
                    pgbackrest --stanza="$PGBACKREST_STANZA" --type="$TARGET_TYPE" --target="$TARGET" --target-action=promote restore
                  else
                    pgbackrest --stanza="$PGBACKREST_STANZA" restore
                  fi

                  # The restored postgresql.conf is the live cluster's. The chart appends
                  # `include_dir = '/etc/postgresql/conf.d'` to PGDATA (statefulset setup-config),
                  # so it is captured in the base backup -- but this Job has no conf.d (that dir
                  # is a ConfigMap mount on live pods only, and pg_ctl bypasses the entrypoint),
                  # so postgres would FATAL with "could not open configuration directory". Strip
                  # the line; the throwaway needs none of those tunables to prove restorability.
                  if [ -f "$PGDATA/postgresql.conf" ]; then
                    grep -v "include_dir = '/etc/postgresql/conf.d'" "$PGDATA/postgresql.conf" > "$PGDATA/postgresql.conf.tmp"
                    mv "$PGDATA/postgresql.conf.tmp" "$PGDATA/postgresql.conf"
                  fi
                  # The restored pg_hba.conf is the live cluster's (scram/peer over the pod
                  # network), and this Job has no DB password. Prepend a trust rule for the
                  # local socket so the validation queries can connect as the restored
                  # superuser without a secret -- safe because this throwaway instance is
                  # socket-only (listen_addresses='') and discarded when the pod ends.
                  printf 'local all all trust\n%s\n' "$(cat "$PGDATA/pg_hba.conf")" > "$PGDATA/pg_hba.conf"

                  echo "Starting the throwaway PostgreSQL to replay WAL (archive recovery)..."
                  # recovery.signal (written by restore) makes postgres replay WAL via the
                  # restore_command (pgbackrest archive-get, inheriting this container's env
                  # for S3 creds + PGBACKREST_PG1_PATH). listen_addresses='' keeps it socket-only.
                  # archive_mode=off is CRITICAL: the restored config still has archive_mode=on
                  # + the archive-push command, so once this throwaway PROMOTES it would push
                  # its own new-timeline WAL into the PRODUCTION repo and pollute it. Disabling
                  # archive_mode at startup neutralizes that; archive-get (restore_command) for
                  # reading WAL during recovery is unaffected.
                  pg_ctl -D "$PGDATA" -w -t "$RECOVERY_TIMEOUT" \
                    -o "-c listen_addresses='' -c unix_socket_directories=$WORK/run -c port=5432 -c archive_mode=off" start
                  trap 'pg_ctl -D "$PGDATA" -m immediate -w stop >/dev/null 2>&1 || true' EXIT

                  # hot_standby (default on) lets the postmaster accept read-only connections at
                  # the consistency point -- DURING recovery -- so `pg_ctl -w` returning does NOT
                  # mean WAL replay finished. Poll pg_is_in_recovery() until it promotes to
                  # read-write ('f'), bounded by recoveryTimeout. A single check here would fail
                  # spuriously whenever replay outlasts the moment connections first open.
                  echo "Waiting for WAL replay to finish and the instance to promote..."
                  promoted=""
                  poll_interval=5
                  poll_iters=$(( (RECOVERY_TIMEOUT + poll_interval - 1) / poll_interval ))
                  rec=""
                  for _ in $(seq 1 "$poll_iters"); do
                    rec=$(psql -h "$WORK/run" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc "SELECT pg_is_in_recovery()" 2>/dev/null | tr -d '[:space:]') || rec=""
                    [ "$rec" = "f" ] && { promoted="yes"; break; }
                    sleep "$poll_interval"
                  done
                  if [ -z "$promoted" ]; then
                    echo "ERROR: recovery did not promote within ${RECOVERY_TIMEOUT}s (pg_is_in_recovery=${rec:-unreadable})" >&2
                    exit 1
                  fi

                  echo "Validating restored contents..."
                  # No ANALYZE: a physical restore preserves pg_class.reltuples from the source,
                  # and the load-bearing signal is the relation COUNT (needs no stats). Skipping
                  # it avoids a full-database scan that could dominate runtime on a large restore.
                  SUMMARY=$(psql -h "$WORK/run" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAF'|' -c "
                    SELECT count(*),
                           COALESCE(sum(c.reltuples)::bigint, 0)
                    FROM pg_class c JOIN pg_namespace n ON n.oid = c.relnamespace
                    WHERE c.relkind IN ('r','p','m','f') AND n.nspname NOT IN ('pg_catalog','information_schema')")
                  RELS="${SUMMARY%%|*}"
                  ROWS="${SUMMARY##*|}"
                  echo "Restore OK: recovery completed and promoted; ${RELS} table-like relation(s), ~${ROWS} row(s) (estimate) in '$POSTGRES_DB'"
                  echo "pgBackRest PITR validation succeeded for stanza '$PGBACKREST_STANZA'"
              env:
                - name: PGBACKREST_STANZA
                  value: {{ .Values.pgbackrest.stanza | quote }}
                # The restored cluster's superuser + a database to validate against. Same
                # credentials the rest of the chart uses; the restored pg_authid matches
                # the live one, but local trust (set above) means no password is needed.
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "pg.secretName" . }}
                      key: {{ include "pg.secretUsernameKey" . }}
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "pg.secretName" . }}
                      key: {{ include "pg.secretDatabaseKey" . }}
                # Override the conf's pg1-path so the restore + recovery archive-get
                # target the throwaway PGDATA, never the live data directory.
                - name: PGBACKREST_PG1_PATH
                  value: /work/pgdata
                - name: PGDATA
                  value: /work/pgdata
                # pgbackrest's default log/lock paths (/var/log/pgbackrest, /tmp) may be
                # unwritable; point them at the writable work volume.
                - name: PGBACKREST_LOG_PATH
                  value: /work/pgbackrest-log
                - name: PGBACKREST_LOCK_PATH
                  value: /work/pgbackrest-lock
                - name: RECOVERY_TIMEOUT
                  value: {{ .Values.pgbackrest.validation.recoveryTimeout | quote }}
                - name: TARGET_TYPE
                  value: {{ .Values.pgbackrest.validation.targetType | quote }}
                - name: TARGET
                  value: {{ .Values.pgbackrest.validation.target | quote }}
{{- if .Values.pgbackrest.repoEncryption.enabled }}
                - name: PGBACKREST_REPO1_CIPHER_PASS
                  valueFrom:
                    secretKeyRef:
                      name: {{ required "pgbackrest.repoEncryption.existingSecret.name is required when pgbackrest.repoEncryption.enabled" .Values.pgbackrest.repoEncryption.existingSecret.name }}
                      key: {{ .Values.pgbackrest.repoEncryption.existingSecret.passphraseKey }}
{{- end }}
{{- if eq .Values.pgbackrest.s3.keyType "shared" }}
                - name: PGBACKREST_REPO1_S3_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "pg.pgbackrestS3SecretName" . }}
                      key: {{ .Values.pgbackrest.existingSecret.accessKeyIdKey }}
                - name: PGBACKREST_REPO1_S3_KEY_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "pg.pgbackrestS3SecretName" . }}
                      key: {{ .Values.pgbackrest.existingSecret.secretAccessKeyKey }}
{{- end }}
              resources:
                {{- toYaml .Values.pgbackrest.validation.resources | nindent 16 }}
              volumeMounts:
                - name: pgbackrest-config
                  mountPath: /etc/pgbackrest/pgbackrest.conf
                  subPath: pgbackrest.conf
                  readOnly: true
                - name: work
                  mountPath: /work
          volumes:
            - name: pgbackrest-config
              configMap:
                name: {{ include "pg.fullname" . }}-pgbackrest
            - name: work
              {{- with .Values.pgbackrest.validation.workdirSizeLimit }}
              emptyDir:
                sizeLimit: {{ . }}
              {{- else }}
              emptyDir: {}
              {{- end }}
{{- end }}
