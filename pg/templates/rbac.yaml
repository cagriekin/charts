{{- if .Values.repmgr.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pg.fullname" . }}-repmgr
  labels:
    {{- include "pg.labels" . | nindent 4 }}
  {{- /* This is the postgresql pods' identity: global annotations plus the
         postgresql.serviceAccount.annotations knob (cloud workload identity for
         keyless pgbackrest S3 -- IRSA / GKE WI). SA-specific keys win on conflict. */}}
  {{- $saAnnotations := merge (deepCopy .Values.postgresql.serviceAccount.annotations) .Values.global.annotations }}
  {{- with $saAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pg.fullname" . }}-repmgr
  labels:
    {{- include "pg.labels" . | nindent 4 }}
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["{{ include "pg.fullname" . }}"]
    verbs: ["get", "patch"]
  {{- /* list cannot be resourceName-scoped (the object name is not known at
         authorization time); it is read-only enumeration of the pg pods for
         pg-role labeling. */}}
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  {{- /* get/patch (pg-role labeling for the readonly Service) and, only in repmgrd
         fence mode, delete (split-brain fencing by the service-updater) are scoped
         to the chart's own StatefulSet pods <fullname>-0..N, so a leaked SA token
         cannot patch or delete arbitrary namespace pods. delete is withheld unless
         splitBrainDetection.action=fence (#154); agent mode never gets it -- the
         agent soft-fences locally via pg_ctl and never deletes a pod. */}}
  - apiGroups: [""]
    resources: ["pods"]
    resourceNames:
      {{- range $i := until (int (add .Values.postgresql.replicaCount 1)) }}
      - {{ printf "%s-%d" (include "pg.fullname" $) $i | quote }}
      {{- end }}
    verbs:
      - "get"
      - "patch"
      {{- if and (eq (include "pg.repmgrdMode" .) "true") (eq .Values.repmgr.splitBrainDetection.action "fence") }}
      - "delete"
      {{- end }}
{{- if eq (include "pg.agentMode" .) "true" }}
  # Durable primary marker (<fullname>-primary): the agent records the highest
  # timeline here (#125) via Get -> Create-if-absent -> Update. get/update are
  # scoped to the one marker name; create stays unscoped (resourceNames cannot
  # restrict create). The agent records its failover decisions in a structured
  # audit log (not core/v1 Events), so it needs no events grant.
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["{{ include "pg.fullname" . }}-primary"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
{{- if ne (include "pg.agentEtcdMode" .) "true" }}
  # Lease <fullname>-leader is the sole leadership authority (client-go
  # leaderelection): get/update/patch scoped to that name, create unscoped. With the
  # etcd DCS backend leadership lives in etcd, not the apiserver, so this grant is
  # dropped (least privilege); routing still uses the services/pods grants above.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["{{ include "pg.fullname" . }}-leader"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
{{- end }}
{{- else }}
  # core/v1 Events emitted by service-updater on primary failover.
  # resourceNames cannot restrict create: the object name is not known at
  # authorization time. Agent mode does not emit Events, so this is repmgrd-only.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
  # Durable primary marker (<fullname>-primary): the service-updater records the
  # highest-timeline primary here so a node booting first under OrderedReady can
  # tell it is stale (#125). create cannot be resourceName-scoped; the chart only
  # ever touches the one marker name.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch"]
{{- end }}
{{- if and .Values.pgpool.enabled (eq (include "pg.repmgrdMode" .) "true") }}
  {{- /* repmgrd mode restarts pgpool on failover; the agent fronts the Services
         instead, so this grant is dropped in agent mode. */}}
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["{{ include "pg.fullname" . }}-pgpool"]
    verbs: ["get", "patch"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pg.fullname" . }}-repmgr
  labels:
    {{- include "pg.labels" . | nindent 4 }}
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pg.fullname" . }}-repmgr
subjects:
  - kind: ServiceAccount
    name: {{ include "pg.fullname" . }}-repmgr
    namespace: {{ .Release.Namespace }}
{{- end }}
