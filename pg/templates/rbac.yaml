{{- if .Values.repmgr.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pg.fullname" . }}-repmgr
  labels:
    {{- include "pg.labels" . | nindent 4 }}
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pg.fullname" . }}-repmgr
  labels:
    {{- include "pg.labels" . | nindent 4 }}
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["{{ include "pg.fullname" . }}"]
    verbs: ["get", "patch"]
  {{- /* delete: split-brain fencing; get/list/patch: pg-role labeling for the
         readonly Service. resourceNames cannot scope `list`, so the rule
         stays unscoped. */}}
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch", "delete"]
  # core/v1 Events emitted by service-updater on primary failover.
  # resourceNames cannot restrict create: the object name is not known at
  # authorization time.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
  # Durable primary marker (<fullname>-primary): the service-updater records the
  # highest-timeline primary here so a node booting first under OrderedReady can
  # tell it is stale (#125). create cannot be resourceName-scoped; the chart only
  # ever touches the one marker name.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "patch"]
{{- if .Values.pgpool.enabled }}
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["{{ include "pg.fullname" . }}-pgpool"]
    verbs: ["get", "patch"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pg.fullname" . }}-repmgr
  labels:
    {{- include "pg.labels" . | nindent 4 }}
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pg.fullname" . }}-repmgr
subjects:
  - kind: ServiceAccount
    name: {{ include "pg.fullname" . }}-repmgr
    namespace: {{ .Release.Namespace }}
{{- end }}
