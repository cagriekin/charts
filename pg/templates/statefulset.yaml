{{- if and (not .Values.repmgr.enabled) (gt (int .Values.postgresql.replicaCount) 0) }}
{{- fail "postgresql.replicaCount > 0 requires repmgr.enabled=true: with repmgr disabled the chart would run replicaCount+1 independent PostgreSQL instances with no replication between them. Set postgresql.replicaCount=0 for standalone mode or enable repmgr" }}
{{- end }}
{{- if .Values.repmgr.enabled }}
{{- $repmgrMajor := required "repmgr.image.majorVersion is required (the PostgreSQL major bundled in the repmgr image)" .Values.repmgr.image.majorVersion }}
{{- if ne (toString .Values.postgresql.majorVersion) (toString $repmgrMajor) }}
{{- fail (printf "postgresql.majorVersion=%q does not match repmgr.image.majorVersion=%q. In repmgr mode the PostgreSQL server runs from the repmgr image (%s), which bundles only PostgreSQL %s and always runs that server regardless of postgresql.image; a mismatch crash-loops the extension init container or silently runs the wrong major. Set postgresql.majorVersion=%q (with a matching postgresql.image), or point repmgr.image at an image built for PostgreSQL %s and set repmgr.image.majorVersion to match" (toString .Values.postgresql.majorVersion) (toString $repmgrMajor) .Values.repmgr.image.repository (toString $repmgrMajor) (toString $repmgrMajor) (toString .Values.postgresql.majorVersion)) }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pg.fullname" . }}
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
  {{- if or .Values.global.annotations .Values.postgresql.annotations }}
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.postgresql.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  serviceName: {{ include "pg.fullname" . }}-headless
  # OrderedReady is REQUIRED by the #125 stale-resurrection guard: on a
  # full-cluster restart pods must come up lowest-ordinal-first, one at a time,
  # so a stale lowest-ordinal pod boots ALONE and the guard/service-updater can
  # refuse to serve it until a newer-timeline peer is up. Parallel would let a
  # stale and the real primary race and silently defeat the guard. Pinned
  # explicitly (not left to the API default) so it cannot be changed silently.
  podManagementPolicy: OrderedReady
  replicas: {{ add .Values.postgresql.replicaCount 1 }}
  {{- with .Values.postgresql.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "pg.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "pg.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
{{- if or .Values.postgresql.configuration .Values.pgbackrest.enabled .Values.postgresql.podAnnotations }}
      annotations:
{{- if or .Values.postgresql.configuration .Values.pgbackrest.enabled }}
        checksum/postgresql-config: {{ include (print $.Template.BasePath "/postgresql-configmap.yaml") . | sha256sum }}
{{- end }}
      {{- with .Values.postgresql.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.repmgr.enabled }}
      terminationGracePeriodSeconds: {{ .Values.repmgr.terminationGracePeriodSeconds | default 120 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.postgresql.podSecurityContext | nindent 8 }}
      {{- if .Values.repmgr.enabled }}
      shareProcessNamespace: true
      serviceAccountName: {{ include "pg.fullname" . }}-repmgr
      {{- end }}
      {{- with .Values.postgresql.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.postgresql.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgresql.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if .Values.postgresql.affinity }}
        {{- toYaml .Values.postgresql.affinity | nindent 8 }}
        {{- else }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "pg.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: postgresql
              topologyKey: kubernetes.io/hostname
          # Zone spread is preferred (soft) so single-zone clusters still
          # schedule; the hostname rule above stays hard and dominates.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "pg.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: postgresql
                topologyKey: topology.kubernetes.io/zone
        {{- end }}
      initContainers:
{{- if .Values.postgresql.persistence.enabled }}
        - name: fix-permissions
          image: busybox:1.37
          command: ['sh', '-c', 'chown -R 101:103 /var/lib/postgresql/data && if [ -d /var/lib/postgresql/data/pgdata ]; then chmod 0700 /var/lib/postgresql/data/pgdata; fi']
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
{{- end }}
{{- if and .Values.postgresql.extensions.enabled .Values.repmgr.enabled }}
{{- $pgMajor := required "postgresql.majorVersion is required when postgresql.extensions.enabled is true" .Values.postgresql.majorVersion }}
        - name: copy-base-ext
          image: "{{ .Values.repmgr.image.repository }}:{{ .Values.repmgr.image.tag }}"
          imagePullPolicy: {{ .Values.repmgr.image.pullPolicy }}
          command: ['sh', '-c', 'cp /usr/lib/postgresql/{{ $pgMajor }}/lib/*.so /ext-lib/ && cp /usr/share/postgresql/{{ $pgMajor }}/extension/* /ext-share/']
          securityContext:
            {{- toYaml .Values.postgresql.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: ext-lib
              mountPath: /ext-lib
            - name: ext-share
              mountPath: /ext-share
{{- end }}
{{- if .Values.postgresql.extensions.enabled }}
{{- $pgMajor := required "postgresql.majorVersion is required when postgresql.extensions.enabled is true" .Values.postgresql.majorVersion }}
        - name: copy-ext
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          command: ['sh', '-c', 'cp /usr/lib/postgresql/{{ $pgMajor }}/lib/*.so /ext-lib/ && cp /usr/share/postgresql/{{ $pgMajor }}/extension/* /ext-share/']
          securityContext:
            {{- toYaml .Values.postgresql.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: ext-lib
              mountPath: /ext-lib
            - name: ext-share
              mountPath: /ext-share
{{- end }}
{{- if .Values.repmgr.enabled }}
        - name: repmgr-init
          image: "{{ .Values.repmgr.image.repository }}:{{ .Values.repmgr.image.tag }}"
          imagePullPolicy: {{ .Values.repmgr.image.pullPolicy }}
          command: ["/usr/local/bin/entrypoint.sh", "init"]
          securityContext:
            {{- toYaml .Values.postgresql.containerSecurityContext | nindent 12 }}
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretUsernameKey" . }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretPasswordKey" . }}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretDatabaseKey" . }}
            - name: REPMGR_USER
              value: {{ .Values.repmgr.username }}
            - name: REPMGR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretRepmgrPasswordKey" . }}
            - name: REPMGR_DB
              value: {{ .Values.repmgr.database }}
            - name: HEADLESS_SERVICE
              value: {{ include "pg.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local
            - name: REPMGR_NODE_COUNT
              value: {{ add .Values.postgresql.replicaCount 1 | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: repmgr-config
              mountPath: /etc/repmgr
{{- end }}
        - name: setup-config
          image: busybox:1.37
          securityContext:
            {{- toYaml .Values.postgresql.containerSecurityContext | nindent 12 }}
          command:
            - sh
            - -c
            - |
              CONF=/var/lib/postgresql/data/pgdata/postgresql.conf
{{- if or .Values.postgresql.configuration .Values.pgbackrest.enabled }}
              if [ -f "$CONF" ] && ! grep -q "include_dir = '/etc/postgresql/conf.d'" "$CONF"; then
                echo "include_dir = '/etc/postgresql/conf.d'" >> "$CONF"
              fi
{{- else }}
              # A stale include_dir left in PGDATA while conf.d features
              # were enabled is fatal at postmaster start once the mount
              # is gone.
              if [ -f "$CONF" ] && grep -q "include_dir = '/etc/postgresql/conf.d'" "$CONF"; then
                grep -v "include_dir = '/etc/postgresql/conf.d'" "$CONF" > "$CONF.tmp"
                mv "$CONF.tmp" "$CONF"
              fi
{{- end }}
{{- if not .Values.pgbackrest.enabled }}
              # pgbackrest disabled: the repmgr image entrypoint persisted
              # archive_mode=on + a pgbackrest archive_command into PGDATA's
              # postgresql.conf at initdb (#132). With the pgbackrest config and
              # S3 credentials now gone, every archive_command fails and WAL is
              # never recycled -- pg_wal grows until the PVC fills and the
              # postmaster PANICs. Strip the entrypoint-written archive lines so
              # archiving reverts to the default (off). Live archive settings,
              # when enabled, come from the chart-managed conf.d include, never
              # this base file, so this only ever removes stale, failing config.
              if [ -f "$CONF" ] && grep -q "archive-push %p" "$CONF"; then
                grep -v -e '^archive_mode = on$' -e 'archive-push %p' "$CONF" > "$CONF.tmp"
                mv "$CONF.tmp" "$CONF"
              fi
{{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgresql
{{- if .Values.repmgr.enabled }}
          image: "{{ .Values.repmgr.image.repository }}:{{ .Values.repmgr.image.tag }}"
          imagePullPolicy: {{ .Values.repmgr.image.pullPolicy }}
          # The image entrypoint runs a stale-primary guard before starting
          # read-write: on a container-only restart (which does not re-run the
          # init container) it detects a peer promoted to a newer timeline and
          # rejoins this node as a standby via pg_rewind instead of resuming as
          # a second primary. See repmgr-docker entrypoint.sh.
          command: ["/usr/local/bin/entrypoint.sh", "postgres"]
{{- else }}
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
{{- end }}
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretUsernameKey" . }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretPasswordKey" . }}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretDatabaseKey" . }}
{{- if .Values.repmgr.enabled }}
            - name: REPMGR_USER
              value: {{ .Values.repmgr.username }}
            - name: REPMGR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretRepmgrPasswordKey" . }}
            - name: REPMGR_DB
              value: {{ .Values.repmgr.database }}
            - name: HEADLESS_SERVICE
              value: {{ include "pg.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local
            - name: REPMGR_NODE_COUNT
              value: {{ add .Values.postgresql.replicaCount 1 | quote }}
            # Lets the entrypoint stale-primary guard read the durable primary
            # marker (#125) to tell a first install from a PVC-loss recreate, so
            # it only settles/retries the empty-data peer scan in the recreate
            # case and never delays a first install (#170).
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PRIMARY_MARKER
              value: {{ include "pg.fullname" . }}-primary
{{- end }}
{{- if .Values.pgbackrest.enabled }}
            - name: PGBACKREST_ENABLED
              value: "true"
            - name: PGBACKREST_STANZA
              value: {{ .Values.pgbackrest.stanza }}
            - name: PGBACKREST_REPO1_S3_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "pgbackrest.existingSecret.name is required" .Values.pgbackrest.existingSecret.name }}
                  key: {{ .Values.pgbackrest.existingSecret.accessKeyIdKey }}
            - name: PGBACKREST_REPO1_S3_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pgbackrest.existingSecret.name }}
                  key: {{ .Values.pgbackrest.existingSecret.secretAccessKeyKey }}
{{- end }}
{{- if not .Values.repmgr.enabled }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    for i in {1..30}; do
                      if pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" > /dev/null 2>&1; then
                        {{- if or .Values.postgresql.configuration .Values.pgbackrest.enabled }}
                        CONF="$PGDATA/postgresql.conf"
                        if [ -f "$CONF" ] && ! grep -q "include_dir = '/etc/postgresql/conf.d'" "$CONF"; then
                          echo "include_dir = '/etc/postgresql/conf.d'" >> "$CONF"
                        fi
                        {{- end }}
                        {{- if .Values.postgresql.pgHba }}
                        HBA_FILE=$(psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -t -c "SHOW hba_file" | xargs)
                        {{- range .Values.postgresql.pgHba }}
                        if ! grep -qF '{{ . }}' "$HBA_FILE"; then
                          sed -i '/host all all all scram-sha-256/i {{ . }}' "$HBA_FILE"
                        fi
                        {{- end }}
                        {{- end }}
                        psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT pg_reload_conf();" > /dev/null 2>&1
                        {{- if .Values.postgresql.lifecycle.postStart.additionalCommands }}
                        {{ .Values.postgresql.lifecycle.postStart.additionalCommands | nindent 24 }}
                        {{- end }}
                        break
                      fi
                      sleep 1
                    done
{{- else }}
          lifecycle:
{{- include "pg.preStop" . | nindent 12 }}
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    for i in {1..90}; do
                      if pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" > /dev/null 2>&1; then
                        {{- if or .Values.postgresql.configuration .Values.pgbackrest.enabled }}
                        CONF="$PGDATA/postgresql.conf"
                        if [ -f "$CONF" ] && ! grep -q "include_dir = '/etc/postgresql/conf.d'" "$CONF"; then
                          echo "include_dir = '/etc/postgresql/conf.d'" >> "$CONF"
                        fi
                        {{- end }}
                        # PG18 + repmgr MD5/SCRAM auth deadlock fix: the cagriekin/repmgr image
                        # entrypoint creates managed users (pgvector, repmgr) with MD5-hashed
                        # passwords while only writing `scram-sha-256` rules into pg_hba.conf,
                        # so every network auth attempt fails with "User <X> does not have a
                        # valid SCRAM secret" and traps the StatefulSet in CrashLoopBackOff.
                        #
                        # We patch pg_hba.conf to insert an `md5` line ABOVE every existing
                        # `scram-sha-256` line. pg_hba.conf is matched top-down with no
                        # fall-through on auth failure, so the md5 rule must come first to
                        # catch legacy MD5-hashed users (managed and custom, e.g. created via
                        # additionalCommands). On PG14+ the server auto-promotes md5 method
                        # to SCRAM when the stored password is SCRAM, so SCRAM-hashed users
                        # still authenticate via SCRAM wire protocol — same security, more
                        # compat. Marker comment makes the rewrite idempotent.
                        #
                        # Optionally re-hash managed users (POSTGRES_USER, REPMGR_USER) from
                        # MD5 to SCRAM so we converge on the modern hash. Gated by
                        # postgresql.migrateLegacyMd5Users (default true). When false, only
                        # the pg_hba fix runs and existing MD5 hashes are preserved; legacy
                        # users keep authenticating via the md5 rule above. The migration
                        # block itself is idempotent (gated on rolpassword LIKE 'md5%').
                        #
                        # TODO: drop the md5 line and the migrate flag once the chart's
                        # minimum PG is the first release without MD5 password storage.
                        HBA_FILE=$(psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tA -c "SHOW hba_file" 2>/dev/null)
                        HBA_SENTINEL="# cagriekin-charts: md5 fallback applied (md5-first)"
                        if [ -n "$HBA_FILE" ] && [ -f "$HBA_FILE" ] && ! grep -qF "$HBA_SENTINEL" "$HBA_FILE"; then
                          HBA_TMP="${HBA_FILE}.cagriekin.tmp"
                          awk '/^[[:space:]]*host(ssl|nossl)?[[:space:]]+(all|replication)[[:space:]]+.*[[:space:]]+scram-sha-256[[:space:]]*$/ { m=$0; sub(/scram-sha-256[[:space:]]*$/, "md5", m); print m } {print}' "$HBA_FILE" > "$HBA_TMP"
                          printf '\n%s\n' "$HBA_SENTINEL" >> "$HBA_TMP"
                          cp "$HBA_TMP" "$HBA_FILE"
                          rm -f "$HBA_TMP"
                        fi
                        {{- if .Values.postgresql.migrateLegacyMd5Users }}
                        # 0.6.58 used `psql -c "DO \$\$ ... :'u' ... \$\$;"`. Two
                        # broken assumptions: (a) psql does NOT perform :'var'
                        # substitution inside `-c` (docs: "no psql-specific
                        # features"); (b) even if it did, substitution is also
                        # skipped inside dollar-quoted constants. The server saw
                        # `:'u'` literal, raised `syntax error at or near ":"`,
                        # and the rehash silently never ran. Connectivity kept
                        # working because the md5-fallback line in pg_hba.conf
                        # masked the failure.
                        #
                        # Fix: feed SQL via stdin (psql MainLoop, where :'var'
                        # IS substituted) and hoist user/pass into per-session
                        # GUCs read back inside the DO block via current_setting().
                        # GUC names use `tgt_user`/`tgt_pass` — `user` would
                        # collide with the SQL reserved keyword.
                        fix_user_auth() {
                          local target_user="$1"
                          local target_pass="$2"
                          [ -z "$target_user" ] && return 0
                          [ -z "$target_pass" ] && return 0
                          local sql="
                            SET myvars.tgt_user = :'u';
                            SET myvars.tgt_pass = :'p';
                            DO \$\$
                            DECLARE
                              v_user TEXT := current_setting('myvars.tgt_user');
                              v_pass TEXT := current_setting('myvars.tgt_pass');
                            BEGIN
                              IF current_setting('server_version_num')::int < 140000 THEN
                                RAISE NOTICE 'Skipping md5->scram migration on PG < 14 (no md5->scram auto-promotion in pg_hba)';
                                RETURN;
                              END IF;
                              IF EXISTS (
                                SELECT 1 FROM pg_authid
                                WHERE rolname = v_user AND rolpassword LIKE 'md5%'
                              ) THEN
                                SET LOCAL password_encryption = 'scram-sha-256';
                                EXECUTE format('ALTER USER %I WITH PASSWORD %L', v_user, v_pass);
                              END IF;
                            END
                            \$\$;"
                          if ! psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" \
                            -v ON_ERROR_STOP=1 \
                            -v u="$target_user" \
                            -v p="$target_pass" \
                            --no-psqlrc <<<"$sql"; then
                            echo "fix_user_auth: md5->scram rehash failed for ${target_user} (psql returned non-zero, see error above)" >&2
                          fi
                        }
                        fix_user_auth "$POSTGRES_USER" "$POSTGRES_PASSWORD"
                        fix_user_auth "$REPMGR_USER" "$REPMGR_PASSWORD"
                        {{- end }}
                        {{- if .Values.postgresql.pgHba }}
                        HBA_FILE_USER=$(psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -t -c "SHOW hba_file" | xargs)
                        {{- range .Values.postgresql.pgHba }}
                        if ! grep -qF '{{ . }}' "$HBA_FILE_USER"; then
                          sed -i '$ a {{ . }}' "$HBA_FILE_USER"
                        fi
                        {{- end }}
                        {{- end }}
                        psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT pg_reload_conf();" > /dev/null 2>&1
                        {{- if .Values.postgresql.lifecycle.postStart.additionalCommands }}
                        HEADLESS="{{ include "pg.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local"
                        PRIMARY_HOST=""
                        # Discovery and the user commands connect over TCP to a remote
                        # pod; the image's pg_hba requires md5/scram for every
                        # non-loopback connection, so without PGPASSWORD both the
                        # discovery psql and the user psql fail auth and silently no-op.
                        export PGPASSWORD="$POSTGRES_PASSWORD"
                        {{- /* StatefulSet runs replicaCount + 1 pods, ordinals 0..replicaCount */}}
                        for n in $(seq 0 {{ int .Values.postgresql.replicaCount }}); do
                          H="{{ include "pg.fullname" . }}-${n}.${HEADLESS}"
                          if psql -h "$H" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -t -c "SELECT pg_is_in_recovery();" 2>/dev/null | grep -q 'f'; then
                            PRIMARY_HOST="$H"
                            break
                          fi
                        done
                        if [ -n "$PRIMARY_HOST" ]; then
                          # export PGHOST as its own statement: psql reads it only from
                          # the environment, and a bare `PGHOST=... <cmd>` prefix is
                          # split onto its own line by nindent, leaving it unexported.
                          export PGHOST="$PRIMARY_HOST"
                          {{- .Values.postgresql.lifecycle.postStart.additionalCommands | nindent 26 }}
                        fi
                        {{- end }}
                        break
                      fi
                      sleep 1
                    done
{{- end }}
{{- if .Values.postgresql.startupProbe.enabled }}
          # Holds off liveness/readiness until postgres first accepts
          # connections, so the repmgr stale-primary guard's settle loop and
          # crash-recovery WAL replay cannot be killed mid-startup by the
          # liveness probe (#172). Steady-state liveness stays tight below.
          startupProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: {{ .Values.postgresql.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.postgresql.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.postgresql.startupProbe.failureThreshold }}
{{- end }}
{{- if .Values.postgresql.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: {{ .Values.postgresql.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.postgresql.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.postgresql.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.postgresql.livenessProbe.failureThreshold }}
{{- end }}
{{- if .Values.postgresql.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: {{ .Values.postgresql.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.postgresql.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.postgresql.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.postgresql.readinessProbe.failureThreshold }}
{{- end }}
          securityContext:
            {{- toYaml .Values.postgresql.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
{{- if or .Values.postgresql.configuration .Values.pgbackrest.enabled }}
            - name: postgresql-config
              mountPath: /etc/postgresql/conf.d
              readOnly: true
{{- end }}
{{- if .Values.postgresql.extensions.enabled }}
{{- $pgMajor := required "postgresql.majorVersion is required when postgresql.extensions.enabled is true" .Values.postgresql.majorVersion }}
            - name: ext-lib
              mountPath: /usr/lib/postgresql/{{ $pgMajor }}/lib
            - name: ext-share
              mountPath: /usr/share/postgresql/{{ $pgMajor }}/extension
{{- end }}
{{- if .Values.pgbackrest.enabled }}
            - name: pgbackrest-config
              mountPath: /etc/pgbackrest/pgbackrest.conf
              subPath: pgbackrest.conf
              readOnly: true
            - name: pg-run
              mountPath: /var/run/postgresql
{{- end }}
{{- if .Values.repmgr.enabled }}
            - name: repmgr-config
              mountPath: /etc/repmgr
        - name: repmgrd
          image: "{{ .Values.repmgr.image.repository }}:{{ .Values.repmgr.image.tag }}"
          imagePullPolicy: {{ .Values.repmgr.image.pullPolicy }}
          # Workaround: cagriekin/repmgr <= trixie-5.5.0-7 calls
          # `standby register --force` without --upstream-node-id, leaving the
          # row on the primary with type='' on PG18 + repmgr 5.5.0 and crashing
          # the standby. Pre-register here with an explicit upstream node_id,
          # then exec the image entrypoint (its own register --force becomes a
          # no-op UPDATE). Drop once the image ships the fix upstream.
          # Tracking: github.com/cagriekin/repmgr-docker, repmgrd-entrypoint.sh:45.
          command:
            - /bin/bash
            - -c
            - |
              ORDINAL="${HOSTNAME##*-}"
              for _ in $(seq 1 120); do pg_isready -h 127.0.0.1 > /dev/null 2>&1 && break; sleep 2; done
              IN_RECOVERY=$(PGPASSWORD="${REPMGR_PASSWORD}" psql -h 127.0.0.1 -U "${REPMGR_USER}" -d "${REPMGR_DB}" -tA -c "SELECT pg_is_in_recovery();" 2>/dev/null || true)
              if [ "$IN_RECOVERY" = "f" ]; then
                echo "pre-register: primary register --force"
                repmgr -f /etc/repmgr/repmgr.conf primary register --force || true
              elif [ "$IN_RECOVERY" = "t" ]; then
                BASE="${HOSTNAME%-*}"
                PNID=""
                for _ in $(seq 1 60); do
                  for i in $(seq 0 {{ int .Values.postgresql.replicaCount }}); do
                    [ "$i" = "$ORDINAL" ] && continue
                    P="${BASE}-${i}.${HEADLESS_SERVICE}"
                    PGPASSWORD="${REPMGR_PASSWORD}" pg_isready -h "$P" -U "${REPMGR_USER}" -d "${REPMGR_DB}" > /dev/null 2>&1 || continue
                    PNID=$(PGPASSWORD="${REPMGR_PASSWORD}" psql -h "$P" -U "${REPMGR_USER}" -d "${REPMGR_DB}" -tA \
                      -c "SELECT node_id FROM repmgr.nodes WHERE type='primary' AND active=true LIMIT 1;" 2>/dev/null || true)
                    [ -n "$PNID" ] && break 2
                  done
                  sleep 2
                done
                if [ -n "$PNID" ]; then
                  echo "pre-register: standby register --upstream-node-id=${PNID}"
                  repmgr -f /etc/repmgr/repmgr.conf standby register --upstream-node-id="${PNID}" --force || true
                  # Read node_id from the generated repmgr.conf instead of
                  # re-deriving the image's ordinal+1000 convention here.
                  LOCAL_NID=$(awk -F= '$1=="node_id"{print $2; exit}' /etc/repmgr/repmgr.conf)
                  if [ -z "$LOCAL_NID" ]; then
                    echo "pre-register: no node_id in /etc/repmgr/repmgr.conf, skipping type backfill" >&2
                  else
                    # Defensive: some PG18 + repmgr image combos land the row
                    # with type=''. WHERE clause makes this a no-op on rows
                    # that are already correctly typed.
                    PGPASSWORD="${REPMGR_PASSWORD}" psql -h "$P" -U "${REPMGR_USER}" -d "${REPMGR_DB}" \
                      -v ON_ERROR_STOP=1 --no-psqlrc -c "
                        UPDATE repmgr.nodes SET type='standby'
                         WHERE node_id=${LOCAL_NID} AND (type IS NULL OR type='');
                      " || echo "pre-register: type-backfill UPDATE failed (ignored)" >&2
                  fi
                fi
              fi
              # repmgr 5.x has no conf-based retention for monitoring_history
              # (the image's monitoring_history_keep conf line is ignored as
              # an unknown parameter), so the table grows forever. Prune it
              # once per day on the primary via `repmgr cluster cleanup`.
              # Failures only log a warning: the loop must never take down
              # repmgrd (pid 1 via the exec below).
              (
                while true; do
                  sleep 86400
                  IN_RECOVERY=$(PGPASSWORD="${REPMGR_PASSWORD}" psql -h 127.0.0.1 -U "${REPMGR_USER}" -d "${REPMGR_DB}" -tA -c "SELECT pg_is_in_recovery();" 2>/dev/null || true)
                  [ "$IN_RECOVERY" = "f" ] || continue
                  if ! repmgr -f /etc/repmgr/repmgr.conf cluster cleanup --keep-history="${MONITORING_HISTORY_DAYS}"; then
                    echo "monitoring-history-cleanup: repmgr cluster cleanup failed, retrying in 24h" >&2
                  fi
                done
              ) &
              exec repmgrd -f /etc/repmgr/repmgr.conf --daemonize=no
          securityContext:
            {{- toYaml .Values.postgresql.containerSecurityContext | nindent 12 }}
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: REPMGR_USER
              value: {{ .Values.repmgr.username }}
            - name: REPMGR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretRepmgrPasswordKey" . }}
            - name: REPMGR_DB
              value: {{ .Values.repmgr.database }}
            - name: HEADLESS_SERVICE
              value: {{ include "pg.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local
            - name: REPMGR_NODE_COUNT
              value: {{ add .Values.postgresql.replicaCount 1 | quote }}
            - name: MONITORING_HISTORY_DAYS
              value: {{ int (required "repmgr.monitoringHistoryDays is required when repmgr.enabled=true" .Values.repmgr.monitoringHistoryDays) | quote }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    repmgr daemon stop 2>/dev/null || true
          resources:
            {{- toYaml .Values.repmgr.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: repmgr-config
              mountPath: /etc/repmgr
        - name: service-updater
          image: "{{ .Values.repmgr.image.repository }}:{{ .Values.repmgr.image.tag }}"
          imagePullPolicy: {{ .Values.repmgr.image.pullPolicy }}
          command: ["/bin/bash", "/scripts/service-updater.sh"]
          securityContext:
            {{- toYaml .Values.postgresql.containerSecurityContext | nindent 12 }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MASTER_SERVICE
              value: {{ include "pg.fullname" . }}
            - name: PRIMARY_MARKER
              value: {{ include "pg.fullname" . }}-primary
            - name: HEADLESS_SERVICE
              value: {{ include "pg.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local
            - name: REPMGR_NODE_COUNT
              value: {{ add .Values.postgresql.replicaCount 1 | quote }}
            - name: REPMGR_USER
              value: {{ .Values.repmgr.username }}
            - name: REPMGR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretRepmgrPasswordKey" . }}
            - name: REPMGR_DB
              value: {{ .Values.repmgr.database }}
            - name: SPLIT_BRAIN_ACTION
              value: {{ .Values.repmgr.splitBrainDetection.action }}
{{- if .Values.pgpool.enabled }}
            - name: PGPOOL_DEPLOYMENT
              value: {{ include "pg.fullname" . }}-pgpool
            - name: PGPOOL_SERVICE
              value: {{ include "pg.fullname" . }}-pgpool.{{ .Release.Namespace }}.svc.cluster.local
            - name: PGPOOL_PORT
              value: "{{ .Values.pgpool.service.port }}"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretUsernameKey" . }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretPasswordKey" . }}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretDatabaseKey" . }}
{{- end }}
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - |
                  [ -f /tmp/service-updater-alive ] && [ $(( $(date +%s) - $(cat /tmp/service-updater-alive) )) -lt 120 ]
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - sleep 5
          volumeMounts:
            - name: service-updater-script
              mountPath: /scripts
          resources:
            {{- toYaml .Values.repmgr.serviceUpdater.resources | nindent 12 }}
{{- end }}
{{- if .Values.pgbackrest.enabled }}
        # Idle sidecar: holds the pgbackrest binary, config and S3 credentials
        # alongside PGDATA on every pg pod. The pgbackrest CronJobs find the
        # current primary via the primary service endpoints and `kubectl exec`
        # into this container to perform the actual backup. Scheduling lives
        # in the CronJobs, not here.
        - name: pgbackrest
          image: "{{ .Values.repmgr.image.repository }}:{{ .Values.repmgr.image.tag }}"
          imagePullPolicy: {{ .Values.repmgr.image.pullPolicy }}
          command: ["/bin/bash", "-c", "exec sleep infinity"]
          securityContext:
            {{- toYaml .Values.postgresql.containerSecurityContext | nindent 12 }}
          env:
            - name: PGBACKREST_STANZA
              value: {{ .Values.pgbackrest.stanza }}
            - name: PGBACKREST_REPO1_S3_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pgbackrest.existingSecret.name }}
                  key: {{ .Values.pgbackrest.existingSecret.accessKeyIdKey }}
            - name: PGBACKREST_REPO1_S3_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pgbackrest.existingSecret.name }}
                  key: {{ .Values.pgbackrest.existingSecret.secretAccessKeyKey }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: pg-run
              mountPath: /var/run/postgresql
            - name: pgbackrest-config
              mountPath: /etc/pgbackrest/pgbackrest.conf
              subPath: pgbackrest.conf
              readOnly: true
          resources:
            {{- toYaml .Values.pgbackrest.resources | nindent 12 }}
{{- end }}
{{- if or .Values.postgresql.configuration .Values.postgresql.extensions.enabled .Values.repmgr.enabled .Values.pgbackrest.enabled (not .Values.postgresql.persistence.enabled) }}
      volumes:
{{- if or .Values.postgresql.configuration .Values.pgbackrest.enabled }}
        - name: postgresql-config
          configMap:
            name: {{ include "pg.fullname" . }}-postgresql-config
{{- end }}
{{- if .Values.postgresql.extensions.enabled }}
        - name: ext-lib
          emptyDir: {}
        - name: ext-share
          emptyDir: {}
{{- end }}
{{- if .Values.repmgr.enabled }}
        - name: repmgr-config
          emptyDir: {}
        - name: service-updater-script
          configMap:
            name: {{ include "pg.fullname" . }}-service-updater
            defaultMode: 0755
{{- end }}
{{- if .Values.pgbackrest.enabled }}
        - name: pg-run
          emptyDir: {}
        - name: pgbackrest-config
          configMap:
            name: {{ include "pg.fullname" . }}-pgbackrest
{{- end }}
{{- if not .Values.postgresql.persistence.enabled }}
        - name: data
          emptyDir: {}
{{- end }}
{{- end }}
{{- if .Values.postgresql.persistence.enabled }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
{{- if .Values.postgresql.persistence.storageClass }}
        storageClassName: {{ .Values.postgresql.persistence.storageClass | quote }}
{{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size }}
{{- end }}
