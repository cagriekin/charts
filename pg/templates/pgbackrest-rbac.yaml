{{- if .Values.pgbackrest.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pg.fullname" . }}-pgbackrest
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbackrest
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pg.fullname" . }}-pgbackrest
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbackrest
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
rules:
  # Resolve the current primary pod via the primary service endpoints.
  - apiGroups: [""]
    resources: ["endpoints"]
    resourceNames: [{{ include "pg.fullname" . | quote }}]
    verbs: ["get"]
  # Exec into the pgbackrest sidecar of the primary pod to run the backup.
  # kubectl exec GETs the target pod then POSTs to its pods/exec subresource;
  # the backup only ever targets the resolved primary, which is always one of
  # the StatefulSet's deterministic pod names (<fullname>-0 .. <fullname>-N).
  # resourceNames scopes get on pods and create on the pods/exec subresource
  # (the pod name is in the request path), so a leaked SA token cannot exec into
  # arbitrary pods in the namespace (#134).
  - apiGroups: [""]
    resources: ["pods"]
    resourceNames:
      {{- range $i := until (int (add .Values.postgresql.replicaCount 1)) }}
      - {{ printf "%s-%d" (include "pg.fullname" $) $i | quote }}
      {{- end }}
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    resourceNames:
      {{- range $i := until (int (add .Values.postgresql.replicaCount 1)) }}
      - {{ printf "%s-%d" (include "pg.fullname" $) $i | quote }}
      {{- end }}
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pg.fullname" . }}-pgbackrest
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbackrest
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ include "pg.fullname" . }}-pgbackrest
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pg.fullname" . }}-pgbackrest
{{- end }}
