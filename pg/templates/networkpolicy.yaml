{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pg.fullname" . }}-postgresql
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  podSelector:
    matchLabels:
      {{- include "pg.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 5432
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgresql
{{- if .Values.pgpool.enabled }}
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: pgpool
{{- end }}
{{- if .Values.prometheusExporter.enabled }}
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: prometheus-exporter
{{- end }}
{{- if .Values.backup.enabled }}
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: backup
{{- end }}
{{- if .Values.networkPolicy.postgresql.allowExternal }}
        - podSelector: {}
{{- end }}
{{- with .Values.networkPolicy.postgresql.extraIngress }}
        {{- toYaml . | nindent 8 }}
{{- end }}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 5432
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgresql
{{- /*
443 covers HTTPS S3 endpoints and cloud API servers; 6443 covers the
API server on kubeadm-style clusters (service-updater and lifecycle
hooks run kubectl from these pods). NetworkPolicy matches the backend
port after service translation, so the in-cluster kubernetes Service
port 443 is not enough.
*/}}
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
{{- if .Values.pgbackrest.enabled }}
{{- $s3Port := include "pg.s3EndpointPort" .Values.pgbackrest.s3.endpoint | int }}
{{- if and (ne $s3Port 443) (ne $s3Port 6443) }}
        - port: {{ $s3Port }}
          protocol: TCP
{{- end }}
{{- end }}
{{- with .Values.networkPolicy.postgresql.extraEgress }}
    {{- toYaml . | nindent 4 }}
{{- end }}
---
{{- if .Values.pgpool.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pg.fullname" . }}-pgpool
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgpool
spec:
  podSelector:
    matchLabels:
      {{- include "pg.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pgpool
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 9999
          protocol: TCP
      from:
        - podSelector: {}
{{- with .Values.networkPolicy.pgpool.extraIngress }}
        {{- toYaml . | nindent 8 }}
{{- end }}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 5432
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgresql
{{- with .Values.networkPolicy.pgpool.extraEgress }}
    {{- toYaml . | nindent 4 }}
{{- end }}
{{- end }}
---
{{- if .Values.prometheusExporter.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pg.fullname" . }}-prometheus-exporter
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus-exporter
spec:
  podSelector:
    matchLabels:
      {{- include "pg.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prometheus-exporter
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 9116
          protocol: TCP
      from:
        - podSelector: {}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 5432
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgresql
{{- end }}
{{- end }}
