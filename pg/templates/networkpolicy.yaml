{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pg.fullname" . }}-postgresql
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "pg.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 5432
          protocol: TCP
      from:
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgresql
{{- if .Values.pgpool.enabled }}
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: pgpool
{{- end }}
{{- if .Values.prometheusExporter.enabled }}
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: prometheus-exporter
{{- end }}
{{- if .Values.backup.enabled }}
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: backup
{{- end }}
{{- if .Values.networkPolicy.postgresql.allowExternal }}
        - podSelector: {}
{{- end }}
{{- if eq (include "pg.agentMode" .) "true" }}
{{- /*
The agent serves Prometheus metrics + the /healthz/readyz endpoints on 9200 from
inside the postgresql pods; without this rule the CNI drops every scrape. Mirrors
the pgpool 9719 / exporter 9116 metrics rules.
*/}}
    - ports:
        - port: 9200
          protocol: TCP
      from:
        - podSelector: {}
{{- end }}
{{- /*
extraIngress entries are full ingress rules (each with its own from/ports),
spliced at the rules level -- symmetric with extraEgress. Previously they were
injected into the 5432 rule's `from:` list, which rejected rule-shaped input at
apply time and silently restricted peer-shaped input to port 5432 (#136).
*/}}
{{- with .Values.networkPolicy.postgresql.extraIngress }}
    {{- toYaml . | nindent 4 }}
{{- end }}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 5432
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgresql
{{- if .Values.pgpool.enabled }}
{{- /*
service-updater runs inside the postgresql pods and health-checks pgpool on
its backend port (9999) every tick; NetworkPolicy matches the post-DNAT pod
port, so without this egress rule the check times out and perpetually
rollout-restarts the pgpool Deployment (#129).
*/}}
    - ports:
        - port: {{ .Values.pgpool.service.port }}
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: pgpool
{{- end }}
{{- /*
443 covers HTTPS S3 endpoints and cloud API servers; 6443 covers the
API server on kubeadm-style clusters (service-updater and lifecycle
hooks run kubectl from these pods). NetworkPolicy matches the backend
port after service translation, so the in-cluster kubernetes Service
port 443 is not enough.
*/}}
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
{{- if .Values.pgbackrest.enabled }}
{{- $s3Port := include "pg.s3EndpointPort" .Values.pgbackrest.s3.endpoint | int }}
{{- if and (ne $s3Port 443) (ne $s3Port 6443) }}
        - port: {{ $s3Port }}
          protocol: TCP
{{- end }}
{{- end }}
{{- if eq (include "pg.agentEtcdMode" .) "true" }}
{{- /*
The agent's etcd DCS client dials the (BYO/shared) etcd endpoints on the client
port 2379. Endpoints are arbitrary external hosts, so this opens egress to 2379
cluster-wide (the same unrestricted-port shape as the 443/6443 apiserver rule).
*/}}
    - ports:
        - port: 2379
          protocol: TCP
{{- end }}
{{- with .Values.networkPolicy.postgresql.extraEgress }}
    {{- toYaml . | nindent 4 }}
{{- end }}
---
{{- if .Values.pgpool.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pg.fullname" . }}-pgpool
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgpool
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "pg.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pgpool
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 9999
          protocol: TCP
      from:
        - podSelector: {}
{{- if .Values.pgpool.metrics.enabled }}
{{- /*
pgpool advertises Prometheus scraping on 9719 (the pgpool2_exporter sidecar);
without this rule the CNI drops every scrape and pgpool metrics silently
disappear despite the scrape annotations the chart itself emits (#135). Mirrors
the prometheus-exporter policy's 9116 rule.
*/}}
    - ports:
        - port: 9719
          protocol: TCP
      from:
        - podSelector: {}
{{- end }}
{{- /* extraIngress: full ingress rules at the rules level, symmetric with extraEgress (#136) */}}
{{- with .Values.networkPolicy.pgpool.extraIngress }}
    {{- toYaml . | nindent 4 }}
{{- end }}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 5432
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgresql
{{- with .Values.networkPolicy.pgpool.extraEgress }}
    {{- toYaml . | nindent 4 }}
{{- end }}
{{- end }}
---
{{- if .Values.prometheusExporter.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pg.fullname" . }}-prometheus-exporter
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus-exporter
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "pg.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prometheus-exporter
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 9116
          protocol: TCP
      from:
        - podSelector: {}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 5432
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              {{- include "pg.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: postgresql
{{- end }}
{{- end }}
