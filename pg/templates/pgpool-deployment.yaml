{{- if .Values.pgpool.enabled }}
{{- /* Removed in favor of pgpool.admin.*; fail instead of silently falling
       back to the chart defaults when stale values are still set. */}}
{{- if or (hasKey .Values.pgpool "adminUsername") (hasKey .Values.pgpool "adminPassword") }}
{{- fail "pgpool.adminUsername and pgpool.adminPassword were removed: set pgpool.admin.username/pgpool.admin.password or bring your own Secret via pgpool.admin.existingSecret" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pg.fullname" . }}-pgpool
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgpool
spec:
  replicas: {{ .Values.pgpool.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "pg.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pgpool
  template:
    metadata:
      labels:
        {{- include "pg.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pgpool
      annotations:
        {{- /* pgpool.conf and pool_passwd are rendered into an emptyDir by
               the init container, so configmap changes only reach pods
               through a template-hash roll */}}
        checksum/pgpool-config: {{ include (print $.Template.BasePath "/pgpool-configmap.yaml") . | sha256sum }}
        {{- /* pcp.conf is generated into an emptyDir from the admin Secret,
               so chart-managed credential changes only apply via a roll */}}
        checksum/pgpool-admin-secret: {{ include (print $.Template.BasePath "/pgpool-secret.yaml") . | sha256sum }}
        {{- if .Values.pgpool.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "9719"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- with .Values.pgpool.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.pgpool.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.pgpool.topologySpreadConstraints | nindent 8 }}
      {{- end }}
      {{- with .Values.pgpool.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.pgpool.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pgpool.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- if .Values.pgpool.affinity }}
        {{- toYaml .Values.pgpool.affinity | nindent 8 }}
        {{- else }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "pg.selectorLabels" . | nindent 18 }}
                  app.kubernetes.io/component: pgpool
              topologyKey: kubernetes.io/hostname
        {{- end }}
      securityContext:
        {{- toYaml .Values.pgpool.podSecurityContext | nindent 8 }}
      initContainers:
        - name: init-config
          image: busybox:1.35
          securityContext:
            {{- toYaml .Values.pgpool.containerSecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              cp /config/pgpool.conf /usr/local/etc/pgpool.conf
              cp /config/pool_hba.conf /usr/local/etc/pool_hba.conf
              cp /config/pool_passwd /usr/local/etc/pool_passwd
              # pcp.conf entries are user:sha256(password); hashing here from
              # the admin Secret keeps the credentials out of the ConfigMap.
              printf '%s:%s\n' "$PCP_ADMIN_USER" "$(printf '%s' "$PCP_ADMIN_PASSWORD" | sha256sum | cut -d' ' -f1)" > /usr/local/etc/pcp.conf
              # Byte-safe placeholder splice: sed replacement corrupts
              # values containing / & or \, and awk -v assignments eat
              # backslashes, so values travel via ENVIRON.
              subst() {
                awk '
                  function splice(s, ph, val,   out, i) {
                    out = ""
                    while (i = index(s, ph)) { out = out substr(s, 1, i - 1) val; s = substr(s, i + length(ph)) }
                    return out s
                  }
                  { $0 = splice($0, "__POSTGRES_USER__", ENVIRON["SUB_USER"])
                    $0 = splice($0, "__POSTGRES_PASSWORD__", ENVIRON["SUB_PASS"])
                    $0 = splice($0, "__POSTGRES_DB__", ENVIRON["SUB_DB"])
                    print }
                ' "$1" > "$1.tmp" && mv "$1.tmp" "$1"
              }
              # pgpool.conf placeholders sit inside single-quoted strings;
              # its lexer escapes with backslash, not SQL-style doubling:
              # \ -> \\ first, then ' -> \'
              SUB_USER=$(printf '%s' "$POSTGRES_USER" | sed -e 's/\\/\\\\/g' -e "s/'/\\\\'/g")
              SUB_PASS=$(printf '%s' "$POSTGRES_PASSWORD" | sed -e 's/\\/\\\\/g' -e "s/'/\\\\'/g")
              SUB_DB=$(printf '%s' "$POSTGRES_DB" | sed -e 's/\\/\\\\/g' -e "s/'/\\\\'/g")
              export SUB_USER SUB_PASS SUB_DB
              subst /usr/local/etc/pgpool.conf
              # pool_passwd escapes backslash and the field separator with
              # backslash: \ -> \\ first, then : -> \:
              SUB_USER=$(printf '%s' "$POSTGRES_USER" | sed -e 's/\\/\\\\/g' -e 's/:/\\:/g')
              SUB_PASS=$(printf '%s' "$POSTGRES_PASSWORD" | sed -e 's/\\/\\\\/g' -e 's/:/\\:/g')
              SUB_DB="$POSTGRES_DB"
              subst /usr/local/etc/pool_passwd
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretUsernameKey" . }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretPasswordKey" . }}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretDatabaseKey" . }}
            - name: PCP_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.pgpoolAdminSecretName" . }}
                  key: {{ include "pg.pgpoolAdminUsernameKey" . }}
            - name: PCP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.pgpoolAdminSecretName" . }}
                  key: {{ include "pg.pgpoolAdminPasswordKey" . }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: pgpool-config
              mountPath: /usr/local/etc
      containers:
        - name: pgpool
          image: "{{ .Values.pgpool.image.repository }}:{{ .Values.pgpool.image.tag }}"
          imagePullPolicy: {{ .Values.pgpool.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.pgpool.containerSecurityContext | nindent 12 }}
          command:
            - pgpool
            - -D
            - -n
            - -f
            - /usr/local/etc/pgpool.conf
            - -F
            - /usr/local/etc/pcp.conf
            - -a
            - /usr/local/etc/pool_hba.conf
          ports:
            - name: pgpool
              containerPort: 9999
              protocol: TCP
            - name: pcp
              containerPort: 9898
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretUsernameKey" . }}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretDatabaseKey" . }}
          # Probes query through pgpool: a tcpSocket probe stays green on a
          # wedged pgpool that accepts TCP but rejects every session with
          # "all backend nodes are down" (#122). pool_hba trusts 127.0.0.1
          # on the frontend; the backend side authenticates via pool_passwd.
          # A failing liveness restarts pgpool with a fresh status file,
          # which re-runs backend discovery and reattaches recovered nodes.
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - PGCONNECT_TIMEOUT=3 psql -h 127.0.0.1 -p 9999 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -t -A -c "SELECT 1" > /dev/null
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - PGCONNECT_TIMEOUT=3 psql -h 127.0.0.1 -p 9999 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -t -A -c "SELECT 1" > /dev/null
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.pgpool.resources | nindent 12 }}
          volumeMounts:
            - name: pgpool-config
              mountPath: /usr/local/etc
{{- if .Values.pgpool.metrics.enabled }}
        - name: pgpool-exporter
          image: "{{ .Values.pgpool.metrics.image.repository }}:{{ .Values.pgpool.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.pgpool.metrics.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.pgpool.containerSecurityContext | nindent 12 }}
          env:
            - name: POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretUsernameKey" . }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretPasswordKey" . }}
            - name: POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "pg.secretName" . }}
                  key: {{ include "pg.secretDatabaseKey" . }}
            - name: PGPOOL_SERVICE
              value: "localhost"
            - name: PGPOOL_SERVICE_PORT
              value: "9999"
            - name: SSLMODE
              value: "disable"
          ports:
            - name: metrics
              containerPort: 9719
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: {{ .Values.pgpool.metrics.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.pgpool.metrics.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.pgpool.metrics.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.pgpool.metrics.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: {{ .Values.pgpool.metrics.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.pgpool.metrics.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.pgpool.metrics.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.pgpool.metrics.readinessProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.pgpool.metrics.resources | nindent 12 }}
{{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "pg.fullname" . }}-pgpool
        - name: pgpool-config
          emptyDir: {}
{{- end }}
