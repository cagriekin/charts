{{- if .Values.repmgr.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pg.fullname" . }}-service-updater
  labels:
    {{- include "pg.labels" . | nindent 4 }}
data:
  service-updater.sh: |
    #!/bin/bash
    # Intentionally no `set -e`: this sidecar is a long-running monitor whose
    # correctness depends on explicit per-call retry/tolerance counters
    # (CONSECUTIVE_FAILURES, PGPOOL_FAILURES). Under `set -e`, a single
    # transient kubectl/psql failure would kill the script before those
    # counters could act, turning a momentary blip into a pod restart. Error
    # handling is done explicitly below.

    NAMESPACE=${NAMESPACE:?NAMESPACE is required}
    MASTER_SERVICE=${MASTER_SERVICE:?MASTER_SERVICE is required}
    HEADLESS_SERVICE=${HEADLESS_SERVICE:?HEADLESS_SERVICE is required}
    REPMGR_DB=${REPMGR_DB:-repmgr}
    REPMGR_USER=${REPMGR_USER:-repmgr}
    REPMGR_PASSWORD=${REPMGR_PASSWORD:?REPMGR_PASSWORD is required}
    MONITORING_INTERVAL=${MONITORING_INTERVAL:-30}

    BASE_NAME="${HOSTNAME%-*}"

    echo "Starting service updater"
    echo "Namespace: ${NAMESPACE}, Service: ${MASTER_SERVICE}"

    if [ -z "$KUBERNETES_SERVICE_HOST" ]; then
        echo "Not running in Kubernetes, exiting"
        exit 0
    fi

    # Classify the cluster by ACTUAL role (pg_is_in_recovery), not by each
    # node's self-reported repmgr.nodes metadata. A resurrected stale primary
    # still has metadata claiming type='primary' active=true, so the old
    # metadata-based, ordinal-first scan would pick it and repoint writes to the
    # divergent node. pg_is_in_recovery()=f is ground truth: it is a real
    # read-write primary right now. Sets PRIMARY_NODES (space-separated FQDNs)
    # and PRIMARY_COUNT. The caller only moves the selector when exactly one
    # primary exists; two or more is a split-brain handled separately.
    scan_primaries() {
        PRIMARY_NODES=""
        PRIMARY_COUNT=0
        local i node in_recovery
        for i in $(seq 0 {{ .Values.postgresql.replicaCount }}); do
            node="${BASE_NAME}-${i}.${HEADLESS_SERVICE}"
            in_recovery=$(PGPASSWORD=${REPMGR_PASSWORD} timeout 10 psql -h "${node}" -p 5432 -U "${REPMGR_USER}" -d "${REPMGR_DB}" \
                -tAc "SELECT pg_is_in_recovery();" 2>/dev/null)
            if [ "$in_recovery" = "f" ]; then
                PRIMARY_COUNT=$((PRIMARY_COUNT + 1))
                PRIMARY_NODES="${PRIMARY_NODES}${PRIMARY_NODES:+ }${node}"
            fi
        done
    }

    # True (0) if LSN $1 is strictly greater than LSN $2. pg_current_wal_lsn()
    # returns unpadded hex `X/Y`, so a lexicographic `>` is wrong across digit-
    # width boundaries (9/.. vs 10/.., F/.. vs 100/..); compare the two hex
    # segments numerically instead. An empty $2 (no candidate yet) loses to any
    # valid LSN.
    lsn_gt() {
        local a="$1" b="$2"
        [ -z "$b" ] && return 0
        [ -z "$a" ] && return 1
        case "$a" in *'/'*) ;; *) return 1 ;; esac
        case "$b" in *'/'*) ;; *) return 0 ;; esac
        local ah=$((16#${a%%/*})) al=$((16#${a##*/}))
        local bh=$((16#${b%%/*})) bl=$((16#${b##*/}))
        if [ "$ah" -gt "$bh" ]; then return 0; fi
        if [ "$ah" -lt "$bh" ]; then return 1; fi
        [ "$al" -gt "$bl" ]
    }

    # Current timeline of a node that is a live primary (in_recovery=f). Read
    # from the WAL insert position, which reflects a fast promotion immediately.
    get_node_timeline() {
        PGPASSWORD=${REPMGR_PASSWORD} timeout 10 psql -h "$1" -p 5432 -U "${REPMGR_USER}" -d "${REPMGR_DB}" \
            -tAc "SELECT substring(pg_walfile_name(pg_current_wal_lsn()) from 1 for 8)::int;" 2>/dev/null
    }

    # Durable record of the cluster's highest-timeline primary, kept in a
    # ConfigMap that survives a full-cluster restart (unlike per-pod state) and
    # is owned at runtime rather than templated, so neither `helm upgrade` nor an
    # ArgoCD sync can reset it. It lets a node that boots first under OrderedReady
    # recognize it is stale even when the real primary is not up yet (#125).
    read_marker() {
        MARKER_PRIMARY=""
        MARKER_TL=0
        [ -z "$PRIMARY_MARKER" ] && return 0
        local data
        data=$(kubectl get configmap "${PRIMARY_MARKER}" -n "${NAMESPACE}" \
            -o jsonpath='{.data.primary}|{.data.timeline}' 2>/dev/null) || return 0
        MARKER_PRIMARY="${data%%|*}"
        local t="${data##*|}"
        case "$t" in ''|*[!0-9]*) MARKER_TL=0 ;; *) MARKER_TL="$t" ;; esac
    }

    write_marker() {
        local primary=$1 tl=$2
        [ -z "$PRIMARY_MARKER" ] && return 0
        # create-or-update idempotently; no heredoc so the rendered script has no
        # block-scalar indentation hazards
        if ! kubectl create configmap "${PRIMARY_MARKER}" -n "${NAMESPACE}" \
            --from-literal=primary="${primary}" --from-literal=timeline="${tl}" \
            --dry-run=client -o yaml | kubectl apply -f - >/dev/null 2>&1; then
            echo "WARNING: failed to update primary marker ${PRIMARY_MARKER} (${primary} timeline ${tl})"
        fi
    }

    # Failover audit trail: record a core/v1 Event on the primary Service.
    # core/v1 is used instead of events.k8s.io/v1 because it is accepted by
    # every kubectl via `create -f`, while the newer API requires
    # eventTime/reportingController fields with stricter validation.
    # Best-effort only: failures are logged as warnings and must never fail
    # or delay the selector update path.
    emit_primary_changed_event() {
        local old_master=$1
        local new_master=$2
        local service_uid
        local event_time

        # uid ties the Event to the live Service object so it shows up in
        # `kubectl describe service`; an empty uid still yields a valid Event
        service_uid=$(kubectl get service "${MASTER_SERVICE}" -n "${NAMESPACE}" -o jsonpath='{.metadata.uid}' 2>/dev/null)
        event_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)

        kubectl create -f - <<EOF
    apiVersion: v1
    kind: Event
    metadata:
      name: ${MASTER_SERVICE}.primary-changed.$(date +%s).${RANDOM}
      namespace: ${NAMESPACE}
    involvedObject:
      apiVersion: v1
      kind: Service
      name: ${MASTER_SERVICE}
      namespace: ${NAMESPACE}
      uid: "${service_uid}"
    reason: PrimaryChanged
    type: Normal
    message: Primary changed from ${old_master:-unknown} to ${new_master}
    source:
      component: service-updater
    firstTimestamp: ${event_time}
    lastTimestamp: ${event_time}
    count: 1
    EOF
        if [ $? -ne 0 ]; then
            echo "WARNING: failed to create PrimaryChanged event for ${MASTER_SERVICE} (${old_master:-unknown} -> ${new_master})"
        fi
    }

    update_service_selector() {
        local new_master=$1

        if [ -z "$new_master" ]; then
            return 1
        fi

        CURRENT_SELECTOR=$(kubectl get service "${MASTER_SERVICE}" -n "${NAMESPACE}" -o jsonpath='{.spec.selector.statefulset\.kubernetes\.io/pod-name}')

        if [ "$CURRENT_SELECTOR" = "$new_master" ]; then
            return 0
        fi

        echo "Updating service selector to: ${new_master}"

        if ! kubectl patch service "${MASTER_SERVICE}" -n "${NAMESPACE}" --type merge -p "{
            \"spec\": {
                \"selector\": {
                    \"statefulset.kubernetes.io/pod-name\": \"${new_master}\"
                }
            }
        }"; then
            return 1
        fi

        # Emitted strictly after a successful patch: the patch is
        # correctness, the Event is observability
        emit_primary_changed_event "${CURRENT_SELECTOR}" "${new_master}"
    }

    update_pod_role_labels() {
        local master=$1

        if [ -z "$master" ]; then
            return 1
        fi

        # Converge pg-role labels on every tick, not just on master change:
        # pods recreated by the StatefulSet or added after a scale-up start
        # without a pg-role label and would otherwise never be picked up by
        # the readonly Service (which selects pg-role=standby). kubectl label
        # requires the pods patch verb granted in rbac.yaml.
        local pod_roles
        pod_roles=$(kubectl get pods -n "${NAMESPACE}" \
            -l "app.kubernetes.io/name={{ include "pg.name" . }},app.kubernetes.io/instance={{ .Release.Name }},app.kubernetes.io/component=postgresql" \
            -o jsonpath='{range .items[*]}{.metadata.name} {.metadata.labels.pg-role}{"\n"}{end}' 2>/dev/null)

        local pod current_role desired_role
        while read -r pod current_role; do
            if [ -z "$pod" ]; then
                continue
            fi

            desired_role="standby"
            if [ "$pod" = "$master" ]; then
                desired_role="primary"
            fi

            if [ "$current_role" != "$desired_role" ]; then
                echo "Labeling pod ${pod} pg-role=${desired_role}"
                kubectl label pod "${pod}" -n "${NAMESPACE}" "pg-role=${desired_role}" --overwrite
            fi
        done <<< "${pod_roles}"
    }

    restart_pgpool() {
        if [ -z "$PGPOOL_DEPLOYMENT" ]; then
            return 0
        fi

        if [ "$CURRENT_MASTER" != "$HOSTNAME" ]; then
            return 0
        fi

        echo "Restarting pgpool deployment: ${PGPOOL_DEPLOYMENT}"
        kubectl rollout restart deployment "${PGPOOL_DEPLOYMENT}" -n "${NAMESPACE}"
    }

    check_pgpool_health() {
        if [ -z "$PGPOOL_SERVICE" ]; then
            return
        fi

        if [ "$CURRENT_MASTER" != "$HOSTNAME" ]; then
            return
        fi

        pgpool_check_rc=0
        PGPASSWORD=${POSTGRES_PASSWORD} timeout 5 psql \
            -h "${PGPOOL_SERVICE}" -p "${PGPOOL_PORT}" \
            -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" \
            -t -c "SELECT 1;" > /dev/null 2>&1 || pgpool_check_rc=$?

        if [ $pgpool_check_rc -ne 0 ]; then
            PGPOOL_FAILURES=$((PGPOOL_FAILURES + 1))
            echo "WARNING: pgpool health check failed ($PGPOOL_FAILURES/${MAX_PGPOOL_FAILURES})"
            if [ $PGPOOL_FAILURES -ge $MAX_PGPOOL_FAILURES ]; then
                echo "pgpool unresponsive after $PGPOOL_FAILURES consecutive failures, restarting"
                kubectl rollout restart deployment "${PGPOOL_DEPLOYMENT}" -n "${NAMESPACE}"
                PGPOOL_FAILURES=0
            fi
        else
            PGPOOL_FAILURES=0
        fi
    }

    # Called only when scan_primaries found >= 2 live primaries (split-brain).
    # action=log just warns; action=fence picks a survivor and removes the rest.
    handle_split_brain() {
        echo "CRITICAL: Split-brain detected! ${PRIMARY_COUNT} primaries found: ${PRIMARY_NODES}"

        local split_brain_action="${SPLIT_BRAIN_ACTION:-log}"
        [ "$split_brain_action" = "fence" ] || return 0

        # Survivor = highest timeline, then highest LSN. Timeline MUST dominate:
        # a stale old primary that kept writing on the old timeline can have a
        # higher LSN than the legitimately promoted primary on the new timeline,
        # and keeping the stale node would discard the post-failover history.
        # Timeline comes from the WAL insert position (immediate after a fast
        # promotion), not pg_control_checkpoint (which lags minutes under load).
        local best_node="" best_tl=-1 best_lsn=""
        local node tl_lsn tl lsn tl_dec
        for node in ${PRIMARY_NODES}; do
            tl_lsn=$(PGPASSWORD=${REPMGR_PASSWORD} timeout 10 psql -h "${node}" -p 5432 -U "${REPMGR_USER}" -d "${REPMGR_DB}" \
                -tAc "SELECT substring(pg_walfile_name(pg_current_wal_lsn()) from 1 for 8), pg_current_wal_lsn();" 2>/dev/null)
            tl="${tl_lsn%%|*}"
            lsn="${tl_lsn##*|}"
            case "$tl" in ''|*[!0-9A-Fa-f]*) echo "  ${node}: unreadable timeline, skipping"; continue ;; esac
            tl_dec=$((16#$tl))
            echo "  ${node}: timeline ${tl_dec} LSN ${lsn}"
            if [ "$tl_dec" -gt "$best_tl" ] || { [ "$tl_dec" -eq "$best_tl" ] && lsn_gt "$lsn" "$best_lsn"; }; then
                best_tl="$tl_dec"
                best_lsn="$lsn"
                best_node="$node"
            fi
        done

        if [ -z "$best_node" ]; then
            echo "Fencing: no survivor with a readable timeline/LSN; taking no action this tick"
            return 0
        fi

        local best_pod
        best_pod=$(echo "${best_node}" | cut -d'.' -f1)
        echo "Fencing: keeping ${best_pod} as primary (timeline ${best_tl}, LSN ${best_lsn})"

        # Terminate backends on and delete EVERY stale primary (not just the
        # last one seen), so 3+ way split-brains fully resolve; each deleted pod
        # rejoins as a standby via the image's pg_rewind stale-primary guard.
        for node in ${PRIMARY_NODES}; do
            [ "$node" = "$best_node" ] && continue
            local stale_pod
            stale_pod=$(echo "${node}" | cut -d'.' -f1)
            echo "Fencing: terminating backends on stale primary ${node}"
            PGPASSWORD=${REPMGR_PASSWORD} timeout 10 psql -h "${node}" -p 5432 -U "${REPMGR_USER}" -d "${REPMGR_DB}" \
                -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE pid <> pg_backend_pid();" 2>/dev/null || true
            echo "Fencing: deleting stale primary pod ${stale_pod} to force rejoin as standby"
            kubectl delete pod "${stale_pod}" -n "${NAMESPACE}" --grace-period=30 2>/dev/null || true
        done

        echo "Fencing: updating service selector to ${best_pod}"
        update_service_selector "${best_pod}"
        update_pod_role_labels "${best_pod}"
    }

    LAST_MASTER=""
    CONSECUTIVE_FAILURES=0
    MAX_CONSECUTIVE_FAILURES=5
    PGPOOL_FAILURES=0
    MAX_PGPOOL_FAILURES=3

    while true; do
        date +%s > /tmp/service-updater-alive
        scan_primaries

        if [ "$PRIMARY_COUNT" -eq 1 ]; then
            CURRENT_MASTER=$(echo ${PRIMARY_NODES} | cut -d'.' -f1)
            current_tl=$(get_node_timeline "${PRIMARY_NODES}")
            read_marker

            # Stale-resurrection guard (#125): on a full-cluster restart under
            # OrderedReady, the lowest-ordinal pod boots first and ALONE, so it
            # can be the only live primary even though it is stale (a higher
            # timeline was promoted before the restart). The durable marker
            # records the highest timeline ever served; refuse to route writes to
            # a lone primary below it. A legitimate new failover always has a
            # HIGHER timeline than the marker, so it is never blocked.
            skip_select=false
            case "$current_tl" in
                ''|*[!0-9]*)
                    if [ "$MARKER_TL" -gt 0 ]; then
                        echo "WARNING: cannot read timeline of ${CURRENT_MASTER}; keeping current selector this tick"
                        skip_select=true
                    fi
                    ;;
                *)
                    if [ "$MARKER_TL" -gt 0 ] && [ "$current_tl" -lt "$MARKER_TL" ]; then
                        echo "CRITICAL: only live primary ${CURRENT_MASTER} is on timeline ${current_tl}, below the recorded primary ${MARKER_PRIMARY} on timeline ${MARKER_TL}; refusing to route writes to a stale node. If ${MARKER_PRIMARY} is permanently lost, accept its data loss with: kubectl -n ${NAMESPACE} delete configmap ${PRIMARY_MARKER}"
                        skip_select=true
                    fi
                    ;;
            esac

            if [ "$skip_select" = true ]; then
                CURRENT_MASTER=""
            else
                # Re-assert the selector on every tick. update_service_selector is
                # a no-op if the selector already matches; calling it
                # unconditionally makes the loop self-healing against external
                # mutations (e.g. ArgoCD re-applying the chart's hardcoded
                # `pod-name: <fullname>-0` selector after a sync). Without this,
                # one ArgoCD sync after a failover stranded the primary service
                # pointing at the wrong pod indefinitely.
                update_service_selector "$CURRENT_MASTER"
                update_pod_role_labels "$CURRENT_MASTER"

                # Advance the durable highwater marker (monotonic: only reached
                # when current_tl >= MARKER_TL). Written only on change to avoid
                # patching the ConfigMap every tick.
                case "$current_tl" in
                    ''|*[!0-9]*) ;;
                    *)
                        if [ "$CURRENT_MASTER" != "$MARKER_PRIMARY" ] || [ "$current_tl" != "$MARKER_TL" ]; then
                            write_marker "$CURRENT_MASTER" "$current_tl"
                        fi
                        ;;
                esac

                if [ "$CURRENT_MASTER" != "$LAST_MASTER" ]; then
                    echo "Master change: ${LAST_MASTER} -> ${CURRENT_MASTER}"
                    restart_pgpool
                    LAST_MASTER="$CURRENT_MASTER"
                    PGPOOL_FAILURES=0
                fi
                CONSECUTIVE_FAILURES=0
                check_pgpool_health
            fi
        elif [ "$PRIMARY_COUNT" -ge 2 ]; then
            # Two or more live primaries: the cluster state is ambiguous, so do
            # NOT move the selector or relabel pods based on it. The selector
            # keeps pointing where it was (the legitimate primary, in the common
            # stale-resurrection case). handle_split_brain resolves it under
            # action=fence by the timeline/LSN survivor; under log it only warns.
            CURRENT_MASTER=""
            handle_split_brain
        else
            # No primary visible this tick: keep the current selector rather
            # than thrash it to empty; the next tick re-asserts once a primary
            # is reachable again.
            CURRENT_MASTER=""
            CONSECUTIVE_FAILURES=$((CONSECUTIVE_FAILURES + 1))
            if [ $CONSECUTIVE_FAILURES -ge $MAX_CONSECUTIVE_FAILURES ]; then
                echo "WARNING: no primary found (failed $CONSECUTIVE_FAILURES times)"
                CONSECUTIVE_FAILURES=0
            fi
        fi

        sleep ${MONITORING_INTERVAL}
    done
{{- end }}
