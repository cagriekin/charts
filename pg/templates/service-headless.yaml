apiVersion: v1
kind: Service
metadata:
  name: {{ include "pg.fullname" . }}-headless
  labels:
    {{- include "pg.labels" . | nindent 4 }}
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
{{- if eq (include "pg.agentMode" .) "true" }}
    # the pg-ha-agent's read-only Prometheus metrics + /healthz (agent mode only),
    # so a ServiceMonitor can discover them on the per-pod headless endpoints.
    - name: agent-metrics
      port: 9200
      targetPort: agent-metrics
      protocol: TCP
{{- end }}
  selector:
    {{- include "pg.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
