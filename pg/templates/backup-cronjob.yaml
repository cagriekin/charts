{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "pg.fullname" . }}-backup
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.backup.activeDeadlineSeconds }}
      backoffLimit: {{ .Values.backup.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "pg.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backup.priorityClassName }}
          priorityClassName: {{ . }}
          {{- end }}
          restartPolicy: OnFailure
          # The backup job talks only to PostgreSQL + S3, never the Kubernetes API (#166).
          automountServiceAccountToken: false
          securityContext:
            {{- toYaml .Values.backup.podSecurityContext | nindent 12 }}
          initContainers:
            - name: mc-installer
              image: "{{ .Values.backup.mc.image.repository }}:{{ .Values.backup.mc.image.tag }}"
              imagePullPolicy: {{ .Values.backup.mc.image.pullPolicy }}
              # /usr/bin/mc in the minio/mc image is mode 0711, readable only
              # by root, so the copy must run as root; the backup container
              # stays non-root
              securityContext:
                runAsUser: 0
                runAsNonRoot: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              command: ["/bin/sh", "-c", "cp /usr/bin/mc /tools/mc && chmod 0755 /tools/mc && cp /etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem /tools/ca-bundle.crt"]
              volumeMounts:
                - name: tools
                  mountPath: /tools
          containers:
            - name: backup
              image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
              imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
              securityContext:
                {{- toYaml .Values.backup.containerSecurityContext | nindent 16 }}
              command: ["/bin/bash", "/scripts/backup.sh"]
              env:
                - name: POSTGRES_HOST
                  value: {{ printf "%s.%s.svc.cluster.local" (include "pg.fullname" .) .Release.Namespace | quote }}
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "pg.secretName" . }}
                      key: {{ include "pg.secretUsernameKey" . }}
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "pg.secretName" . }}
                      key: {{ include "pg.secretPasswordKey" . }}
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "pg.secretName" . }}
                      key: {{ include "pg.secretDatabaseKey" . }}
                - name: S3_ENDPOINT
                  value: {{ required "backup.s3.endpoint is required when backup is enabled" .Values.backup.s3.endpoint | quote }}
                - name: S3_BUCKET
                  value: {{ required "backup.s3.bucket is required when backup is enabled" .Values.backup.s3.bucket | quote }}
                - name: S3_PREFIX
                  value: {{ .Values.backup.s3.prefix | quote }}
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ required "backup.existingSecret.name is required when backup is enabled" (include "pg.backupSecretName" .) }}
                      key: {{ include "pg.backupAccessKeyIdKey" . }}
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "pg.backupSecretName" . }}
                      key: {{ include "pg.backupSecretAccessKeyKey" . }}
                - name: RETENTION_DAYS
                  value: {{ .Values.backup.retentionDays | quote }}
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: tools
                  mountPath: /tools
          volumes:
            - name: scripts
              configMap:
                name: {{ include "pg.fullname" . }}-backup
                defaultMode: 0755
            - name: tools
              emptyDir: {}
{{- end }}
