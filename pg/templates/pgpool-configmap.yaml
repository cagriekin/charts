{{- if .Values.pgpool.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pg.fullname" . }}-pgpool
  labels:
    {{- include "pg.labels" . | nindent 4 }}
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  pgpool.conf: |
    listen_addresses = '*'
    port = 9999
    socket_dir = '/tmp'
    pcp_listen_addresses = '*'
    pcp_port = 9898
    pcp_socket_dir = '/tmp'

{{- if eq (include "pg.agentMode" .) "true" }}
    # agent mode: pgpool fronts the RW (<fullname>) and RO (<fullname>-readonly)
    # Services for single-endpoint read/write split. The agent owns failover, so
    # pgpool never changes roles -- writes pin to the ALWAYS_PRIMARY backend, reads
    # balance to the RO backend (primary weight 0). DISALLOW_TO_FAILOVER on both +
    # failover_command='' keep pgpool a stateless router; health checks stay ON so
    # it recycles connections when the RW Service endpoint moves after a failover.
    backend_hostname0 = '{{ include "pg.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local'
    backend_port0 = 5432
    backend_weight0 = 0
    backend_flag0 = 'ALWAYS_PRIMARY|DISALLOW_TO_FAILOVER'
    backend_application_name0 = 'primary'

    backend_hostname1 = '{{ include "pg.fullname" . }}-readonly.{{ .Release.Namespace }}.svc.cluster.local'
    backend_port1 = 5432
    backend_weight1 = 1
    backend_flag1 = 'DISALLOW_TO_FAILOVER'
    backend_application_name1 = 'readonly'
{{- else if .Values.repmgr.enabled }}
    {{- range $i := until (int (add .Values.postgresql.replicaCount 1)) }}
    backend_hostname{{ $i }} = '{{ include "pg.fullname" $ }}-{{ $i }}.{{ include "pg.fullname" $ }}-headless.{{ $.Release.Namespace }}.svc.cluster.local'
    backend_port{{ $i }} = 5432
    backend_weight{{ $i }} = 1
    backend_flag{{ $i }} = 'DISALLOW_TO_FAILOVER'
    backend_application_name{{ $i }} = 'node{{ $i }}'

    {{- end }}
{{- else }}
    backend_hostname0 = '{{ include "pg.fullname" . }}-0.{{ include "pg.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local'
    backend_port0 = 5432
    backend_weight0 = 1
    backend_flag0 = 'ALWAYS_PRIMARY'
    backend_application_name0 = 'primary'

    {{- range $i := until (int (add .Values.postgresql.replicaCount 1)) }}
    {{- if gt $i 0 }}
    backend_hostname{{ $i }} = '{{ include "pg.fullname" $ }}-{{ $i }}.{{ include "pg.fullname" $ }}-headless.{{ $.Release.Namespace }}.svc.cluster.local'
    backend_port{{ $i }} = 5432
    backend_weight{{ $i }} = 1
    backend_flag{{ $i }} = 'DISALLOW_TO_FAILOVER'
    backend_application_name{{ $i }} = 'replica{{ $i }}'

    {{- end }}
    {{- end }}
{{- end }}

    enable_pool_hba = on
    pool_passwd = 'pool_passwd'

    num_init_children = {{ .Values.pgpool.numInitChildren }}
    max_pool = {{ .Values.pgpool.maxPool }}
    child_life_time = {{ .Values.pgpool.childLifeTime }}
    child_max_connections = 0
    connection_life_time = {{ .Values.pgpool.connectionLifeTime }}
    client_idle_limit = {{ .Values.pgpool.clientIdleLimit }}

    connection_cache = on
    reset_query_list = '{{ .Values.pgpool.resetQueryList }}'
    load_balance_mode = on
    ssl = off

    pg_keepalives_idle = {{ .Values.pgpool.tcpKeepalive.idle }}
    pg_keepalives_interval = {{ .Values.pgpool.tcpKeepalive.interval }}
    pg_keepalives_count = {{ .Values.pgpool.tcpKeepalive.count }}

    log_destination = 'stderr'
    log_line_prefix = '%t: pid %p: '
    log_connections = {{ if .Values.pgpool.logging.logConnections }}on{{ else }}off{{ end }}
    log_hostname = off
    log_statement = {{ if .Values.pgpool.logging.logStatement }}on{{ else }}off{{ end }}
    log_per_node_statement = {{ if .Values.pgpool.logging.logPerNodeStatement }}on{{ else }}off{{ end }}
    log_min_messages = {{ .Values.pgpool.logging.logMinMessages }}
    log_client_messages = off
    log_standby_delay = 'if_over_threshold'

    syslog_facility = 'LOCAL0'
    syslog_ident = 'pgpool'

    pid_file_name = '/tmp/pgpool.pid'
    logdir = '/tmp'

    connection_pool_mode = session

    backend_clustering_mode = 'streaming_replication'

{{- if .Values.repmgr.enabled }}
    sr_check_period = 10
    detach_false_primary = off
{{- else }}
    sr_check_period = 0
{{- end }}
    # Check/recovery passwords are deliberately blank: pgpool then reads
    # them from pool_passwd, which carries raw bytes. Conf-string escaping
    # of arbitrary existingSecret passwords does not round-trip the lexer.
    sr_check_user = '__POSTGRES_USER__'
    sr_check_password = ''
    sr_check_database = '__POSTGRES_DB__'

    health_check_period = {{ .Values.pgpool.healthCheck.period }}
    health_check_timeout = {{ .Values.pgpool.healthCheck.timeout }}
    health_check_user = '__POSTGRES_USER__'
    health_check_password = ''
    health_check_database = '__POSTGRES_DB__'
    health_check_max_retries = {{ .Values.pgpool.healthCheck.maxRetries }}
    health_check_retry_delay = {{ .Values.pgpool.healthCheck.retryDelay }}

    failover_command = ''
    failback_command = ''
    fail_over_on_backend_error = {{ if .Values.pgpool.failOverOnBackendError }}on{{ else }}off{{ end }}
{{- if .Values.repmgr.enabled }}
    auto_failback = {{ if .Values.pgpool.autoFailback }}on{{ else }}off{{ end }}
    auto_failback_interval = 30
{{- end }}

    recovery_user = '__POSTGRES_USER__'
    recovery_password = ''
    recovery_1st_stage_command = ''

    allow_clear_text_frontend_auth = {{ if .Values.pgpool.allowClearTextFrontendAuth }}on{{ else }}off{{ end }}

  pool_hba.conf: |
    local   all         all                               trust
    host    all         all         127.0.0.1/32          trust
    host    all         all         ::1/128               trust
    host    all         all         0.0.0.0/0             md5

  pool_passwd: |
    {{- /* TEXT marks the entry as cleartext: unprefixed entries are taken
           as md5 hashes, which work against md5 backends by accident but
           cannot answer scram challenges */}}
    __POSTGRES_USER__:TEXT__POSTGRES_PASSWORD__
{{- end }}
