{{- if .Values.prometheusExporter.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pg.fullname" . }}-postgres-exporter
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  postgres_exporter.yml: |
    auth_modules:
      postgres:
        type: userpass
        userpass:
          username: '__POSTGRES_USER__'
          password: '__POSTGRES_PASSWORD__'
        options:
          sslmode: disable
  queries.yaml: |
    # The exporter's built-in replication collector already serves
    # pg_replication_lag_seconds and pg_replication_is_replica; reusing the
    # pg_replication namespace makes the Prometheus registry reject every
    # scrape with a help-text mismatch, so the extra metrics get their own.
    pg_wal_replication:
      # The receive/replay LSN functions return NULL on a primary; COALESCE
      # keeps the metric emitted without errors.
      query: |
        SELECT
          pg_is_in_recovery()::int AS in_recovery,
          COALESCE(pg_wal_lsn_diff(pg_last_wal_receive_lsn(), pg_last_wal_replay_lsn()), 0) AS receive_replay_lag_bytes
      master: true
      metrics:
        - in_recovery:
            usage: "GAUGE"
            description: "1 when the instance is in recovery (standby), 0 when it is a primary"
        - receive_replay_lag_bytes:
            usage: "GAUGE"
            description: "Bytes of WAL received from the primary but not yet replayed; 0 on the primary"
{{- if .Values.pgbackrest.enabled }}
    # WAL archiving health (#30). archive_mode is on only when pgBackRest is
    # enabled, so this group is gated on it and scraped on the primary (archiving
    # happens there). pg_stat_archiver is readable without filesystem/superuser
    # access, so it does not depend on the exporter running as a superuser.
    # failed_count rising = archive_command failing; seconds_since_last_archived
    # rising while WAL is generated = archiving falling behind.
    pg_wal_archive:
      query: |
        SELECT
          archived_count,
          failed_count,
          COALESCE(EXTRACT(EPOCH FROM (now() - last_archived_time))::float, -1) AS seconds_since_last_archived,
          COALESCE(EXTRACT(EPOCH FROM (now() - last_failed_time))::float, -1) AS seconds_since_last_failed
        FROM pg_stat_archiver
        -- Emit only on the primary: a standby's pg_stat_archiver reflects its own
        -- (non-)archiving and would otherwise add misleading series. On a standby
        -- this returns zero rows, so no metric is produced there.
        WHERE NOT pg_is_in_recovery()
      master: true
      metrics:
        - archived_count:
            usage: "COUNTER"
            description: "WAL segments successfully archived since the last stats reset"
        - failed_count:
            usage: "COUNTER"
            description: "Failed WAL archive attempts since the last stats reset (archive_command failures)"
        - seconds_since_last_archived:
            usage: "GAUGE"
            description: "Seconds since the last successful WAL archive (-1 if none yet); rising while WAL is generated indicates archiving lag"
        - seconds_since_last_failed:
            usage: "GAUGE"
            description: "Seconds since the last failed WAL archive attempt (-1 if none)"
{{- end }}
{{- end }}
