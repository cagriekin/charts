{{- if .Values.pgbackrest.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pg.fullname" . }}-pgbackrest-scripts
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgbackrest
data:
  pgbackrest-scheduler.sh: |
    #!/bin/bash
    set -euo pipefail

    PGBACKREST_STANZA=${PGBACKREST_STANZA:?PGBACKREST_STANZA is required}
    FULL_SCHEDULE=${FULL_SCHEDULE:?FULL_SCHEDULE is required}
    DIFF_SCHEDULE=${DIFF_SCHEDULE:?DIFF_SCHEDULE is required}

    export PATH=$PATH:/usr/lib/postgresql/18/bin

    echo "Waiting for PostgreSQL..."
    for i in $(seq 1 120); do
      if pg_isready -h /var/run/postgresql -p 5432 > /dev/null 2>&1; then
        echo "PostgreSQL is ready"
        break
      fi
      if [ "$i" = "120" ]; then
        echo "ERROR: Timed out waiting for PostgreSQL"
        exit 1
      fi
      sleep 2
    done

    IN_RECOVERY=$(psql -h /var/run/postgresql -U postgres -d postgres -t -c "SELECT pg_is_in_recovery();" 2>/dev/null | xargs)
    if [ "$IN_RECOVERY" = "t" ]; then
      echo "This node is a standby, sleeping indefinitely"
      exec sleep infinity
    fi

    echo "Running stanza-create..."
    pgbackrest --stanza="${PGBACKREST_STANZA}" stanza-create 2>/dev/null || true

    echo "Writing crontab..."
    env | grep -E '^(PGBACKREST_|PATH=)' > /tmp/pgbackrest-env
    {
      while IFS= read -r line; do echo "$line"; done < /tmp/pgbackrest-env
      echo "${FULL_SCHEDULE} /scripts/pgbackrest-run.sh full >> /proc/1/fd/1 2>&1"
      echo "${DIFF_SCHEDULE} /scripts/pgbackrest-run.sh diff >> /proc/1/fd/1 2>&1"
    } > /tmp/pgbackrest-crontab

    crontab /tmp/pgbackrest-crontab
    echo "Scheduler started"
    exec cron -f

  pgbackrest-run.sh: |
    #!/bin/bash
    set -euo pipefail

    BACKUP_TYPE=${1:?backup type is required (full or diff)}
    PGBACKREST_STANZA=${PGBACKREST_STANZA:?PGBACKREST_STANZA is required}

    export PATH=$PATH:/usr/lib/postgresql/18/bin

    IN_RECOVERY=$(psql -h /var/run/postgresql -U postgres -d postgres -t -c "SELECT pg_is_in_recovery();" 2>/dev/null | xargs)
    if [ "$IN_RECOVERY" = "t" ]; then
      echo "Standby node, skipping ${BACKUP_TYPE} backup"
      exit 0
    fi

    echo "Starting ${BACKUP_TYPE} backup..."
    pgbackrest --stanza="${PGBACKREST_STANZA}" --type="${BACKUP_TYPE}" backup

    echo "${BACKUP_TYPE} backup completed"
    pgbackrest --stanza="${PGBACKREST_STANZA}" info

    echo "Verifying backup integrity..."
    pgbackrest --stanza="${PGBACKREST_STANZA}" verify
    echo "Backup verification completed"
{{- end }}
