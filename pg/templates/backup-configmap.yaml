{{- if .Values.backup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pg.fullname" . }}-backup
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  backup.sh: |
    #!/bin/bash
    set -euo pipefail

    for var in POSTGRES_HOST POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB S3_ENDPOINT S3_BUCKET S3_ACCESS_KEY S3_SECRET_KEY S3_PREFIX RETENTION_DAYS; do
      if [ -z "${!var}" ]; then
        echo "ERROR: Required environment variable $var is not set"
        exit 1
      fi
    done

    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    # Namespace every object under a per-release subpath (#143) so a retention
    # pass never sees, counts, or deletes another release's dumps when multiple
    # releases share one bucket/prefix. Mirrors the pgBackRest repo layout
    # (repo1-path=/<prefix>/<fullname>). The fullname is release-unique.
    # Strip any trailing slash on the prefix so the key never gets an empty
    # segment (b/backups//<fullname>); upload, guard, and retention then agree.
    S3_DIR="${S3_BUCKET}/${S3_PREFIX%/}/{{ include "pg.fullname" . }}"
    S3_PATH="${S3_DIR}/backup_${TIMESTAMP}.dump"

    export PATH="/tools:${PATH}"
    export MC_CONFIG_DIR=/tmp/.mc
    # postgres image ships no CA bundle; use the one copied from the mc image
    export SSL_CERT_FILE=/tools/ca-bundle.crt

    echo "Configuring S3 alias..."
    mc alias set s3 "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"

    echo "Starting streaming backup to s3/${S3_PATH}..."
    PGPASSWORD="$POSTGRES_PASSWORD" pg_dump -Fc -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" | mc pipe "s3/${S3_PATH}"

    echo "Verifying upload..."
    UPLOADED_SIZE=$(mc ls --json "s3/${S3_PATH}" | grep -o '"size":[0-9]*' | grep -o '[0-9]*')
    if [ -z "$UPLOADED_SIZE" ] || [ "$UPLOADED_SIZE" -eq 0 ]; then
      echo "ERROR: Upload verification failed - file missing or zero bytes"
      exit 1
    fi
    echo "Upload verified: ${UPLOADED_SIZE} bytes"

    echo "Verifying backup integrity via pg_restore --list..."
    mc cat "s3/${S3_PATH}" > /tmp/verify_backup.dump
    pg_restore --list /tmp/verify_backup.dump > /dev/null
    echo "Backup integrity verified"
    rm -f /tmp/verify_backup.dump

    # Guard against wiping the whole prefix: the dump uploaded above must be
    # visible as a recent object. If it is not (upload landed elsewhere,
    # prefix mismatch, clock skew), deletion must not run. Scoped to this
    # release's subpath and dump objects only (#143).
    echo "Verifying a recent backup exists before retention cleanup..."
    RECENT_COUNT=$(mc find "s3/${S3_DIR}/" --name 'backup_*.dump' --newer-than "${RETENTION_DAYS}d" | grep -c . || true)
    if [ "$RECENT_COUNT" -eq 0 ]; then
      echo "ERROR: No backup newer than ${RETENTION_DAYS} days found under s3/${S3_DIR}/ - aborting retention cleanup" >&2
      exit 1
    fi
    echo "Found ${RECENT_COUNT} recent backup(s)"

    # Delete only this release's own dump objects under its subpath: the per-release
    # path isolates releases, and --name keeps unrelated objects a user may store
    # under the prefix safe (#143).
    echo "Running retention cleanup (removing backups older than ${RETENTION_DAYS} days)..."
    mc find "s3/${S3_DIR}/" --name 'backup_*.dump' --older-than "${RETENTION_DAYS}d" --exec "mc rm {}"

    echo "Backup completed successfully"
{{- end }}
