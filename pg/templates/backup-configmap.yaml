{{- if .Values.backup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pg.fullname" . }}-backup
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
data:
  backup.sh: |
    #!/bin/bash
    set -euo pipefail

    for var in POSTGRES_HOST POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB S3_ENDPOINT S3_BUCKET S3_ACCESS_KEY S3_SECRET_KEY S3_PREFIX RETENTION_DAYS; do
      if [ -z "${!var}" ]; then
        echo "ERROR: Required environment variable $var is not set"
        exit 1
      fi
    done

    TIMESTAMP=$(date +%Y%m%d_%H%M%S)
    # Namespace every object under a per-release subpath (#143) so a retention
    # pass never sees, counts, or deletes another release's dumps when multiple
    # releases share one bucket/prefix. Mirrors the pgBackRest repo layout
    # (repo1-path=/<prefix>/<fullname>). The fullname is release-unique.
    # Strip any trailing slash on the prefix so the key never gets an empty
    # segment (b/backups//<fullname>); upload, guard, and retention then agree.
    S3_DIR="${S3_BUCKET}/${S3_PREFIX%/}/{{ include "pg.fullname" . }}"
    S3_PATH="${S3_DIR}/backup_${TIMESTAMP}.dump"

    export PATH="/tools:${PATH}"
    export MC_CONFIG_DIR=/tmp/.mc
    # postgres image ships no CA bundle; use the one copied from the mc image
    export SSL_CERT_FILE=/tools/ca-bundle.crt

    # Provide S3 credentials to mc WITHOUT exposing them in the process argv
    # (/proc/<pid>/cmdline, readable via ps) -- the reason #167 moved off
    # `mc alias set ... <access> <secret>`. #167 percent-encoded the keys into an
    # MC_HOST_<alias> URL, but mc signs SigV4 with the *encoded* secret, so a key
    # containing '/' or '+' (common in real AWS secret keys) produced a signature
    # mismatch and every upload failed (#221). Instead write a 0600 credential doc
    # and import it with `mc alias import`, which feeds the RAW secret to the
    # signer regardless of character set. mc persists it to $MC_CONFIG_DIR/config.json
    # (mode 0600); the temporary doc is removed right after the import.
    case "$S3_ENDPOINT" in
      *://*) ;;
      *) echo "ERROR: S3_ENDPOINT must include a scheme (http:// or https://)" >&2; exit 1 ;;
    esac
    json_escape() {
      # Escape a value for embedding in a JSON double-quoted string. LC_ALL=C
      # forces byte-wise iteration: under the image's UTF-8 locale ${#s}/${s:i:1}
      # index by codepoint and would mishandle a non-ASCII key byte. Handles the
      # characters JSON requires escaping -- backslash and double-quote -- plus C0
      # control bytes via \u00XX.
      local LC_ALL=C s="$1" out="" i c ord
      for (( i = 0; i < ${#s}; i++ )); do
        c="${s:i:1}"
        case "$c" in
          '"') out+='\"' ;;
          '\') out+='\\' ;;
          *)
            printf -v ord '%d' "'$c"
            if [ "$ord" -lt 32 ]; then printf -v c '\\u%04x' "$ord"; fi
            out+="$c"
            ;;
        esac
      done
      printf '%s' "$out"
    }
    echo "Configuring S3 alias..."
    mkdir -p "$MC_CONFIG_DIR"
    ALIAS_FILE="$MC_CONFIG_DIR/s3-alias.json"
    ( umask 077
      printf '{"url":"%s","accessKey":"%s","secretKey":"%s","api":"s3v4","path":"auto"}\n' \
        "$(json_escape "$S3_ENDPOINT")" "$(json_escape "$S3_ACCESS_KEY")" "$(json_escape "$S3_SECRET_KEY")" \
        > "$ALIAS_FILE" )
    mc alias import s3 "$ALIAS_FILE"
    rm -f "$ALIAS_FILE"

    # Stage to a .tmp object and publish (mc mv) to the canonical backup_<ts>.dump
    # name ONLY after integrity is verified (#159). A mid-stream pg_dump failure makes
    # mc finalize a truncated object; staging keeps that truncation off the canonical
    # name, so a restore of "the newest backup" can never pick a half-written dump.
    # The EXIT trap removes the staging object on any early failure (a no-op once the
    # mv has run); stale stages from a hard-killed run are swept by retention below.
    # The staging key is made unique per run (pod hostname + pid) so a manually
    # triggered backup overlapping the scheduled one cannot share a .tmp key -- each
    # run's trap then only ever deletes its OWN stage, never a concurrent run's (#159
    # review). The '*.tmp' sweep glob still reaps it.
    S3_TMP="${S3_PATH}.$(hostname)-$$.tmp"
    trap 'mc rm "s3/${S3_TMP}" >/dev/null 2>&1 || true' EXIT

    echo "Starting streaming backup to s3/${S3_PATH} (staged via .tmp)..."
    PGPASSWORD="$POSTGRES_PASSWORD" pg_dump -Fc -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" | mc pipe "s3/${S3_TMP}"

    echo "Verifying upload..."
    UPLOADED_SIZE=$(mc ls --json "s3/${S3_TMP}" | grep -o '"size":[0-9]*' | grep -o '[0-9]*')
    if [ -z "$UPLOADED_SIZE" ] || [ "$UPLOADED_SIZE" -eq 0 ]; then
      echo "ERROR: Upload verification failed - file missing or zero bytes"
      exit 1
    fi
    echo "Upload verified: ${UPLOADED_SIZE} bytes"

    # Stream the integrity check instead of buffering the whole dump to /tmp on the
    # container's (unbounded, unsized) writable layer -- a large DB could otherwise hit
    # node-disk eviction (#119). pg_restore --list reads the TOC from stdin; under
    # pipefail a failure in mc cat or pg_restore aborts the job.
    echo "Verifying backup integrity via pg_restore --list..."
    mc cat "s3/${S3_TMP}" | pg_restore --list > /dev/null
    echo "Backup integrity verified"

    # Integrity confirmed -> publish the staged object to the canonical name. mc mv is
    # a server-side copy + delete; the canonical PutObject is itself atomic, so a reader
    # of backup_<ts>.dump only ever sees a complete, verified dump (never a torn one).
    echo "Publishing verified backup to s3/${S3_PATH}..."
    # mc mv is a server-side copy then a delete of the stage. If the copy succeeds but
    # the stage-delete half errors transiently, do NOT fail an already-published,
    # verified backup: treat a present canonical object as success (the EXIT trap
    # removes the leftover stage). Only a genuinely absent canonical is fatal.
    if ! mc mv "s3/${S3_TMP}" "s3/${S3_PATH}"; then
      if mc stat "s3/${S3_PATH}" >/dev/null 2>&1; then
        echo "WARN: mc mv reported an error but the canonical dump is present; continuing" >&2
      else
        echo "ERROR: failed to publish the verified dump to s3/${S3_PATH}" >&2
        exit 1
      fi
    fi

    # Guard against wiping the whole prefix: the dump uploaded above must be
    # visible as a recent object. If it is not (upload landed elsewhere,
    # prefix mismatch, clock skew), deletion must not run. Scoped to this
    # release's subpath and dump objects only (#143).
    echo "Verifying a recent backup exists before retention cleanup..."
    RECENT_COUNT=$(mc find "s3/${S3_DIR}/" --name 'backup_*.dump' --newer-than "${RETENTION_DAYS}d" | grep -c . || true)
    if [ "$RECENT_COUNT" -eq 0 ]; then
      echo "ERROR: No backup newer than ${RETENTION_DAYS} days found under s3/${S3_DIR}/ - aborting retention cleanup" >&2
      exit 1
    fi
    echo "Found ${RECENT_COUNT} recent backup(s)"

    # Delete only this release's own dump objects under its subpath: the per-release
    # path isolates releases, and --name keeps unrelated objects a user may store
    # under the prefix safe (#143).
    # The dump is already published + verified above, so retention maintenance must
    # never fail the Job (a transient S3 list/rm error would mark a good backup Failed
    # and re-run the whole pg_dump). Both maintenance finds are best-effort.
    echo "Running retention cleanup (removing backups older than ${RETENTION_DAYS} days)..."
    mc find "s3/${S3_DIR}/" --name 'backup_*.dump' --older-than "${RETENTION_DAYS}d" --exec "mc rm {}" \
      || echo "WARN: retention cleanup encountered an error (non-fatal; backup already published)" >&2

    # Sweep stale staging objects orphaned by a hard-killed run (the EXIT trap covers
    # the normal failure path; this catches a SIGKILL/OOM that skipped it). A short 1d
    # window reaps them promptly (vs RETENTION_DAYS). Scoped to this release's subpath;
    # never matches a published backup_<ts>.dump (#159). Best-effort (see above).
    mc find "s3/${S3_DIR}/" --name '*.tmp' --older-than "1d" --exec "mc rm {}" \
      || echo "WARN: stale-stage sweep encountered an error (non-fatal)" >&2

    echo "Backup completed successfully"
{{- if .Values.backup.validation.enabled }}
  validate.sh: |
    #!/bin/bash
    # Restore-validation (#31): prove the latest pg_dump backup is actually
    # restorable by restoring it into a throwaway PostgreSQL inside this pod (never
    # the live database) and failing the Job on any pg_restore error.
    set -euo pipefail

    for var in S3_ENDPOINT S3_BUCKET S3_ACCESS_KEY S3_SECRET_KEY S3_PREFIX; do
      if [ -z "${!var}" ]; then
        echo "ERROR: Required environment variable $var is not set"
        exit 1
      fi
    done

    # Same release-scoped path the backup writer uses (#143) so we read this
    # release's own dumps, not another release's under a shared bucket/prefix.
    S3_DIR="${S3_BUCKET}/${S3_PREFIX%/}/{{ include "pg.fullname" . }}"

    export PATH="/tools:${PATH}"
    export MC_CONFIG_DIR=/tmp/.mc
    export SSL_CERT_FILE=/tools/ca-bundle.crt

    case "$S3_ENDPOINT" in
      *://*) ;;
      *) echo "ERROR: S3_ENDPOINT must include a scheme (http:// or https://)" >&2; exit 1 ;;
    esac
    # Credentials imported from a 0600 JSON doc, never argv (#167) and never a
    # percent-encoded MC_HOST URL (#221, which broke SigV4 for keys with / or +).
    json_escape() {
      local LC_ALL=C s="$1" out="" i c ord
      for (( i = 0; i < ${#s}; i++ )); do
        c="${s:i:1}"
        case "$c" in
          '"') out+='\"' ;;
          '\') out+='\\' ;;
          *)
            printf -v ord '%d' "'$c"
            if [ "$ord" -lt 32 ]; then printf -v c '\\u%04x' "$ord"; fi
            out+="$c"
            ;;
        esac
      done
      printf '%s' "$out"
    }
    mkdir -p "$MC_CONFIG_DIR"
    ALIAS_FILE="$MC_CONFIG_DIR/s3-alias.json"
    ( umask 077
      printf '{"url":"%s","accessKey":"%s","secretKey":"%s","api":"s3v4","path":"auto"}\n' \
        "$(json_escape "$S3_ENDPOINT")" "$(json_escape "$S3_ACCESS_KEY")" "$(json_escape "$S3_SECRET_KEY")" \
        > "$ALIAS_FILE" )
    mc alias import s3 "$ALIAS_FILE"
    rm -f "$ALIAS_FILE"

    echo "Finding the latest backup under s3/${S3_DIR}/ ..."
    # Separate the mc listing from the parse so a real S3/mc error fails the Job
    # loudly (set -e) instead of being swallowed by the pipeline and misreported as
    # "no backup found". A successful-but-empty listing still yields no LATEST.
    LISTING=$(mc ls "s3/${S3_DIR}/")
    # backup_<YYYYmmdd_HHMMSS>.dump sorts lexically by timestamp, so tail -1 is newest.
    LATEST=$(printf '%s\n' "$LISTING" | awk '{print $NF}' | grep -E '^backup_.*\.dump$' | sort | tail -1 || true)
    if [ -z "$LATEST" ]; then
      echo "ERROR: no backup_*.dump found under s3/${S3_DIR}/ -- nothing to validate" >&2
      exit 1
    fi
    echo "Latest backup: ${LATEST}"

    WORK=/work
    echo "Downloading ${LATEST}..."
    mc cp "s3/${S3_DIR}/${LATEST}" "${WORK}/latest.dump"

    # Throwaway PostgreSQL in this pod's emptyDir -- isolated from production. fsync
    # off (ephemeral) speeds the restore; only the unix socket is used (no TCP).
    export PGDATA="${WORK}/pgdata"
    # restartPolicy OnFailure reuses the pod's emptyDir, so a prior failed attempt
    # leaves a non-empty PGDATA that initdb refuses -- clear it so a retry starts
    # clean (the downloaded dump elsewhere under ${WORK} is untouched).
    rm -rf "${PGDATA}" "${WORK}/run"
    mkdir -p "${WORK}/run"
    echo "Initializing a throwaway PostgreSQL for the restore test..."
    initdb -D "$PGDATA" --auth-local=trust >/dev/null
    pg_ctl -D "$PGDATA" -o "-c listen_addresses='' -c unix_socket_directories=${WORK}/run -c fsync=off" -w start
    trap 'pg_ctl -D "$PGDATA" -m immediate -w stop >/dev/null 2>&1 || true' EXIT

    createdb -h "${WORK}/run" validation
    echo "Restoring ${LATEST} into the throwaway database (any error fails the Job)..."
    # --exit-on-error: a torn/corrupt dump or a missing object aborts here, which is
    # exactly the failure this Job exists to surface. --no-owner/--no-privileges so a
    # missing source role does not fail an otherwise-good restore.
    pg_restore -h "${WORK}/run" -d validation --no-owner --no-privileges --exit-on-error "${WORK}/latest.dump"

    echo "Validating restored contents..."
    psql -h "${WORK}/run" -d validation -q -c "ANALYZE"
    SUMMARY=$(psql -h "${WORK}/run" -d validation -tAF'|' -c "
      SELECT count(*),
             COALESCE(sum(c.reltuples)::bigint, 0)
      FROM pg_class c JOIN pg_namespace n ON n.oid = c.relnamespace
      WHERE c.relkind IN ('r', 'p', 'm', 'f') AND n.nspname NOT IN ('pg_catalog', 'information_schema')")
    RELS="${SUMMARY%%|*}"
    ROWS="${SUMMARY##*|}"
    echo "Restore OK: ${RELS} table-like relation(s), ~${ROWS} row(s) (estimate)"
    # The hard pass/fail signal is pg_restore --exit-on-error above. A restored DB
    # with no ordinary/partitioned/matview/foreign relations is only a WARNING, not
    # a failure: a schema-only or extension-only database restores cleanly yet has
    # none, and false-failing it would block a perfectly restorable backup.
    if [ "${RELS:-0}" -eq 0 ]; then
      echo "WARN: restored database has no table-like relations (schema-only/extension-only?); the dump still restored cleanly via --exit-on-error" >&2
    fi
    echo "Backup validation succeeded for ${LATEST}"
{{- end }}
{{- end }}
