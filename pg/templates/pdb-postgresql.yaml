{{- if .Values.postgresql.podDisruptionBudget.enabled }}
{{- include "common.podDisruptionBudget" (dict
  "ctx"             .
  "component"       "postgresql"
  "nameSuffix"      ""
  "labels"          "pg.labels"
  "selectorLabels"  "pg.selectorLabels"
  "minAvailable"    .Values.postgresql.podDisruptionBudget.minAvailable
  "maxUnavailable"  .Values.postgresql.podDisruptionBudget.maxUnavailable
  "unhealthyPodEvictionPolicy" .Values.postgresql.podDisruptionBudget.unhealthyPodEvictionPolicy
  "annotations"     .Values.global.annotations
) }}
{{- end }}
