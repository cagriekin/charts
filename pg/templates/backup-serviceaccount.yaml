{{- if .Values.backup.enabled }}
{{- /* #27: the backup and backup-validation Jobs ran under the namespace default
       ServiceAccount. Give them a dedicated SA instead -- it carries no RBAC (the
       Jobs talk only to PostgreSQL and S3, never the Kubernetes API) and its token
       is never mounted (the pods also set automountServiceAccountToken: false,
       #166). This stops a leaked Job pod from acting as the default SA. */}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pg.fullname" . }}-backup
  labels:
    {{- include "pg.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
