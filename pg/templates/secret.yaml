{{- if not .Values.postgresql.existingSecret.enabled }}
{{- /* Reuse passwords from the live secret so helm upgrade does not rotate
       credentials the running cluster still authenticates with. lookup
       returns nothing under helm template/--dry-run, so rendering pipelines
       that never talk to the cluster (e.g. ArgoCD) should use
       postgresql.existingSecret instead. */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "pg.fullname" .) }}
{{- $password := randAlphaNum 32 | b64enc }}
{{- $repmgrPassword := randAlphaNum 32 | b64enc }}
{{- if $existing }}
{{- $password = index $existing.data "password" | default $password }}
{{- $repmgrPassword = index $existing.data "repmgr-password" | default $repmgrPassword }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pg.fullname" . }}
  labels:
    {{- include "pg.labels" . | nindent 4 }}
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  username: {{ .Values.postgresql.username | b64enc | quote }}
  password: {{ $password | quote }}
  database: {{ .Values.postgresql.database | b64enc | quote }}
{{- if .Values.repmgr.enabled }}
  repmgr-password: {{ $repmgrPassword | quote }}
{{- end }}
{{- end }}
