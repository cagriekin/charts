{{- if not .Values.postgresql.existingSecret.enabled }}
{{- /* Reuse passwords from the live secret so helm upgrade does not rotate
       credentials the running cluster still authenticates with. lookup
       returns nothing under helm template/--dry-run, so rendering pipelines
       that never talk to the cluster (e.g. ArgoCD) should use
       postgresql.existingSecret instead. */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "pg.fullname" .) }}
{{- $password := randAlphaNum 32 | b64enc }}
{{- $repmgrPassword := randAlphaNum 32 | b64enc }}
{{- $monitoringPassword := randAlphaNum 32 | b64enc }}
{{- if $existing }}
{{- $password = index $existing.data "password" | default $password }}
{{- $repmgrPassword = index $existing.data "repmgr-password" | default $repmgrPassword }}
{{- $monitoringPassword = index $existing.data "monitoring-password" | default $monitoringPassword }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pg.fullname" . }}
  labels:
    {{- include "pg.labels" . | nindent 4 }}
  {{- with (include "pg.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  username: {{ .Values.postgresql.username | b64enc | quote }}
  password: {{ $password | quote }}
  database: {{ .Values.postgresql.database | b64enc | quote }}
{{- if .Values.repmgr.enabled }}
  repmgr-password: {{ $repmgrPassword | quote }}
{{- end }}
{{- if and .Values.prometheusExporter.enabled .Values.prometheusExporter.monitoringUser.enabled }}
  monitoring-password: {{ $monitoringPassword | quote }}
{{- end }}
{{- /* #218: a generated, upgrade-persisted password per chart-managed LOGIN role
       (postgresql.roles[] entries whose passwordSecret.name is empty). Keep the live
       value via lookup so helm upgrade never rotates a credential the role still uses;
       generate fresh only when the key is absent (a new role on an existing release --
       must NOT fail). Roles with an explicit passwordSecret are read from that Secret
       and never appear here. */ -}}
{{- $managed := (include "pg.aclManagedRoles" .) }}
{{- if $managed }}
{{- range $rn := (splitList "," $managed) }}
{{- $k := include "pg.aclRoleSecretKey" $rn }}
{{- $gen := randAlphaNum 32 | b64enc }}
{{- if $existing }}{{- $gen = (index $existing.data $k) | default $gen }}{{- end }}
  {{ $k }}: {{ $gen | quote }}
{{- end }}
{{- end }}
{{- end }}
