postgresql:
  replicaCount: 1

  existingSecret:
    enabled: true
    name: pg-credentials

  podDisruptionBudget:
    enabled: false

  lifecycle:
    postStart:
      additionalCommands: ""

repmgr:
  image:
    repository: cagriekin/repmgr
    tag: trixie-5.5.0-5
  enabled: true

pgpool:
  enabled: false

pgbackrest:
  enabled: true
  stanza: db
  s3:
    endpoint: https://s3.amazonaws.com
    bucket: test-backups
    region: eu-central-1
    prefix: pgbackrest
  existingSecret:
    name: s3-backup-creds
    accessKeyIdKey: access-key-id
    secretAccessKeyKey: secret-access-key
  retention:
    full: 4
    diff: 14
  schedule:
    full: "0 1 * * 0"
    diff: "0 1 * * 1-6"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
