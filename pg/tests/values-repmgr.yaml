postgresql:
  image:
    repository: postgres
    tag: 18.1-trixie
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: false

  database: testdb
  username: testuser

  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  affinity: {}

  podDisruptionBudget:
    enabled: false

  lifecycle:
    postStart:
      additionalCommands: ""

repmgr:
  image:
    repository: cagriekin/repmgr
    tag: trixie-5.5.0-7
    pullPolicy: IfNotPresent

  enabled: true

  username: repmgr
  database: repmgr

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  serviceUpdater:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

pgpool:
  enabled: false

prometheusExporter:
  enabled: false

backup:
  enabled: false

service:
  type: ClusterIP
  port: 5432
