nameOverride: ""
fullnameOverride: ""

postgresql:
  image:
    repository: postgres
    tag: 18.1-trixie
    pullPolicy: IfNotPresent

  replicaCount: 1

  annotations: {}

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi

  database: postgres
  username: postgres

  existingSecret:
    enabled: false
    name: ""
    usernameKey: username
    passwordKey: password
    databaseKey: database
    repmgrPasswordKey: repmgr-password

  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  affinity: {}

  podAnnotations: {}

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  configuration: {}
    # max_connections: "200"
    # shared_buffers: "1GB"
    # work_mem: "32MB"

  podSecurityContext:
    fsGroup: 103
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsUser: 101
    runAsGroup: 103
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  pgHba: []
    # - "host all all 10.0.0.0/8 md5"
    # - "host replication repmgr 10.0.0.0/8 trust"

  extensions:
    enabled: false

  lifecycle:
    postStart:
      additionalCommands: ""

repmgr:
  image:
    repository: cagriekin/repmgr
    tag: trixie-5.5.0-5
    pullPolicy: IfNotPresent

  enabled: true

  username: repmgr
  database: repmgr

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  terminationGracePeriodSeconds: 120

  splitBrainDetection:
    action: log

  serviceUpdater:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

pgpool:
  enabled: false

  image:
    repository: cagriekin/pgpool
    tag: 4.7.0
    pullPolicy: IfNotPresent

  replicaCount: 1

  numInitChildren: 32
  maxPool: 4
  childLifeTime: 300
  connectionLifeTime: 600
  clientIdleLimit: 300

  resetQueryList: "ABORT; RESET ALL; DEALLOCATE ALL"

  tcpKeepalive:
    idle: 10
    interval: 3
    count: 5

  healthCheck:
    period: 10
    timeout: 30
    maxRetries: 10
    retryDelay: 3

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  failOverOnBackendError: false
  autoFailback: true
  allowClearTextFrontendAuth: false

  logging:
    logConnections: true
    logStatement: false
    logPerNodeStatement: false
    logMinMessages: warning

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  adminUsername: admin
  adminPassword: admin

  service:
    type: ClusterIP
    port: 9999

  affinity: {}

  podAnnotations: {}

  topologySpreadConstraints: []

  metrics:
    enabled: false
    image:
      repository: pgpool/pgpool2_exporter
      tag: "1.2.2"
      pullPolicy: IfNotPresent
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 15
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 15
      failureThreshold: 3
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

prometheusExporter:
  enabled: false

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsUser: 65534
    runAsGroup: 65534
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  image:
    repository: quay.io/prometheuscommunity/postgres-exporter
    tag: v0.19.1
    pullPolicy: IfNotPresent

  podAnnotations: {}

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  service:
    type: ClusterIP
    port: 9116
    annotations: {}

  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}

service:
  type: ClusterIP
  port: 5432

backup:
  enabled: false
  schedule: "0 2 * * *"
  s3:
    endpoint: ""
    bucket: ""
    prefix: "backups"
  existingSecret:
    name: ""
    accessKeyIdKey: access-key-id
    secretAccessKeyKey: secret-access-key
  activeDeadlineSeconds: 3600
  backoffLimit: 1
  retentionDays: 7
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

pgbackrest:
  enabled: false
  stanza: db

  s3:
    endpoint: ""
    bucket: ""
    region: "us-east-1"
    prefix: "pgbackrest"

  existingSecret:
    name: ""
    accessKeyIdKey: access-key-id
    secretAccessKeyKey: secret-access-key

  retention:
    full: 4
    diff: 14

  schedule:
    full: "0 1 * * 0"
    diff: "0 1 * * 1-6"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

networkPolicy:
  enabled: false
  postgresql:
    allowExternal: true
    extraIngress: []
  pgpool:
    extraIngress: []

global:
  annotations: {}
