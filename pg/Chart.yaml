apiVersion: v2
name: pg
description: Highly-available PostgreSQL with repmgr replication, automatic agent failover (Kubernetes Lease or etcd-quorum DCS), optional PgPool-II, pgBackRest S3 backups, TLS, and Prometheus metrics
type: application
version: 1.2.7
appVersion: "18.1"
home: https://github.com/cagriekin/charts/tree/master/pg
icon: https://wiki.postgresql.org/images/a/a4/PostgreSQL_logo.3colors.svg
sources:
  - https://github.com/cagriekin/charts
  - https://www.postgresql.org
  - https://repmgr.org
  - https://www.pgpool.net
keywords:
  - PostgreSQL
  - Database
  - SQL
  - Replication
  - repmgr
  - PGPool-II
  - High Availability
maintainers:
  - name: cagriekin
    email: cagri.ekin@gmail.com
    url: https://github.com/cagriekin
dependencies:
  - name: common
    version: 0.1.0
    repository: file://../common
  - name: etcd
    version: 0.1.5
    repository: file://../etcd
    condition: etcd.enabled
