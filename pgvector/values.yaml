nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

postgresql:
  image:
    repository: pgvector/pgvector
    tag: pg18-trixie
    pullPolicy: IfNotPresent

  # PostgreSQL major version shipped in image.tag above. Used to build the
  # extension paths (/usr/lib/postgresql/<major>/lib and
  # /usr/share/postgresql/<major>/extension) when extensions.enabled is true.
  # Keep in sync with image.tag.
  majorVersion: "18"

  replicaCount: 1

  annotations: {}

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi

  database: postgres
  username: postgres

  existingSecret:
    enabled: false
    name: ""
    usernameKey: username
    passwordKey: password
    databaseKey: database
    repmgrPasswordKey: repmgr-password

  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 10

  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  affinity: {}

  nodeSelector: {}

  tolerations: []

  priorityClassName: ""

  podAnnotations: {}

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  configuration: {}
    # max_connections: "200"
    # shared_buffers: "1GB"
    # work_mem: "32MB"

  podSecurityContext:
    fsGroup: 103
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsUser: 101
    runAsGroup: 103
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  pgHba: []
    # - "host all all 10.0.0.0/8 md5"
    # - "host replication repmgr 10.0.0.0/8 trust"

  # When repmgr.enabled is true, re-hash any managed user (POSTGRES_USER,
  # REPMGR_USER) whose stored password is still MD5 to SCRAM at pod startup.
  # Idempotent (no-op once everyone is SCRAM-hashed, and auto-skipped on
  # PG < 14 since md5->scram pg_hba auto-promotion only exists in PG14+).
  # Set to false to keep existing MD5 hashes; the md5 fallback line that
  # the chart writes into pg_hba.conf will still let them authenticate.
  # Recommended: true on PG14+.
  migrateLegacyMd5Users: true

  extensions:
    enabled: true

  lifecycle:
    postStart:
      additionalCommands: |
        psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS vector;" > /dev/null 2>&1

repmgr:
  image:
    repository: cagriekin/repmgr
    tag: trixie-5.5.0-14
    pullPolicy: IfNotPresent

  enabled: true

  username: repmgr
  database: repmgr

  # Days of repmgr.monitoring_history to retain. repmgr 5.x has no
  # conf-based retention, so the repmgrd sidecar prunes the table once
  # per day on the primary via `repmgr cluster cleanup --keep-history`.
  monitoringHistoryDays: 7

  terminationGracePeriodSeconds: 120

  splitBrainDetection:
    action: log

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  serviceUpdater:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

pgpool:
  enabled: false

  image:
    repository: cagriekin/pgpool
    tag: 4.7.1
    pullPolicy: IfNotPresent

  replicaCount: 1

  numInitChildren: 32
  maxPool: 4
  childLifeTime: 300
  connectionLifeTime: 600
  clientIdleLimit: 300

  resetQueryList: "ABORT; RESET ALL; DEALLOCATE ALL"

  tcpKeepalive:
    idle: 10
    interval: 3
    count: 5

  healthCheck:
    period: 10
    timeout: 30
    maxRetries: 10
    retryDelay: 3

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  failOverOnBackendError: false
  autoFailback: true
  allowClearTextFrontendAuth: false

  logging:
    logConnections: true
    logStatement: false
    logPerNodeStatement: false
    logMinMessages: warning

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # PCP (pgpool admin) credentials. Rendered into a chart-managed Secret
  # unless existingSecret.enabled selects a pre-created Secret instead.
  admin:
    username: admin
    password: admin
    existingSecret:
      enabled: false
      name: ""
      usernameKey: username
      passwordKey: password

  service:
    type: ClusterIP
    port: 9999

  affinity: {}

  nodeSelector: {}

  tolerations: []

  priorityClassName: ""

  podAnnotations: {}

  topologySpreadConstraints: []

  metrics:
    enabled: false
    image:
      repository: pgpool/pgpool2_exporter
      tag: "1.2.2"
      pullPolicy: IfNotPresent
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 15
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 15
      failureThreshold: 3
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

prometheusExporter:
  enabled: false

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsUser: 65534
    runAsGroup: 65534
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  image:
    repository: quay.io/prometheuscommunity/postgres-exporter
    tag: v0.19.1
    pullPolicy: IfNotPresent

  priorityClassName: ""

  podAnnotations: {}

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  service:
    type: ClusterIP
    port: 9116
    annotations: {}

  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}

service:
  type: ClusterIP
  port: 5432

backup:
  enabled: false
  schedule: "0 2 * * *"
  s3:
    endpoint: ""
    bucket: ""
    prefix: "backups"
  existingSecret:
    name: ""
    accessKeyIdKey: access-key-id
    secretAccessKeyKey: secret-access-key
  mc:
    image:
      repository: minio/mc
      tag: RELEASE.2024-11-21T17-21-54Z
      pullPolicy: IfNotPresent
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  # 999 is the postgres uid/gid in the official postgres image; the kubelet
  # rejects root-defaulting images under runAsNonRoot without an explicit uid
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  activeDeadlineSeconds: 3600
  backoffLimit: 1
  retentionDays: 7
  priorityClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

pgbackrest:
  enabled: false
  stanza: db

  s3:
    endpoint: ""
    bucket: ""
    region: "us-east-1"
    prefix: "pgbackrest"

  existingSecret:
    name: ""
    accessKeyIdKey: access-key-id
    secretAccessKeyKey: secret-access-key

  retention:
    full: 4
    diff: 14

  schedule:
    full: "0 1 * * 0"
    diff: "0 1 * * 1-6"

  # Sidecar container: keeps pgbackrest binary, config and credentials available
  # on every pg pod. CronJobs locate the current primary and `kubectl exec` into
  # this container to run the backup. The sidecar itself just sleeps.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # CronJob runner: schedules backups via Kubernetes-native CronJobs. Each job
  # finds the current primary via the headless primary service endpoints
  # (kept fresh by the service-updater sidecar) and execs into the pgbackrest
  # sidecar to perform the backup. Failover is handled automatically because
  # the primary is resolved at job-fire time.
  cronjob:
    image:
      repository: alpine/k8s
      tag: "1.31.3"
      pullPolicy: IfNotPresent
    concurrencyPolicy: Forbid
    backoffLimit: 0
    activeDeadlineSeconds: 21600  # 6 hours
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    priorityClassName: ""
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

networkPolicy:
  enabled: false
  postgresql:
    allowExternal: true
    extraIngress: []
    extraEgress: []
  pgpool:
    extraIngress: []
    extraEgress: []

global:
  annotations: {}
