nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

postgresql:
  image:
    repository: pgvector/pgvector
    tag: pg18-trixie
    pullPolicy: IfNotPresent

  # PostgreSQL major version shipped in image.tag above. Used to build the
  # extension paths (/usr/lib/postgresql/<major>/lib and
  # /usr/share/postgresql/<major>/extension) when extensions.enabled is true.
  # Keep in sync with image.tag.
  majorVersion: "18"

  replicaCount: 1

  annotations: {}

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi

  database: postgres
  username: postgres

  existingSecret:
    enabled: false
    name: ""
    usernameKey: username
    passwordKey: password
    databaseKey: database
    repmgrPasswordKey: repmgr-password

  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 10

  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  # Suspends the liveness and readiness probes until PostgreSQL first accepts
  # connections, so a slow start is not killed mid-startup by the liveness
  # probe: the repmgr stale-primary guard's settle loop runs before postgres
  # opens (up to ~147s if REPMGR_NODE_COUNT falls back to 10) and crash-recovery
  # WAL replay can take longer still, both of which can exceed the ~130s
  # liveness budget. failureThreshold x periodSeconds is the total startup
  # budget (600s here); keep the steady-state livenessProbe window tight.
  startupProbe:
    enabled: true
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 60

  affinity: {}
  # Hard topology spread for the postgresql pods (default none; the affinity above
  # already does a soft zone spread + hard hostname anti-affinity). Set a hard zone
  # spread for multi-AZ production -- see values-cloud.yaml.
  topologySpreadConstraints: []

  nodeSelector: {}

  tolerations: []

  priorityClassName: ""

  podAnnotations: {}

  # Annotations for the postgresql pods' ServiceAccount (<fullname>-repmgr), the
  # identity pgbackrest uses to reach S3. Set a cloud workload-identity annotation
  # here for keyless backups (pair with pgbackrest.s3.keyType: auto, no static
  # existingSecret needed):
  #   IRSA (EKS): eks.amazonaws.com/role-arn: arn:aws:iam::<acct>:role/<role>
  #   WI  (GKE):  iam.gke.io/gcp-service-account: <gsa>@<project>.iam.gserviceaccount.com
  serviceAccount:
    annotations: {}

  podDisruptionBudget:
    enabled: true
    # maxUnavailable (not minAvailable) so a drain / rolling upgrade / autoscaler
    # scale-down takes at most one PostgreSQL pod at a time regardless of replica
    # count. unhealthyPodEvictionPolicy: AlwaysAllow lets a stuck/not-yet-Ready pod
    # (e.g. one slowly reattaching its volume) still be evicted, so it cannot wedge
    # node maintenance (k8s >= 1.27; older API servers prune the field harmlessly).
    maxUnavailable: 1
    unhealthyPodEvictionPolicy: AlwaysAllow
    minAvailable: null

  configuration: {}
    # max_connections: "200"
    # shared_buffers: "1GB"
    # work_mem: "32MB"

  podSecurityContext:
    fsGroup: 103
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsUser: 101
    runAsGroup: 103
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  pgHba: []
    # - "host all all 10.0.0.0/8 md5"
    # - "host replication repmgr 10.0.0.0/8 trust"

  # When repmgr.enabled is true, re-hash any managed user (POSTGRES_USER,
  # REPMGR_USER) whose stored password is still MD5 to SCRAM at pod startup.
  # Idempotent (no-op once everyone is SCRAM-hashed, and auto-skipped on
  # PG < 14 since md5->scram pg_hba auto-promotion only exists in PG14+).
  # Set to false to keep existing MD5 hashes; the md5 fallback line that
  # the chart writes into pg_hba.conf will still let them authenticate.
  # Recommended: true on PG14+.
  migrateLegacyMd5Users: true

  extensions:
    enabled: true

  lifecycle:
    postStart:
      additionalCommands: |
        psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "CREATE EXTENSION IF NOT EXISTS vector;" > /dev/null 2>&1

repmgr:
  image:
    repository: cagriekin/repmgr
    tag: trixie-5.5.0-16
    # Optional digest pin (e.g. "sha256:..."). When set it is appended as
    # repository:tag@digest, so the cosign-signed / provenance-attested image is
    # pinned at deploy time and a mutable-tag repush cannot silently change it.
    # Empty = pull by tag only. Refresh with: docker buildx imagetools inspect <ref>
    digest: ""
    pullPolicy: IfNotPresent
    # PostgreSQL major version bundled in the repmgr image. The image ships
    # exactly one PG major and always runs that server, so in repmgr mode the
    # cluster runs this version regardless of postgresql.image. The chart fails
    # at render time unless postgresql.majorVersion matches this. Bump this and
    # tag together when moving to a repmgr image built for a new PG major.
    majorVersion: "18"

  enabled: true

  # Failover mode:
  #   repmgrd (default) — repmgrd sidecar + service-updater (the original path)
  #   agent             — the lease-based Go agent (PID 1) drives failover
  # Becomes the default at chart v1.0.0.
  failoverMode: repmgrd

  # Lease-based agent (failoverMode: agent) tunables. Defaults suit a stable
  # control plane; raise for managed clouds (e.g. 30s/20s/4s) so brief apiserver
  # blips do not trip an unnecessary demote.
  agent:
    leaseDuration: 15s
    renewDeadline: 10s
    retryPeriod: 2s
    reconcileInterval: 5s
    # Leadership store (DCS). "kubernetes" (default) holds the leader Lease in the
    # apiserver. "etcd" holds it in etcd instead, so a Kubernetes control-plane
    # outage no longer self-demotes the primary (only an etcd quorum loss does);
    # routing still needs the apiserver but only at failover time. With etcd,
    # leaseDuration must be >= 5s (the etcd lease TTL is whole seconds).
    dcs:
      backend: kubernetes # kubernetes | etcd
      etcd:
        # BYO/shared etcd: point at an existing cluster (recommended when running
        # several databases -- one platform etcd, ~0 marginal cost per DB). A bundled
        # etcd subchart is a separate, later option.
        endpoints: [] # e.g. ["https://etcd-0.etcd:2379","https://etcd-1.etcd:2379"]
        # Election key prefix; defaults to /pg-ha/<release>/ when empty.
        prefix: ""
        tls:
          # Optional mutual TLS. Set to a Secret carrying ALL THREE keys: tls.crt,
          # tls.key, ca.crt. cert-manager Certificates include ca.crt, but a stock
          # `kubectl create secret tls` does NOT -- add ca.crt explicitly or the agent
          # fails fast at boot (it reads all three). Empty = plaintext.
          secretName: ""
    # The pod-network CIDR the agent trusts in the hardened (SCRAM-only) pg_hba it
    # assembles in agent mode: loopback + this CIDR over SCRAM, with NO legacy
    # 0.0.0.0/0 md5 catch-all (agent mode is secure by construction). Set this to
    # your cluster's pod CIDR if it is outside 10.0.0.0/8, or replication/clients on
    # the pod network are refused. Add explicit `postgresql.pgHba` rules for any
    # access from outside the pod network.
    podCidr: 10.0.0.0/8
    # Monitoring for the agent's read-only metrics on port 9200 (agent mode only).
    # Both require the Prometheus Operator CRDs (same as prometheusExporter).
    monitoring:
      serviceMonitor:
        enabled: false
        interval: 30s
        scrapeTimeout: 10s
        additionalLabels: {}
      # Example alert rules over the agent metrics (no-leader, split-brain,
      # renew-failure, reconcile-error, flapping, agent-down, paused-too-long).
      prometheusRule:
        enabled: false
        additionalLabels: {}

  username: repmgr
  database: repmgr

  # Days of repmgr.monitoring_history to retain. repmgr 5.x has no
  # conf-based retention, so the repmgrd sidecar prunes the table once
  # per day on the primary via `repmgr cluster cleanup --keep-history`.
  monitoringHistoryDays: 7

  terminationGracePeriodSeconds: 120

  splitBrainDetection:
    action: log

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  serviceUpdater:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

pgpool:
  enabled: false

  image:
    repository: cagriekin/pgpool
    tag: 4.7.1
    pullPolicy: IfNotPresent

  replicaCount: 1

  numInitChildren: 32
  maxPool: 4
  childLifeTime: 300
  connectionLifeTime: 600
  clientIdleLimit: 300

  resetQueryList: "ABORT; RESET ALL; DEALLOCATE ALL"

  tcpKeepalive:
    idle: 10
    interval: 3
    count: 5

  healthCheck:
    period: 10
    timeout: 30
    maxRetries: 10
    retryDelay: 3

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  failOverOnBackendError: false
  autoFailback: true
  allowClearTextFrontendAuth: false

  logging:
    logConnections: true
    logStatement: false
    logPerNodeStatement: false
    logMinMessages: warning

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # PCP (pgpool admin) credentials. Rendered into a chart-managed Secret
  # unless existingSecret.enabled selects a pre-created Secret instead.
  admin:
    username: admin
    password: admin
    existingSecret:
      enabled: false
      name: ""
      usernameKey: username
      passwordKey: password

  service:
    type: ClusterIP
    port: 9999

  affinity: {}

  nodeSelector: {}

  tolerations: []

  priorityClassName: ""

  podAnnotations: {}

  topologySpreadConstraints: []

  metrics:
    enabled: false
    image:
      repository: pgpool/pgpool2_exporter
      tag: "1.2.2"
      pullPolicy: IfNotPresent
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 15
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 15
      failureThreshold: 3
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

prometheusExporter:
  enabled: false

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsUser: 65534
    runAsGroup: 65534
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  image:
    repository: quay.io/prometheuscommunity/postgres-exporter
    tag: v0.19.1
    pullPolicy: IfNotPresent

  priorityClassName: ""

  podAnnotations: {}

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  service:
    type: ClusterIP
    port: 9116
    annotations: {}

  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}

service:
  type: ClusterIP
  port: 5432

backup:
  enabled: false
  schedule: "0 2 * * *"
  s3:
    endpoint: ""
    bucket: ""
    prefix: "backups"
  existingSecret:
    name: ""
    accessKeyIdKey: access-key-id
    secretAccessKeyKey: secret-access-key
  mc:
    image:
      repository: minio/mc
      tag: RELEASE.2024-11-21T17-21-54Z
      pullPolicy: IfNotPresent
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  # 999 is the postgres uid/gid in the official postgres image; the kubelet
  # rejects root-defaulting images under runAsNonRoot without an explicit uid
  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  activeDeadlineSeconds: 3600
  backoffLimit: 1
  retentionDays: 7
  priorityClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

pgbackrest:
  enabled: false
  stanza: db

  s3:
    endpoint: ""
    bucket: ""
    region: "us-east-1"
    prefix: "pgbackrest"
    # shared = static access/secret key from existingSecret (default).
    # auto    = cloud workload identity / instance credential chain (IRSA, GKE WI,
    #           EC2 instance profile); no existingSecret -- annotate the pod SA via
    #           postgresql.serviceAccount.annotations instead.
    keyType: shared

  existingSecret:
    name: ""
    accessKeyIdKey: access-key-id
    secretAccessKeyKey: secret-access-key

  retention:
    full: 4
    diff: 14

  schedule:
    full: "0 1 * * 0"
    diff: "0 1 * * 1-6"

  # Sidecar container: keeps pgbackrest binary, config and credentials available
  # on every pg pod. CronJobs locate the current primary and `kubectl exec` into
  # this container to run the backup. The sidecar itself just sleeps.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # CronJob runner: schedules backups via Kubernetes-native CronJobs. Each job
  # finds the current primary via the headless primary service endpoints
  # (kept fresh by the service-updater sidecar) and execs into the pgbackrest
  # sidecar to perform the backup. Failover is handled automatically because
  # the primary is resolved at job-fire time.
  cronjob:
    image:
      repository: alpine/k8s
      tag: "1.31.3"
      pullPolicy: IfNotPresent
    concurrencyPolicy: Forbid
    backoffLimit: 0
    activeDeadlineSeconds: 21600  # 6 hours
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    priorityClassName: ""
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

networkPolicy:
  enabled: false
  postgresql:
    allowExternal: true
    extraIngress: []
    extraEgress: []
  pgpool:
    extraIngress: []
    extraEgress: []

global:
  annotations: {}

# Bundled etcd subchart (conditional dependency). Turn on ONLY for a self-contained
# install that has no external etcd: set both repmgr.agent.dcs.backend=etcd AND
# etcd.enabled=true; the agent then auto-targets the bundled <release>-etcd:2379
# (leave repmgr.agent.dcs.etcd.endpoints empty). For several databases, prefer one
# shared/BYO etcd (set endpoints, leave etcd.enabled=false). See the etcd subchart's
# values for tuning (replicaCount, resources, persistence). Adds 3 stateful pods.
etcd:
  enabled: false
