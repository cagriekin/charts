apiVersion: v2
name: pgvector
description: PostgreSQL with the pgvector extension for vector search, plus repmgr replication, agent failover (Kubernetes Lease or etcd-quorum DCS), optional PgPool-II, S3 backups, TLS, and metrics
type: application
version: 1.2.7
appVersion: "18"
home: https://github.com/cagriekin/charts/tree/master/pgvector
icon: https://wiki.postgresql.org/images/a/a4/PostgreSQL_logo.3colors.svg
sources:
  - https://github.com/cagriekin/charts
  - https://www.postgresql.org
  - https://github.com/pgvector/pgvector
  - https://repmgr.org
  - https://www.pgpool.net
keywords:
  - PostgreSQL
  - pgvector
  - PGPool-II
  - Vector Search
  - Vector Database
maintainers:
  - name: cagriekin
    email: cagri.ekin@gmail.com
    url: https://github.com/cagriekin
dependencies:
  - name: common
    version: 0.1.0
    repository: file://../common
  - name: etcd
    version: 0.1.5
    repository: file://../etcd
    condition: etcd.enabled
