name: Release Helm Charts

on:
  workflow_dispatch:
    inputs:
      chart:
        description: 'Chart directory name to release (e.g. pg, redis, kafka)'
        required: true
        type: string
  push:
    tags:
      - '[a-z]*-[0-9]*.[0-9]*.[0-9]*'

concurrency:
  group: release-gh-pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Determine target chart
        id: chart
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            chart="${{ inputs.chart }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
            version=$(echo "$tag" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+.*$')
            chart="${tag%-${version}}"
          fi
          if [ -z "$chart" ]; then
            echo "Failed to determine chart name from tag" >&2
            exit 1
          fi
          echo "name=${chart}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate chart exists
        run: |
          set -euo pipefail
          chart="${{ steps.chart.outputs.name }}"
          if [ ! -f "${chart}/Chart.yaml" ]; then
            echo "Chart '${chart}' does not contain Chart.yaml" >&2
            exit 1
          fi

      - name: Configure git author
        run: |
          set -euo pipefail
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Ensure gh-pages branch exists
        run: |
          set -euo pipefail
          if ! git ls-remote --exit-code --heads origin gh-pages; then
            git checkout --orphan gh-pages
            git reset --hard
            git commit --allow-empty -m "Initialize gh-pages branch"
            git push origin gh-pages
            git checkout "${GITHUB_REF}"
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.2

      - name: Lint chart
        run: |
          set -euo pipefail
          helm lint "${{ steps.chart.outputs.name }}"

      - name: Package and create GitHub release
        run: |
          set -euo pipefail
          chart="${{ steps.chart.outputs.name }}"
          tag="${GITHUB_REF#refs/tags/}"

          workdir=$(mktemp -d)
          helm package "${chart}" --destination "$workdir"

          pkg=$(ls "$workdir"/*.tgz)
          if gh release view "$tag" > /dev/null 2>&1; then
            echo "Release ${tag} already exists, uploading asset"
            gh release upload "$tag" "$pkg" --clobber
          else
            gh release create "$tag" "$pkg" \
              --title "$tag" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub Pages
        run: |
          set -euo pipefail

          chart="${{ steps.chart.outputs.name }}"
          repo_url="https://$(echo "$GITHUB_REPOSITORY" | cut -d/ -f1).github.io/$(echo "$GITHUB_REPOSITORY" | cut -d/ -f2)"
          owner=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f1)

          workdir=$(mktemp -d)
          git checkout gh-pages -- index.yaml 2>/dev/null || true

          helm package "${chart}" --destination "$workdir"

          if [ -f index.yaml ]; then
            helm repo index "$workdir" --url "$repo_url" --merge index.yaml
          else
            helm repo index "$workdir" --url "$repo_url"
          fi

          cat > "$workdir/index.html" <<'HEADER'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Helm Charts</title>
              <style>
                :root { color-scheme: dark; }
                *, *::before, *::after { box-sizing: border-box; }
                body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #0c0c0c; color: #7bf76d; font-family: "Fira Code", "Courier New", monospace; padding: 2rem; }
                main { max-width: 960px; width: 100%; border: 2px solid #1ef077; box-shadow: 0 0 20px #1ef07744; padding: 2.5rem; background: linear-gradient(180deg, #050505, #000); }
                h1, h2 { margin: 0 0 1.5rem; text-transform: uppercase; letter-spacing: 0.2rem; }
                section + section { margin-top: 2.5rem; border-top: 1px dashed #1ef077; padding-top: 2.5rem; }
                p { margin: 0 0 1rem; line-height: 1.6; }
                a { color: #7bf76d; text-decoration: none; border-bottom: 1px dashed #7bf76d; }
                a:hover { color: #ffffff; border-bottom-color: #ffffff; }
                code, pre { background: rgba(30, 240, 119, 0.08); border: 1px solid rgba(30, 240, 119, 0.3); color: #9cff90; }
                pre { padding: 1.25rem; overflow-x: auto; line-height: 1.6; }
                footer { margin-top: 2.5rem; font-size: 0.85rem; opacity: 0.65; }
              </style>
            </head>
            <body>
              <main>
                <h1>&gt; Helm Charts</h1>
                <section>
                  <p>Helm index: <a href="./index.yaml" rel="noopener">REPO_URL/index.yaml</a></p>
                </section>
                <section>
                  <h2>&gt; add the repo</h2>
                  <pre><code>helm repo add OWNER REPO_URL
          helm repo update
          helm search repo OWNER
          </code></pre>
                </section>
          HEADER

          sed -i "s|REPO_URL|${repo_url}|g; s|OWNER|${owner}|g" "$workdir/index.html"

          for chart_yaml in */Chart.yaml; do
            chart_dir="$(dirname "$chart_yaml")"
            chart_name=$(grep '^name:' "$chart_yaml" | awk '{print $2}')
            chart_version=$(grep '^version:' "$chart_yaml" | awk '{print $2}')
            chart_desc=$(grep '^description:' "$chart_yaml" | sed 's/^description:[[:space:]]*//')
            ns="default"
            case "$chart_name" in
              pg|pgvector|redis) ns="data" ;;
              kafka) ns="messaging" ;;
            esac

            cat >> "$workdir/index.html" <<CHART
                <section>
                  <h2>&gt; install ${chart_name}</h2>
                  <pre><code>helm install ${chart_name} ${owner}/${chart_name} \\
            --namespace ${ns} --create-namespace
          </code></pre>
                  <p>${chart_desc} (v${chart_version})</p>
                  <p>
                    Review the chart documentation in the
                    <a href="https://github.com/${GITHUB_REPOSITORY}/blob/master/${chart_dir}/README.md" rel="noopener">${chart_dir}/README.md</a>
                    within the source repository for all configurable values.
                  </p>
                </section>
          CHART
          done

          cat >> "$workdir/index.html" <<'FOOTER'
              </main>
            </body>
          </html>
          FOOTER

          git checkout gh-pages
          git pull origin gh-pages --rebase
          cp "$workdir"/*.tgz . 2>/dev/null || true
          cp "$workdir"/index.yaml .
          cp "$workdir"/index.html .
          git add index.yaml index.html *.tgz
          git commit -m "Update chart packages for ${chart}" || echo "No changes to commit"

          for attempt in 1 2 3; do
            if git push origin gh-pages; then
              break
            fi
            echo "Push failed (attempt ${attempt}/3), rebasing and retrying..."
            git pull origin gh-pages --rebase
          done
          rm -rf "$workdir"
