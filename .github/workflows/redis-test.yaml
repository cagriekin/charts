name: Test redis chart

on:
  # No paths filter: the `gate` job must report on EVERY PR so it can be required
  # without blocking PRs that do not touch redis. The `changes` job skips the heavy
  # work when redis is untouched.
  pull_request:

permissions:
  contents: read

concurrency:
  group: redis-test-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGES: >-
    redis:8.6.2-trixie
    oliver006/redis_exporter:v1.67.0
    curlimages/curl:latest

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      redis: ${{ steps.detect.outputs.redis }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect redis changes
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            # push to master is already path-filtered upstream; always run.
            echo "redis=true" >> "$GITHUB_OUTPUT"
            echo "redis changed: $(grep redis= "$GITHUB_OUTPUT")"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          files=$(git diff --name-only "$base" HEAD)
          # Build the render-affecting set by removing changes that cannot affect what
          # the chart renders, so release/docs-only PRs skip the kind matrix and are
          # gated by `lint` (always-on) alone:
          #   - Markdown (*.md): docs never affect rendering.
          #   - redis/Chart.yaml when ONLY version:/appVersion: changed (a pure release
          #     bump). Any other Chart.yaml edit (dependencies, description, ...) is
          #     kept and still runs the full suite. helm lint validates Chart.yaml on
          #     every PR regardless.
          render_files=$(printf '%s\n' "$files" | grep -vE '\.md$' || true)
          if printf '%s\n' "$render_files" | grep -qxE 'redis/Chart\.yaml'; then
            non_version=$(git diff "$base" HEAD -- redis/Chart.yaml \
              | grep -E '^[+-]' | grep -vE '^(\+\+\+|---)' \
              | grep -vE '^[+-](version|appVersion):' || true)
            if [ -z "$non_version" ]; then
              render_files=$(printf '%s\n' "$render_files" | grep -vxE 'redis/Chart\.yaml' || true)
            fi
          fi
          if printf '%s\n' "$render_files" | grep -qE '^(redis/|\.github/workflows/redis-test\.yaml)'; then
            echo "redis=true" >> "$GITHUB_OUTPUT"
          else
            echo "redis=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: changes
    if: needs.changes.outputs.redis == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.2

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: redis-test
          config: redis/kind-config.yaml

      - name: Cache container images
        id: image-cache
        uses: actions/cache@v5
        with:
          path: /tmp/kind-images
          key: kind-images-redis-${{ hashFiles('redis/values.yaml') }}

      - name: Load cached images into Kind
        if: steps.image-cache.outputs.cache-hit == 'true'
        run: |
          for tarball in /tmp/kind-images/*.tar; do
            kind load image-archive "$tarball" --name redis-test
          done

      - name: Pull and cache images
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/kind-images
          for image in $IMAGES; do
            docker pull "$image"
            safe_name=$(echo "$image" | tr '/:' '_')
            docker save "$image" -o "/tmp/kind-images/${safe_name}.tar"
            kind load image-archive "/tmp/kind-images/${safe_name}.tar" --name redis-test
          done

      - name: Run template tests
        run: make -C redis test-template

      - name: Run minimal tests
        run: make -C redis test-minimal

      - name: Run full tests
        run: make -C redis test-full

      - name: Run persistence tests
        run: make -C redis test-persistence

      - name: Run replication + failover tests
        run: make -C redis test-ha

      - name: Run TLS tests
        run: make -C redis test-tls

  # Single required status check for redis. Always runs; self-passes when redis is
  # untouched, otherwise mirrors the test job's result.
  gate:
    name: redis-tests-passed
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: |
          if [ "${{ needs.changes.outputs.redis }}" != "true" ]; then
            echo "redis unchanged — gate passes (no-op)"; exit 0
          fi
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "redis tests passed"; exit 0
          fi
          echo "redis gate FAILED: test=${{ needs.test.result }}"
          exit 1
