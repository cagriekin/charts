name: Test kafka chart

on:
  # No paths filter: the `gate` job must report on EVERY PR so it can be required
  # without blocking PRs that do not touch kafka. The `changes` job skips the heavy
  # work when kafka is untouched.
  pull_request:

permissions:
  contents: read

concurrency:
  group: kafka-test-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGES: >-
    apache/kafka:4.1.0
    danielqsj/kafka-exporter:v1.9.0

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      kafka: ${{ steps.detect.outputs.kafka }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Detect kafka changes
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            # push to master is already path-filtered upstream; always run.
            echo "kafka=true" >> "$GITHUB_OUTPUT"
            echo "kafka changed: $(grep kafka= "$GITHUB_OUTPUT")"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          files=$(git diff --name-only "$base" HEAD)
          # Build the render-affecting set by removing changes that cannot affect what
          # the chart renders, so release/docs-only PRs skip the kind matrix and are
          # gated by `lint` (always-on) alone:
          #   - Markdown (*.md): docs never affect rendering.
          #   - kafka/Chart.yaml when ONLY version:/appVersion: changed (a pure release
          #     bump). Any other Chart.yaml edit (dependencies, description, ...) is
          #     kept and still runs the full suite. helm lint validates Chart.yaml on
          #     every PR regardless.
          render_files=$(printf '%s\n' "$files" | grep -vE '\.md$' || true)
          if printf '%s\n' "$render_files" | grep -qxE 'kafka/Chart\.yaml'; then
            non_version=$(git diff "$base" HEAD -- kafka/Chart.yaml \
              | grep -E '^[+-]' | grep -vE '^(\+\+\+|---)' \
              | grep -vE '^[+-](version|appVersion):' || true)
            if [ -z "$non_version" ]; then
              render_files=$(printf '%s\n' "$render_files" | grep -vxE 'kafka/Chart\.yaml' || true)
            fi
          fi
          if printf '%s\n' "$render_files" | grep -qE '^(kafka/|\.github/workflows/kafka-test\.yaml)'; then
            echo "kafka=true" >> "$GITHUB_OUTPUT"
          else
            echo "kafka=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: changes
    if: needs.changes.outputs.kafka == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.2

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kafka-test
          config: kafka/kind-config.yaml

      - name: Cache container images
        id: image-cache
        uses: actions/cache@v5
        with:
          path: /tmp/kind-images
          key: kind-images-kafka-${{ hashFiles('kafka/values.yaml') }}

      - name: Load cached images into Kind
        if: steps.image-cache.outputs.cache-hit == 'true'
        run: |
          for tarball in /tmp/kind-images/*.tar; do
            kind load image-archive "$tarball" --name kafka-test
          done

      - name: Pull and cache images
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/kind-images
          for image in $IMAGES; do
            docker pull "$image"
            safe_name=$(echo "$image" | tr '/:' '_')
            docker save "$image" -o "/tmp/kind-images/${safe_name}.tar"
            kind load image-archive "/tmp/kind-images/${safe_name}.tar" --name kafka-test
          done

      - name: Run template tests
        run: make -C kafka test-template

      - name: Run minimal tests
        run: make -C kafka test-minimal

      - name: Run full tests
        run: make -C kafka test-full

  # Single required status check for kafka. Always runs; self-passes when kafka is
  # untouched, otherwise mirrors the test job's result.
  gate:
    name: kafka-tests-passed
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: |
          if [ "${{ needs.changes.outputs.kafka }}" != "true" ]; then
            echo "kafka unchanged — gate passes (no-op)"; exit 0
          fi
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "kafka tests passed"; exit 0
          fi
          echo "kafka gate FAILED: test=${{ needs.test.result }}"
          exit 1
