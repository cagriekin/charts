name: Test repmgr image scripts

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'images/repmgr/**'
      - '.github/workflows/repmgr-image-test.yaml'

jobs:
  scripts-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run script tests
        run: bash images/repmgr/test/scripts-test.sh

  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: vet + test the agent module
        working-directory: images/repmgr/agent
        run: |
          go vet ./...
          go test ./...

      - name: verify module checksums (supply chain)
        working-directory: images/repmgr/agent
        run: go mod verify

      - name: hermetic vendored build (no network)
        working-directory: images/repmgr/agent
        env:
          GOFLAGS: -mod=vendor
          GOPROXY: "off"
        run: go build ./...

      - name: govulncheck (pinned)
        working-directory: images/repmgr/agent
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          "$(go env GOPATH)/bin/govulncheck" ./...
