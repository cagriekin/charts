name: Build and publish repmgr image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., trixie-5.5.0-16)'
        required: true
        type: string
  push:
    tags:
      - 'trixie-*'

permissions:
  contents: read
  id-token: write   # keyless cosign signing via the GitHub OIDC token

jobs:
  # Gate the publish on the same tests the PR/master workflow runs, because a
  # `trixie-*` tag push does NOT trigger repmgr-image-test.yaml -- without this an
  # untested image could be built, signed, and pushed.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run script tests
        run: bash images/repmgr/test/scripts-test.sh

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: vet + test + verify + hermetic build + govulncheck
        working-directory: images/repmgr/agent
        run: |
          go vet ./...
          go test ./...
          go mod verify
          GOFLAGS=-mod=vendor GOPROXY=off go build ./...
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          "$(go env GOPATH)/bin/govulncheck" ./...

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve image tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [ -z "$tag" ]; then
            echo "Could not resolve an image tag" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: images/repmgr
          push: true
          platforms: linux/amd64,linux/arm64
          tags: cagriekin/repmgr:${{ steps.meta.outputs.tag }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless, OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "cagriekin/repmgr@${DIGEST}"
