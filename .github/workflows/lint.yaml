name: Lint Helm Charts

permissions:
  contents: read

on:
  # No paths filter: lint is global (it lints every chart) and fast, so it runs on
  # EVERY PR -- which lets it be a required status check without blocking PRs that
  # happen not to touch a chart path.
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.2

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin kubeconform

      - name: Install kube-linter
        run: |
          curl -fsSL https://github.com/stackrox/kube-linter/releases/download/v0.7.1/kube-linter-linux.tar.gz \
            | sudo tar -xz -C /usr/local/bin kube-linter

      - name: Lint charts
        run: |
          set -euo pipefail
          shopt -s nullglob
          chart_dirs=()
          for chart_yaml in */Chart.yaml; do
            chart_dirs+=("$(dirname "$chart_yaml")")
          done
          if [ ${#chart_dirs[@]} -eq 0 ]; then
            echo "No charts found to lint" >&2
            exit 1
          fi
          for chart_dir in "${chart_dirs[@]}"; do
            echo "Linting ${chart_dir}"
            helm lint "${chart_dir}"
          done

      - name: Verify vendored subcharts are fresh
        run: bash scripts/check-vendored-subcharts.sh

      # Validate rendered manifests against real Kubernetes + CRD OpenAPI schemas (#193).
      - name: Validate rendered manifests (kubeconform)
        run: bash scripts/kubeconform-charts.sh

      # Enforce the CLAUDE.md Helm standards as policy-as-code (#193).
      - name: Policy gate (kube-linter)
        run: bash scripts/kube-linter-charts.sh

