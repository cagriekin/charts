{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "redis.fullname" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  podSelector:
    matchLabels:
      {{- include "redis.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 6379
          protocol: TCP
      from:
{{- if .Values.exporter.enabled }}
        - podSelector:
            matchLabels:
              {{- include "redis.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: redis-exporter
{{- end }}
{{- if .Values.networkPolicy.allowExternal }}
        - podSelector: {}
{{- end }}
{{- with .Values.networkPolicy.extraIngress }}
        {{- toYaml . | nindent 8 }}
{{- end }}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
{{- if .Values.exporter.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "redis.fullname" . }}-exporter
  labels:
    {{- include "redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-exporter
spec:
  podSelector:
    matchLabels:
      {{- include "redis.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis-exporter
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 9121
          protocol: TCP
      from:
        - podSelector: {}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 6379
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              {{- include "redis.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: redis
{{- end }}
{{- end }}
