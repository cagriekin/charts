fullnameOverride: ""
nameOverride: ""

redis:
  image:
    repository: redis
    tag: "8.6.2-trixie"
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  podSecurityContext:
    fsGroup: 999
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsUser: 999
    runAsGroup: 999
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  auth:
    enabled: false
    existingSecret:
      name: ""
      key: redis-password

  config:
    maxmemory: "200mb"
    maxmemory-policy: "allkeys-lru"
    appendfsync: "everysec"
    no-appendfsync-on-rewrite: "yes"
    auto-aof-rewrite-percentage: "100"
    auto-aof-rewrite-min-size: "64mb"
    rdbSnapshots: []
    # - seconds: 3600
    #   changes: 1
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  terminationGracePeriodSeconds: 300

  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

exporter:
  enabled: true

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  image:
    repository: oliver006/redis_exporter
    tag: "v1.67.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  service:
    type: ClusterIP
    port: 9121
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels: {}
  prometheusRule:
    enabled: false
    additionalLabels: {}
    rules: []

service:
  type: ClusterIP
  port: 6379

networkPolicy:
  enabled: false
  allowExternal: true
  extraIngress: []

global:
  annotations: {}
