redis:
  image:
    repository: redis
    tag: "8.6.2-trixie"
    pullPolicy: IfNotPresent
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

exporter:
  enabled: true
  image:
    repository: oliver006/redis_exporter
    tag: "v1.67.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  service:
    type: ClusterIP
    port: 9121
  serviceMonitor:
    enabled: false

service:
  type: ClusterIP
  port: 6379

global:
  annotations:
    test-annotation: test-value
