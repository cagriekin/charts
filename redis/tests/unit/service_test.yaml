suite: service
tests:
  - it: minimal - redis service exists with port 6379
    template: templates/service.yaml
    values:
      - ../values-minimal.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].port
          value: 6379

  - it: minimal - no exporter service when exporter disabled
    template: templates/exporter-service.yaml
    values:
      - ../values-minimal.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: full - exporter service present on port 9121
    template: templates/exporter-service.yaml
    release:
      name: test-redis
    values:
      - ../values-full-test.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-redis-exporter
      - equal:
          path: spec.ports[0].port
          value: 9121

  # --- Replication: headless + sentinel discovery Services ---
  - it: standalone - no headless or sentinel Service
    template: templates/service-headless.yaml
    values:
      - ../values-minimal.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: standalone - no sentinel Service
    template: templates/service-sentinel.yaml
    values:
      - ../values-minimal.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: replication - headless Service is clusterIP None, publishNotReadyAddresses
    template: templates/service-headless.yaml
    release:
      name: r
    values:
      - ../values-replication.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: r-redis-headless
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.publishNotReadyAddresses
          value: true

  - it: replication - sentinel Service on 26379
    template: templates/service-sentinel.yaml
    release:
      name: r
    values:
      - ../values-replication.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: r-redis-sentinel
      - equal:
          path: spec.ports[0].port
          value: 26379
