suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: auth enabled, no existingSecret - generates a Secret named after the release
    release:
      name: r
    values:
      - ../values-replication.yaml
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: r-redis
      - exists:
          path: data["redis-password"]

  - it: auth enabled with existingSecret - no Secret generated
    values:
      - ../values-replication.yaml
    set:
      redis.auth.existingSecret.name: my-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: auth disabled - no Secret generated
    values:
      - ../values-minimal.yaml
    asserts:
      - hasDocuments:
          count: 0
