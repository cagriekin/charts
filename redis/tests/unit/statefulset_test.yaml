suite: statefulset
templates:
  - templates/statefulset.yaml
  - templates/configmap.yaml
tests:
  - it: minimal - statefulset has replicas 1
    template: templates/statefulset.yaml
    values:
      - ../values-minimal.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.replicas
          value: 1

  - it: minimal - pod securityContext runAsNonRoot and fsGroup 999
    template: templates/statefulset.yaml
    values:
      - ../values-minimal.yaml
    set:
      redis.podSecurityContext:
        fsGroup: 999
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 999

  - it: default - container securityContext runAsUser 999 and allowPrivilegeEscalation false
    template: templates/statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 999
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: default - preStop runs SHUTDOWN SAVE
    template: templates/statefulset.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].lifecycle.preStop.exec.command[2]
          pattern: SHUTDOWN SAVE

  - it: default - terminationGracePeriodSeconds 300
    template: templates/statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 300

  - it: standalone no-auth - no REDIS_PASSWORD env and plain command
    template: templates/statefulset.yaml
    values:
      - ../values-minimal.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].env
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - redis-server
            - /etc/redis/redis.conf

  - it: auth enabled - REDIS_PASSWORD env from secretKeyRef
    template: templates/statefulset.yaml
    values:
      - ../values-minimal.yaml
    set:
      redis.auth.enabled: true
      redis.auth.existingSecret.name: my-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: redis-password
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: requirepass

  - it: auth enabled - probe command uses password
    template: templates/statefulset.yaml
    values:
      - ../values-minimal.yaml
    set:
      redis.auth.enabled: true
      redis.auth.existingSecret.name: my-secret
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].livenessProbe.exec.command[2]
          pattern: REDIS_PASSWORD.*ping
      - matchRegex:
          path: spec.template.spec.containers[0].readinessProbe.exec.command[2]
          pattern: REDIS_PASSWORD.*ping

  - it: auth enabled without existingSecret uses the generated Secret
    template: templates/statefulset.yaml
    values:
      - ../values-minimal.yaml
    set:
      redis.auth.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-redis
                key: redis-password

  - it: full - global annotations on statefulset metadata, not in labels
    template: templates/statefulset.yaml
    values:
      - ../values-full-test.yaml
    asserts:
      - equal:
          path: metadata.annotations.test-annotation
          value: test-value
      - notExists:
          path: metadata.labels.test-annotation

  - it: minimal - no global annotations block
    template: templates/statefulset.yaml
    values:
      - ../values-minimal.yaml
    asserts:
      - notExists:
          path: metadata.annotations

  - it: imagePullSecrets render on the pod (standalone)
    template: templates/statefulset.yaml
    values:
      - ../values-minimal.yaml
    set:
      imagePullSecrets:
        - name: my-creds
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: my-creds

  - it: imagePullSecrets render on the pod (replication)
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      imagePullSecrets:
        - name: my-creds
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: my-creds

  # --- Replication (Sentinel HA) ---
  - it: replication - 3 pods, headless serviceName, OrderedReady
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    release:
      name: r
    asserts:
      - equal:
          path: spec.replicas
          value: 3
      - equal:
          path: spec.serviceName
          value: r-redis-headless
      - equal:
          path: spec.podManagementPolicy
          value: OrderedReady

  - it: replication - bootstrap init container present
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: redis-bootstrap

  - it: replication - sentinel sidecar + redis run from /config-rw
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers
          content:
            name: sentinel
          any: true
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - redis-server
            - /config-rw/redis.conf
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config-rw
            emptyDir:
              medium: Memory

  - it: replication - default podAntiAffinity by hostname
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    asserts:
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution[0].topologyKey
          value: kubernetes.io/hostname

  - it: replication + TLS - cert volume mounted, no plaintext
    template: templates/statefulset.yaml
    values:
      - ../values-tls.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tls
            secret:
              secretName: redis-tls-cert
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls
            mountPath: /etc/redis/tls
            readOnly: true

  - it: replication + TLS - exporter sidecar scrapes over TLS (rediss + client certs)
    template: templates/statefulset.yaml
    values:
      - ../values-tls.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[?(@.name=="redis-exporter")].env[?(@.name=="REDIS_ADDR")].value
          pattern: '^rediss://'
      - contains:
          path: spec.template.spec.containers[?(@.name=="redis-exporter")].env
          content:
            name: REDIS_EXPORTER_TLS_CA_CERT_FILE
            value: /etc/redis/tls/ca.crt

  - it: replication - bootstrap init mounts data (for the restart-vs-first-boot check)
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  # --- exporter config env in replication sidecar (#88) ---
  - it: replication - connectionTimeout sets REDIS_EXPORTER_CONNECTION_TIMEOUT in sidecar
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      exporter.connectionTimeout: "30s"
    asserts:
      - contains:
          path: spec.template.spec.containers[?(@.name=="redis-exporter")].env
          content:
            name: REDIS_EXPORTER_CONNECTION_TIMEOUT
            value: "30s"

  - it: replication - default values emit no optional REDIS_EXPORTER_ vars in sidecar
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[?(@.name=="redis-exporter")].env
          content:
            name: REDIS_EXPORTER_CONNECTION_TIMEOUT
            value: ""
      - notContains:
          path: spec.template.spec.containers[?(@.name=="redis-exporter")].env
          content:
            name: REDIS_EXPORTER_LOG_FORMAT
            value: "txt"
