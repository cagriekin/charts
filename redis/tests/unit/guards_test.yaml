suite: fail-fast guards
templates:
  - templates/statefulset.yaml
  - templates/configmap.yaml
tests:
  - it: replication requires replicaCount >= 2
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      redis.replicaCount: 1
    asserts:
      - failedTemplate:
          errorMessage: architecture=replication requires redis.replicaCount >= 2 (>= 3 pods) so Sentinel keeps quorum after losing one pod; use architecture=standalone for a single instance

  - it: quorum cannot exceed the pod count
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      sentinel.quorum: 9
    asserts:
      - failedTemplate:
          errorMessage: sentinel.quorum (9) must be between 1 and the total pod count (3)

  - it: explicit quorum 0 is rejected (not silently defaulted)
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      sentinel.quorum: 0
    asserts:
      - failedTemplate:
          errorMessage: sentinel.quorum (0) must be between 1 and the total pod count (3)

  - it: tls.enabled with architecture=standalone is rejected
    template: templates/statefulset.yaml
    set:
      architecture: standalone
      tls.enabled: true
      tls.existingSecret: some-cert
    asserts:
      - failedTemplate:
          errorMessage: "tls.enabled requires architecture=replication: TLS is wired into the replication StatefulSet (cert volume, --tls probes, per-pod-FQDN SAN model). Use architecture=replication, or terminate TLS at a proxy in front of standalone."

  - it: min-replicas-to-write must be below the pod count
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      redis.config.min-replicas-to-write: 3
    asserts:
      - failedTemplate:
          errorMessage: redis.config.min-replicas-to-write must be < total pods (redis.replicaCount + 1), else the master can never accept writes

  - it: tls.enabled requires existingSecret
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      tls.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: tls.enabled requires tls.existingSecret (a Secret with keys tls.crt, tls.key, ca.crt)

  - it: clientCertAuth requires tls.enabled
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      tls.clientCertAuth: true
    asserts:
      - failedTemplate:
          errorMessage: tls.clientCertAuth requires tls.enabled

  - it: maxmemory exceeding the container memory limit is rejected
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      redis.config.maxmemory: 512mb
      redis.resources.limits.memory: 256Mi
    asserts:
      - failedTemplate:
          errorMessage: "redis.config.maxmemory (512mb) exceeds redis.resources.limits.memory (256Mi); set maxmemory to ~80% of the limit to leave headroom for AOF rewrite buffers and fragmentation"

  - it: maxmemory within the limit renders
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      redis.config.maxmemory: 200mb
      redis.resources.limits.memory: 256Mi
    asserts:
      - isKind:
          of: StatefulSet

  - it: large k8s units (Gi/Ti) parse correctly (no false-positive rejection)
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      redis.config.maxmemory: 1gb
      redis.resources.limits.memory: 2Ti
    asserts:
      - isKind:
          of: StatefulSet

  - it: unquoted numeric maxmemory over the limit is rejected (no float64 bypass)
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      redis.config.maxmemory: 300000000
      redis.resources.limits.memory: 256Mi
    asserts:
      - failedTemplate:
          errorMessage: "redis.config.maxmemory (300000000) exceeds redis.resources.limits.memory (256Mi); set maxmemory to ~80% of the limit to leave headroom for AOF rewrite buffers and fragmentation"

  - it: an unsupported memory unit fails fast (no silent byte fallthrough)
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      redis.config.maxmemory: 200mib
    asserts:
      - failedTemplate:
          errorMessage: "redis: unsupported memory unit \"mib\" in \"200mib\" (use bytes or k/kb/ki, m/mb/mi, g/gb/gi, t/tb/ti, p/pb/pi)"

  - it: a malformed memory quantity fails fast
    template: templates/statefulset.yaml
    values:
      - ../values-replication.yaml
    set:
      redis.config.maxmemory: 1.2.3gb
    asserts:
      - failedTemplate:
          errorMessage: 'redis: cannot parse memory quantity "1.2.3gb"'

  - it: standalone renders a single-pod StatefulSet
    template: templates/statefulset.yaml
    values:
      - ../values-minimal.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.replicas
          value: 1
