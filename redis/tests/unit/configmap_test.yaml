suite: configmap
templates:
  - templates/configmap.yaml
tests:
  - it: minimal - configmap is created with redis.conf
    values:
      - ../values-minimal.yaml
    asserts:
      - isKind:
          of: ConfigMap
      - exists:
          path: data["redis.conf"]

  - it: default - persistence tuning rendered in redis.conf
    asserts:
      - matchRegex:
          path: data["redis.conf"]
          pattern: appendfsync everysec
      - matchRegex:
          path: data["redis.conf"]
          pattern: no-appendfsync-on-rewrite yes

  - it: default - save disabled (save "") when no rdbSnapshots
    asserts:
      - matchRegex:
          path: data["redis.conf"]
          pattern: 'save ""'

  - it: rdb - save renders with snapshots and no empty save
    values:
      - ../values-minimal.yaml
    set:
      redis.config.maxmemory: "200mb"
      redis.config.maxmemory-policy: "allkeys-lru"
      redis.config.appendfsync: "everysec"
      redis.config.no-appendfsync-on-rewrite: "yes"
      redis.config.auto-aof-rewrite-percentage: "100"
      redis.config.auto-aof-rewrite-min-size: "64mb"
      redis.config.rdbSnapshots:
        - seconds: 3600
          changes: 1
    asserts:
      - matchRegex:
          path: data["redis.conf"]
          pattern: save 3600 1
      - notMatchRegex:
          path: data["redis.conf"]
          pattern: 'save ""'

  - it: production redis.conf settings rendered
    values:
      - ../values-minimal.yaml
    asserts:
      - matchRegex:
          path: data["redis.conf"]
          pattern: 'dir /data'
      - matchRegex:
          path: data["redis.conf"]
          pattern: 'loglevel notice'
      - matchRegex:
          path: data["redis.conf"]
          pattern: 'databases 16'
      - matchRegex:
          path: data["redis.conf"]
          pattern: 'slowlog-log-slower-than 10000'

  - it: client timeout and tcp-keepalive are configurable
    values:
      - ../values-minimal.yaml
    set:
      redis.config.timeout: 300
      redis.config.tcp-keepalive: 120
    asserts:
      - matchRegex:
          path: data["redis.conf"]
          pattern: 'timeout 300'
      - matchRegex:
          path: data["redis.conf"]
          pattern: 'tcp-keepalive 120'

  - it: client-output-buffer-limit rendered when set
    values:
      - ../values-minimal.yaml
    set:
      redis.config.client-output-buffer-limit:
        - "replica 512mb 128mb 60"
    asserts:
      - matchRegex:
          path: data["redis.conf"]
          pattern: 'client-output-buffer-limit replica 512mb 128mb 60'

  - it: standalone - no sentinel.conf or min-replicas directives
    values:
      - ../values-minimal.yaml
    asserts:
      - notExists:
          path: data["sentinel.conf"]
      - notMatchRegex:
          path: data["redis.conf"]
          pattern: min-replicas-to-write

  - it: replication - redis.conf write-safety directives
    values:
      - ../values-replication.yaml
    asserts:
      - matchRegex:
          path: data["redis.conf"]
          pattern: min-replicas-to-write 1
      - matchRegex:
          path: data["redis.conf"]
          pattern: replica-read-only yes

  - it: replication - sentinel.conf + bootstrap.sh rendered
    values:
      - ../values-replication.yaml
    asserts:
      - matchRegex:
          path: data["sentinel.conf"]
          pattern: sentinel resolve-hostnames yes
      - matchRegex:
          path: data["sentinel.conf"]
          pattern: sentinel announce-hostnames yes
      - matchRegex:
          path: data["bootstrap.sh"]
          pattern: get-master-addr-by-name

  - it: replication - stable-DNS announce wired into bootstrap
    values:
      - ../values-replication.yaml
    asserts:
      - matchRegex:
          path: data["bootstrap.sh"]
          pattern: 'replica-announce-ip \$\{POD_FQDN\}'
      - matchRegex:
          path: data["bootstrap.sh"]
          pattern: 'sentinel announce-ip \$\{POD_FQDN\}'
      - matchRegex:
          path: data["bootstrap.sh"]
          pattern: 'sentinel monitor \$\{MASTER_NAME\} \$\{MASTER_FQDN\}'

  - it: replication + TLS - tls-port and tls-replication in configs, mTLS off by default
    values:
      - ../values-tls.yaml
    asserts:
      - matchRegex:
          path: data["redis.conf"]
          pattern: tls-port 6379
      - matchRegex:
          path: data["redis.conf"]
          pattern: tls-replication yes
      - matchRegex:
          path: data["redis.conf"]
          pattern: tls-auth-clients no
      - matchRegex:
          path: data["sentinel.conf"]
          pattern: tls-port 26379

  - it: replication + mTLS - tls-auth-clients yes when clientCertAuth
    values:
      - ../values-tls.yaml
    set:
      tls.clientCertAuth: true
    asserts:
      - matchRegex:
          path: data["redis.conf"]
          pattern: tls-auth-clients yes
      - matchRegex:
          path: data["sentinel.conf"]
          pattern: tls-auth-clients yes
