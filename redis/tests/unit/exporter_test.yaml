suite: exporter-deployment
templates:
  - templates/exporter-deployment.yaml
tests:
  - it: minimal - no exporter deployment when disabled
    values:
      - ../values-minimal.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: full - exporter deployment present
    values:
      - ../values-full-test.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].name
          value: redis-exporter

  - it: full - exporter container has allowPrivilegeEscalation false
    values:
      - ../values-full-test.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: full + auth - exporter has REDIS_PASSWORD env
    values:
      - ../values-full-test.yaml
    set:
      redis.auth.enabled: true
      redis.auth.existingSecret.name: my-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: redis-password

  - it: connectionTimeout sets REDIS_EXPORTER_CONNECTION_TIMEOUT env
    values:
      - ../values-full-test.yaml
    set:
      exporter.connectionTimeout: "30s"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_CONNECTION_TIMEOUT
            value: "30s"

  - it: logFormat json sets REDIS_EXPORTER_LOG_FORMAT env
    values:
      - ../values-full-test.yaml
    set:
      exporter.logFormat: "json"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_LOG_FORMAT
            value: "json"

  - it: default logFormat txt emits no REDIS_EXPORTER_LOG_FORMAT env
    values:
      - ../values-full-test.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_LOG_FORMAT
            value: "txt"

  - it: includeConfigMetrics true sets env
    values:
      - ../values-full-test.yaml
    set:
      exporter.includeConfigMetrics: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_INCLUDE_CONFIG_METRICS
            value: "true"

  - it: includeSystemMetrics true sets env
    values:
      - ../values-full-test.yaml
    set:
      exporter.includeSystemMetrics: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_INCL_SYSTEM_METRICS
            value: "true"

  - it: exportClientList true sets env
    values:
      - ../values-full-test.yaml
    set:
      exporter.exportClientList: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_EXPORT_CLIENT_LIST
            value: "true"

  - it: disableExporterMetrics true sets env
    values:
      - ../values-full-test.yaml
    set:
      exporter.disableExporterMetrics: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_DISABLE_EXPORTER_METRICS
            value: "true"

  - it: all metric toggles false emits none of them
    values:
      - ../values-full-test.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_INCLUDE_CONFIG_METRICS
            value: "true"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_INCL_SYSTEM_METRICS
            value: "true"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_EXPORT_CLIENT_LIST
            value: "true"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_DISABLE_EXPORTER_METRICS
            value: "true"

  - it: extraEnvVars value form is passed through to the exporter container
    values:
      - ../values-exporter-extras.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_SCRIPT
            value: /scripts/custom.lua

  - it: extraEnvVars valueFrom form is passed through to the exporter container
    values:
      - ../values-exporter-extras.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_EXPORTER_SECRET_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-extra-secret
                key: token
