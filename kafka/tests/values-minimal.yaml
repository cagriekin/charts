kafka:
  enabled: true

  image:
    repository: apache/kafka
    tag: 4.1.0
    pullPolicy: IfNotPresent

  controller:
    replicaCount: 1
    persistence:
      size: 1Gi
      storageClass: standard
    resources:
      requests:
        cpu: 100m
        memory: 500Mi
      limits:
        cpu: 200m
        memory: 1Gi
    podDisruptionBudget:
      enabled: false
    jvm:
      heapOpts: "-Xms256m -Xmx256m"
      performanceOpts: "-XX:+UseG1GC"
    affinity: {}

  broker:
    replicaCount: 1
    persistence:
      size: 1Gi
      storageClass: standard
    config:
      numPartitions: 1
      defaultReplicationFactor: 1
      minInsyncReplicas: 1
      offsetsTopicReplicationFactor: 1
      transactionStateLogReplicationFactor: 1
      transactionStateLogMinIsr: 1
      numIoThreads: 4
      numNetworkThreads: 2
      numReplicaFetchers: 1
      logRetentionHours: 168
      logRetentionBytes: -1
      logSegmentBytes: 1073741824
      logCleanupPolicy: delete
    resources:
      requests:
        cpu: 100m
        memory: 500Mi
      limits:
        cpu: 200m
        memory: 1Gi
    podDisruptionBudget:
      enabled: false
    jvm:
      heapOpts: "-Xms256m -Xmx256m"
      performanceOpts: "-XX:+UseG1GC"
    affinity: {}

  auth:
    username: testuser
    password: dGVzdHBhc3N3b3Jk

  autoCreateTopicsEnable: true
  deleteTopicEnable: true

  topics: {}

exporters:
  kafka:
    enabled: false

networkPolicy:
  enabled: false

serviceAccount:
  create: true
