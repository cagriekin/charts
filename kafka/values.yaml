fullnameOverride: ""
serviceAccount:
  create: true
  annotations: {}
  name: ""

kafka:
  enabled: true
  image:
    registry: docker.io
    repository: apache/kafka
    tag: "4.1.0"
    pullPolicy: IfNotPresent
  bootstrapServer: ""

  tls:
    enabled: false
    existingSecret: ""
    certFilename: tls.crt
    keyFilename: tls.key
    caFilename: ca.crt
    certManager:
      issuerRef:
        name: ""
        kind: ClusterIssuer
        group: cert-manager.io
      duration: 8760h
      renewBefore: 720h
      additionalDnsNames: []

  controller:
    replicaCount: 3
    logDir: /var/lib/kafka/data/kraft-controller-logs
    terminationGracePeriodSeconds: 120
    persistence:
      size: 10Gi
      storageClass: ""
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1
    jvm:
      heapOpts: "-Xms1g -Xmx1g"
      performanceOpts: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    podAnnotations: {}
    priorityClassName: ""
    nodeSelector: {}
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - kafka-controller
            topologyKey: kubernetes.io/hostname
    tolerations: []
    topologySpreadConstraints: []

  broker:
    replicaCount: 3
    logDir: /var/lib/kafka/data/kraft-broker-logs
    terminationGracePeriodSeconds: 120
    persistence:
      size: 100Gi
      storageClass: ""
    config:
      numPartitions: 3
      defaultReplicationFactor: 3
      minInsyncReplicas: 2
      offsetsTopicReplicationFactor: 3
      transactionStateLogReplicationFactor: 3
      transactionStateLogMinIsr: 2
      numIoThreads: 8
      numNetworkThreads: 3
      numReplicaFetchers: 1
      logRetentionHours: 168
      logRetentionBytes: -1
      logSegmentBytes: 1073741824
      logCleanupPolicy: delete
    extraConfig: {}
    resources:
      requests:
        cpu: "2"
        memory: 4Gi
      limits:
        cpu: "4"
        memory: 8Gi
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      readOnlyRootFilesystem: false
      capabilities:
        drop:
          - ALL
    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1
    jvm:
      heapOpts: "-Xms4g -Xmx4g"
      performanceOpts: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:InitiatingHeapOccupancyPercent=35"
    podAnnotations: {}
    priorityClassName: ""
    nodeSelector: {}
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - kafka-broker
            topologyKey: kubernetes.io/hostname
    tolerations: []
    topologySpreadConstraints: []

  auth:
    username: user1
    password: ""
    existingSecret: ""
    existingSecretKeys:
      username: username
      password: password
    sasl:
      mechanism: PLAIN
      securityProtocol: SASL_PLAINTEXT

  autoCreateTopicsEnable: false
  deleteTopicEnable: true
  topics: {}

exporters:
  kafka:
    enabled: true
    image:
      registry: docker.io
      repository: danielqsj/kafka-exporter
      tag: v1.9.0
      pullPolicy: IfNotPresent
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    nodeSelector: {}
    affinity: {}
    tolerations: []
    podAnnotations: {}
    priorityClassName: ""
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    podDisruptionBudget:
      enabled: true
      maxUnavailable: 0
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 75
      targetMemoryUtilizationPercentage: null

serviceMonitors:
  enabled: false
  labels:
    release: kube-prometheus-stack

autoscaling:
  broker:
    enabled: false
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: null

keda:
  broker:
    enabled: false
    pollingInterval: 30
    cooldownPeriod: 300
    minReplicaCount: 3
    maxReplicaCount: 10
    triggers: []

networkPolicy:
  enabled: true
  controller:
    ingress: []
    egress: []
  broker:
    ingress: []
    egress: []
  exporter:
    ingress: []
    egress: []
