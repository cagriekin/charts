{{- if .Values.kafka.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kafka.fullname" . }}-kafka-broker
  labels:
    app.kubernetes.io/name: {{ include "kafka.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: kafka-broker
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    helm.sh/chart: {{ include "kafka.chart" . }}
spec:
  replicas: {{ .Values.kafka.broker.replicaCount }}
  serviceName: {{ include "kafka.fullname" . }}-kafka-broker
  updateStrategy:
    type: OnDelete
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kafka.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: kafka-broker
  template:
    metadata:
      {{- with .Values.kafka.broker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "kafka.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: kafka-broker
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/part-of: {{ .Chart.Name }}
        helm.sh/chart: {{ include "kafka.chart" . }}
    spec:
      serviceAccountName: {{ include "kafka.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.kafka.broker.terminationGracePeriodSeconds }}
      {{- with .Values.kafka.broker.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.kafka.broker.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $brokerLogDir := .Values.kafka.broker.logDir }}
      {{- $brokerLogDirParent := dir $brokerLogDir }}
      {{- $controllerCount := int .Values.kafka.controller.replicaCount }}
      initContainers:
        {{- if .Values.kafka.tls.enabled }}
        - name: tls-init
          image: "{{ .Values.kafka.image.registry }}/{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              STORE_PASS="{{ include "kafka.tls.storePassword" . }}"

              openssl pkcs12 -export \
                -in /opt/kafka/tls-pem/{{ .Values.kafka.tls.certFilename }} \
                -inkey /opt/kafka/tls-pem/{{ .Values.kafka.tls.keyFilename }} \
                -out /opt/kafka/tls/keystore.p12 \
                -password "pass:${STORE_PASS}"

              keytool -importcert \
                -file /opt/kafka/tls-pem/{{ .Values.kafka.tls.caFilename }} \
                -keystore /opt/kafka/tls/truststore.p12 \
                -storetype PKCS12 \
                -storepass "${STORE_PASS}" \
                -noprompt -alias ca
          {{- with .Values.kafka.broker.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: kafka-tls-pem
              mountPath: /opt/kafka/tls-pem
              readOnly: true
            - name: kafka-tls
              mountPath: /opt/kafka/tls
        {{- end }}
        - name: kafka-init
          image: "{{ .Values.kafka.image.registry }}/{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              while [ ! -d "{{ $brokerLogDirParent }}" ]; do
                sleep 1
              done

              LOG_DIR="{{ $brokerLogDir }}"
              mkdir -p "${LOG_DIR}"

              # Broker node IDs start after controller IDs
              POD_ORDINAL=$(echo $POD_NAME | rev | cut -d'-' -f1 | rev)
              NODE_ID=$((POD_ORDINAL + {{ $controllerCount }} + 1))

              mkdir -p /tmp/kafka-config-init
              cp /opt/kafka/config/kraft/server-init.properties /tmp/kafka-config-init/

              sed -i "s/PLACEHOLDER_NODE_ID/$NODE_ID/g" /tmp/kafka-config-init/server-init.properties
              sed -i "s/PLACEHOLDER_POD_NAME/$POD_NAME/g" /tmp/kafka-config-init/server-init.properties

              if [ ! -f "${LOG_DIR}/meta.properties" ]; then
                /opt/kafka/bin/kafka-storage.sh format \
                  --config /tmp/kafka-config-init/server-init.properties \
                  --cluster-id {{ include "kafka.kafka.clusterId" . | quote }} \
                  --ignore-formatted
              fi
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          {{- with .Values.kafka.broker.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: kafka-data
              mountPath: "{{ $brokerLogDirParent }}"
            - name: kafka-config
              mountPath: /opt/kafka/config/kraft
            - name: kafka-secret
              mountPath: /opt/kafka/secrets
      containers:
        - name: kafka-broker
          image: "{{ .Values.kafka.image.registry }}/{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              # Broker node IDs start after controller IDs
              POD_ORDINAL=$$(echo $$POD_NAME | rev | cut -d'-' -f1 | rev)
              NODE_ID=$$(expr $$POD_ORDINAL + {{ $controllerCount }} + 1)
              export KAFKA_NODE_ID=$$NODE_ID

              SECRET_USERNAME_KEY="{{ include "kafka.auth.usernameKey" . | trim }}"
              SECRET_PASSWORD_KEY="{{ include "kafka.auth.passwordKey" . | trim }}"
              KAFKA_USERNAME=$$(cat /opt/kafka/secrets/$${SECRET_USERNAME_KEY})
              KAFKA_PASSWORD=$$(cat /opt/kafka/secrets/$${SECRET_PASSWORD_KEY})

              mkdir -p /tmp/kafka-config
              cp /opt/kafka/config/kraft/server.properties /tmp/kafka-config/

              sed -e "s|PLACEHOLDER_USERNAME|$${KAFKA_USERNAME}|g" -e "s|PLACEHOLDER_PASSWORD|$${KAFKA_PASSWORD}|g" /opt/kafka/config/kraft/kafka_server_jaas.conf.template > /tmp/kafka-config/kafka_server_jaas.conf

              sed -i "s|PLACEHOLDER_NODE_ID|$${NODE_ID}|g" /tmp/kafka-config/server.properties
              sed -i "s|PLACEHOLDER_POD_NAME|$${POD_NAME}|g" /tmp/kafka-config/server.properties

              exec /opt/kafka/bin/kafka-server-start.sh /tmp/kafka-config/server.properties
          ports:
            - name: broker
              containerPort: 9092
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: broker
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: broker
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_HEAP_OPTS
              value: {{ .Values.kafka.broker.jvm.heapOpts | quote }}
            - name: KAFKA_JVM_PERFORMANCE_OPTS
              value: {{ .Values.kafka.broker.jvm.performanceOpts | quote }}
            - name: KAFKA_OPTS
              value: "-Djava.security.auth.login.config=/tmp/kafka-config/kafka_server_jaas.conf"
          {{- with .Values.kafka.broker.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.kafka.broker.resources | nindent 12 }}
          volumeMounts:
            - name: kafka-data
              mountPath: "{{ $brokerLogDirParent }}"
            - name: kafka-config
              mountPath: /opt/kafka/config/kraft
            - name: kafka-secret
              mountPath: /opt/kafka/secrets
            {{- if .Values.kafka.tls.enabled }}
            - name: kafka-tls
              mountPath: /opt/kafka/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: kafka-config
          configMap:
            name: {{ include "kafka.fullname" . }}-kafka-broker-config
        - name: kafka-secret
          secret:
            secretName: {{ include "kafka.auth.secretName" . }}
        {{- if .Values.kafka.tls.enabled }}
        - name: kafka-tls-pem
          secret:
            secretName: {{ include "kafka.tls.secretName" . }}
        - name: kafka-tls
          emptyDir: {}
        {{- end }}
      {{- with .Values.kafka.broker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kafka.broker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kafka.broker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kafka.broker.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.kafka.broker.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.kafka.broker.persistence.size }}
{{- end }}
