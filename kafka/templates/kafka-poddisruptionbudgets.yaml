{{- if and .Values.kafka.enabled .Values.kafka.controller.podDisruptionBudget.enabled }}
{{ include "common.podDisruptionBudget" (dict
  "ctx"             .
  "component"       "kafka-controller"
  "labels"          "kafka.labels"
  "selectorLabels"  "kafka.selectorLabels"
  "maxUnavailable"  .Values.kafka.controller.podDisruptionBudget.maxUnavailable
  "minAvailable"    .Values.kafka.controller.podDisruptionBudget.minAvailable
) }}
{{- end }}
{{- if and .Values.kafka.enabled .Values.kafka.broker.podDisruptionBudget.enabled }}
---
{{ include "common.podDisruptionBudget" (dict
  "ctx"             .
  "component"       "kafka-broker"
  "labels"          "kafka.labels"
  "selectorLabels"  "kafka.selectorLabels"
  "maxUnavailable"  .Values.kafka.broker.podDisruptionBudget.maxUnavailable
  "minAvailable"    .Values.kafka.broker.podDisruptionBudget.minAvailable
) }}
{{- end }}
{{- if and .Values.exporters.kafka.enabled .Values.exporters.kafka.podDisruptionBudget.enabled }}
---
{{ include "common.podDisruptionBudget" (dict
  "ctx"             .
  "component"       "kafka-exporter"
  "labels"          "kafka.labels"
  "selectorLabels"  "kafka.selectorLabels"
  "maxUnavailable"  .Values.exporters.kafka.podDisruptionBudget.maxUnavailable
  "minAvailable"    .Values.exporters.kafka.podDisruptionBudget.minAvailable
) }}
{{- end }}
