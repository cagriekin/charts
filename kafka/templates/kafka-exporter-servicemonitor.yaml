{{- if and .Values.exporters.kafka.enabled .Values.serviceMonitors.enabled }}
{{- include "common.exporterServiceMonitor" (dict
  "ctx"             .
  "component"       "kafka-exporter"
  "labels"          "kafka.labels"
  "selectorLabels"  "kafka.selectorLabels"
  "additionalLabels" .Values.serviceMonitors.labels
  "interval"        "15s"
  "scrapeTimeout"   "10s"
  "path"            "/metrics"
) }}
{{- end }}
