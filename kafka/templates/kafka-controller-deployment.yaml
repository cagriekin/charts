{{- if .Values.kafka.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kafka.fullname" . }}-kafka-controller
  labels:
    app.kubernetes.io/name: {{ include "kafka.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: kafka-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: {{ .Chart.Name }}
    helm.sh/chart: {{ include "kafka.chart" . }}
spec:
  replicas: {{ .Values.kafka.controller.replicaCount }}
  serviceName: {{ include "kafka.fullname" . }}-kafka-controller
  updateStrategy:
    type: OnDelete
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kafka.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: kafka-controller
  template:
    metadata:
      {{- with .Values.kafka.controller.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "kafka.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: kafka-controller
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/part-of: {{ .Chart.Name }}
        helm.sh/chart: {{ include "kafka.chart" . }}
    spec:
      serviceAccountName: {{ include "kafka.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.kafka.controller.terminationGracePeriodSeconds }}
      {{- with .Values.kafka.controller.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.kafka.controller.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $controllerLogDir := .Values.kafka.controller.logDir }}
      {{- $controllerLogDirParent := dir $controllerLogDir }}
      initContainers:
        {{- if .Values.kafka.tls.enabled }}
        - name: tls-init
          image: "{{ .Values.kafka.image.registry }}/{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              STORE_PASS="{{ include "kafka.tls.storePassword" . }}"

              openssl pkcs12 -export \
                -in /opt/kafka/tls-pem/{{ .Values.kafka.tls.certFilename }} \
                -inkey /opt/kafka/tls-pem/{{ .Values.kafka.tls.keyFilename }} \
                -out /opt/kafka/tls/keystore.p12 \
                -password "pass:${STORE_PASS}"

              keytool -importcert \
                -file /opt/kafka/tls-pem/{{ .Values.kafka.tls.caFilename }} \
                -keystore /opt/kafka/tls/truststore.p12 \
                -storetype PKCS12 \
                -storepass "${STORE_PASS}" \
                -noprompt -alias ca
          {{- with .Values.kafka.controller.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: kafka-tls-pem
              mountPath: /opt/kafka/tls-pem
              readOnly: true
            - name: kafka-tls
              mountPath: /opt/kafka/tls
        {{- end }}
        - name: kafka-init
          image: "{{ .Values.kafka.image.registry }}/{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              while [ ! -d "{{ $controllerLogDirParent }}" ]; do
                sleep 1
              done

              LOG_DIR="{{ $controllerLogDir }}"
              mkdir -p "${LOG_DIR}"

              # Derive node ID from pod ordinal (controller ordinal 0 -> ID 1, etc.)
              POD_ORDINAL=$(echo $POD_NAME | rev | cut -d'-' -f1 | rev)
              NODE_ID=$((POD_ORDINAL + 1))

              if [ ! -f "${LOG_DIR}/meta.properties" ]; then
                mkdir -p /tmp/kafka-controller-config
                cp /opt/kafka/config/kraft/server.properties /tmp/kafka-controller-config/

                sed -i "s/PLACEHOLDER_NODE_ID/$NODE_ID/g" /tmp/kafka-controller-config/server.properties

                /opt/kafka/bin/kafka-storage.sh format \
                  --config /tmp/kafka-controller-config/server.properties \
                  --cluster-id {{ include "kafka.kafka.clusterId" . | quote }} \
                  --ignore-formatted
              fi
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          {{- with .Values.kafka.controller.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: kafka-data
              mountPath: "{{ $controllerLogDirParent }}"
            - name: kafka-config
              mountPath: /opt/kafka/config/kraft
      containers:
        - name: kafka-controller
          image: "{{ .Values.kafka.image.registry }}/{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              # Derive node ID from pod ordinal
              POD_ORDINAL=$$(echo $$POD_NAME | rev | cut -d'-' -f1 | rev)
              NODE_ID=$$(expr $$POD_ORDINAL + 1)
              export KAFKA_NODE_ID=$$NODE_ID

              mkdir -p /tmp/kafka-config
              cp /opt/kafka/config/kraft/server.properties /tmp/kafka-config/

              sed -i "s/PLACEHOLDER_NODE_ID/$${NODE_ID}/g" /tmp/kafka-config/server.properties

              exec /opt/kafka/bin/kafka-server-start.sh /tmp/kafka-config/server.properties
          ports:
            - name: controller
              containerPort: 9093
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: controller
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: controller
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_HEAP_OPTS
              value: {{ .Values.kafka.controller.jvm.heapOpts | quote }}
            - name: KAFKA_JVM_PERFORMANCE_OPTS
              value: {{ .Values.kafka.controller.jvm.performanceOpts | quote }}
          {{- with .Values.kafka.controller.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.kafka.controller.resources | nindent 12 }}
          volumeMounts:
            - name: kafka-data
              mountPath: "{{ $controllerLogDirParent }}"
            - name: kafka-config
              mountPath: /opt/kafka/config/kraft
            {{- if .Values.kafka.tls.enabled }}
            - name: kafka-tls
              mountPath: /opt/kafka/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: kafka-config
          configMap:
            name: {{ include "kafka.fullname" . }}-kafka-controller-config
        {{- if .Values.kafka.tls.enabled }}
        - name: kafka-tls-pem
          secret:
            secretName: {{ include "kafka.tls.secretName" . }}
        - name: kafka-tls
          emptyDir: {}
        {{- end }}
      {{- with .Values.kafka.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kafka.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kafka.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kafka.controller.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.kafka.controller.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.kafka.controller.persistence.size }}
{{- end }}
