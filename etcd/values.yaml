# Bundled etcd for the pg-ha-agent etcd DCS backend. Enabled by the parent chart
# only when repmgr.agent.dcs.backend=etcd and no external endpoints are given.
# Self-contained at the cost of 3 stateful pods; for several databases prefer one
# shared/BYO etcd (repmgr.agent.dcs.etcd.endpoints) over a bundle per release.

# etcd requires an odd member count for a stable quorum (3 tolerates one failure).
replicaCount: 3

image:
  repository: quay.io/coreos/etcd
  # etcd SERVER image. The agent's vendored CLIENT (go.etcd.io/etcd/client/v3) is
  # v3.5.31; 3.5.x client/server are wire-compatible, so the server is held here at
  # v3.5.16 (bump deliberately, with a live etcd-mode test, rather than tracking the
  # client). Keep the digest below in sync with the tag.
  tag: v3.5.16
  # Digest pin (multi-arch manifest list) takes precedence over the tag, so a
  # mutable-tag repush cannot change the bundled etcd. Refresh with:
  #   docker buildx imagetools inspect quay.io/coreos/etcd:v3.5.16
  # Set to "" to pull by tag only.
  digest: "sha256:d967d98a12dc220a1a290794711dba7eba04b8ce465e12b02383d1bfbb33e159"
  pullPolicy: IfNotPresent

# Cluster DNS domain, for building peer/client FQDNs.
clusterDomain: cluster.local

# The etcd client port the agent connects to (2379) and the peer port (2380).
clientPort: 2379
peerPort: 2380

# Transport TLS for the bundled etcd. Off by default (plaintext, isolated by the
# NetworkPolicy). Turn on for a SHARED etcd: with clientCertAuth a client that does
# not present a cert signed by ca.crt cannot connect at all -- the real access
# control across releases, where the NetworkPolicy only gates pod reachability. The
# parent agent must then connect over https with a client cert
# (repmgr.agent.dcs.etcd.tls.secretName); the parent auto-switches the bundled
# endpoint to https when this is enabled.
tls:
  enabled: false
  # Secret with the etcd SERVER cert material -- keys: tls.crt, tls.key, ca.crt
  # (a cert-manager Certificate emits exactly these; or
  # `kubectl create secret generic <name> --from-file=tls.crt --from-file=tls.key --from-file=ca.crt`).
  # Required when tls.enabled. The certificate MUST:
  #   - list SANs for the client Service (<release>-etcd, <release>-etcd.<ns>.svc.<domain>)
  #     and, when peer.enabled, the headless peer FQDNs
  #     (<release>-etcd-<0..N>.<release>-etcd-headless.<ns>.svc.<domain>), plus 127.0.0.1;
  #   - carry BOTH server-auth and client-auth usages (the health probe runs etcdctl
  #     with this cert as a client). cert-manager: `usages: [server auth, client auth]`.
  existingSecret: ""
  # Require clients to present a cert signed by ca.crt (mutual TLS). Keep on for a
  # shared store; off encrypts the transport but accepts any client.
  clientCertAuth: true
  peer:
    # Encrypt the member-to-member mesh too (recommended for a shared etcd that
    # crosses trust boundaries).
    enabled: true
    # Peer cert Secret (same tls.crt/tls.key/ca.crt layout). Defaults to
    # existingSecret when empty -- one cert covering both client and peer SANs is fine.
    existingSecret: ""

# Per-tenant key-prefix isolation via etcd RBAC. Without it, transport TLS lets any
# cert-holding client read/rewrite the WHOLE keyspace -- fine for one tenant, not for
# a shared store. With it, each tenant (pg release) gets a user (matched by its
# client-cert Common Name) and a role granting readwrite ONLY on its prefix, so one
# release cannot touch another's leadership keys. A post-install/upgrade Job creates
# the users/roles and enables auth. Requires tls.enabled + tls.clientCertAuth (auth
# is by client-cert CN -- no passwords, so the agent needs no change beyond a cert
# whose CN equals its tenant commonName below).
rbac:
  enabled: false
  # Admin client cert used by the bootstrap Job to manage auth (and to re-authenticate
  # after auth is enabled). Its CN MUST be "root" -- etcd's reserved superuser, which
  # `auth enable` requires. Secret keys: tls.crt, tls.key, ca.crt. Required when
  # rbac.enabled.
  adminSecret: ""
  # The bootstrap Job runs `pg-ha-agent rbac-bootstrap`, which drives the etcd Auth
  # API via the Go client -- the bundled etcd image is distroless (no shell; it ships
  # etcd + etcdctl only), so the Job uses the pg-ha-agent (repmgr) image instead. Keep
  # the tag in lockstep with the pg/pgvector repmgr image when sharing one etcd.
  bootstrapImage:
    repository: cagriekin/repmgr
    tag: trixie-5.5.0-22
    digest: ""
    pullPolicy: IfNotPresent
  # Resources for the short-lived bootstrap Job container.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Per-tenant grants. commonName MUST equal the CN in that release's agent client
  # cert; prefix MUST equal that release's ETCD_PREFIX (default /pg-ha/<release>/).
  # NOTE: `etcdctl auth enable` is cluster-global and (re)applies on every upgrade;
  # removing a tenant here does NOT revoke it -- delete the user manually.
  tenants: []
  #  - commonName: backend-pg
  #    prefix: /pg-ha/backend/
  #  - commonName: sentry-pg
  #    prefix: /pg-ha/sentry/

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

persistence:
  # NOTE: the hardened securityContext below runs etcd as uid 1000 with a read-only
  # root filesystem, so the data PVC is the only writable path. fsGroup (in
  # podSecurityContext) makes a freshly-provisioned PVC group-writable by that uid;
  # a CSI driver that IGNORES fsGroup (some NFS/hostPath provisioners) will leave the
  # PVC root-owned and etcd will crashloop ("cannot access data directory"). Use a
  # CSI driver that honors fsGroup, or relax the securityContext for such drivers.
  enabled: true
  size: 2Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

# Spread the members across nodes so one node loss cannot break quorum. Empty here
# means the StatefulSet emits a DEFAULT soft (ScheduleAnyway) hostname spread, so
# members prefer distinct nodes but still schedule on a single-node/kind cluster.
# Set this to override (e.g. a hard zone spread with whenUnsatisfiable: DoNotSchedule).
topologySpreadConstraints: []
affinity: {}
nodeSelector: {}
tolerations: []

# Ingress NetworkPolicy for the etcd pods. Bundled etcd runs PLAINTEXT, so without
# this any pod in the namespace could read/rewrite the leadership keyspace. Default
# on; takes effect only on a NetworkPolicy-enforcing CNI. Allows the etcd peer mesh
# and the agent (the parent's postgresql pods, this release) on the client port.
networkPolicy:
  enabled: true
  # Cross-namespace client allow-list for a shared/standalone etcd. The built-in
  # client rule above only admits THIS release's postgresql pods, which do not exist
  # when etcd is deployed on its own for several pg releases to share. Each entry
  # opens the client port (2379) from one namespace; podSelector is optional and
  # defaults to the agent's postgresql component label. Prefer this over hand-written
  # extraIngress selectors. Example:
  #   allowedClients:
  #     - namespace: backend
  #     - namespace: sentry
  #       podSelector: { app.kubernetes.io/component: postgresql }
  # SECURITY: this etcd is PLAINTEXT with no client auth, so the NetworkPolicy is the
  # ONLY access control over the leadership keyspace. The default podSelector matches
  # ANY pod carrying app.kubernetes.io/component=postgresql in the listed namespace
  # (a label other PostgreSQL charts also set) -- so a foreign or attacker-deployed pod
  # in that namespace can reach it. For a shared etcd, set an explicit podSelector that
  # also pins app.kubernetes.io/instance (per consuming release), and prefer client
  # TLS + per-tenant RBAC (tls.enabled + rbac.enabled above) over relying on the
  # NetworkPolicy alone.
  allowedClients: []
  # Extra ingress rules to the client port (e.g. a Prometheus scrape of etcd
  # metrics, or an external etcdctl). Standard NetworkPolicy ingress entries.
  extraIngress: []

# Hardened by default, matching the parent chart (runAsNonRoot, drop ALL caps).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# By default the bundled etcd runs plaintext within the pod network, isolated by the
# NetworkPolicy (the parent opens egress to 2379 in etcd mode); the leadership data
# is non-secret (pod names + a key prefix). For a shared/standalone store that crosses
# trust boundaries, enable transport TLS above (tls.enabled) so only cert-holding
# clients can connect, plus per-tenant key-prefix isolation (rbac.enabled) so one
# release cannot read or rewrite another's leadership keys.

commonLabels: {}
commonAnnotations: {}
