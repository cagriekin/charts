apiVersion: v1
kind: Service
metadata:
  name: {{ include "etcd.fullname" . }}-headless
  labels:
    {{- include "etcd.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  clusterIP: None
  # peers must resolve each other (and the agent's client conns) before the pods are
  # Ready, or static bootstrap deadlocks.
  publishNotReadyAddresses: true
  ports:
    - name: client
      port: {{ .Values.clientPort }}
      targetPort: client
      protocol: TCP
    - name: peer
      port: {{ .Values.peerPort }}
      targetPort: peer
      protocol: TCP
  selector:
    {{- include "etcd.selectorLabels" . | nindent 4 }}
