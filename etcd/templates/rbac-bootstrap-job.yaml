{{- if .Values.rbac.enabled }}
{{- $full := include "etcd.fullname" . -}}
{{- if not .Values.tls.enabled }}{{ fail "etcd: rbac.enabled requires tls.enabled (auth is by client-cert Common Name)" }}{{- end }}
{{- if not .Values.tls.clientCertAuth }}{{ fail "etcd: rbac.enabled requires tls.clientCertAuth=true (the CN is the authenticated user)" }}{{- end }}
{{- if not .Values.rbac.adminSecret }}{{ fail "etcd: rbac.enabled requires rbac.adminSecret (a client cert whose CN is root)" }}{{- end }}
{{- if not .Values.rbac.tenants }}{{ fail "etcd: rbac.enabled requires at least one rbac.tenants entry -- enabling auth with no tenant user would lock every CN-authenticated agent out of the keyspace" }}{{- end }}
{{- $img := .Values.rbac.bootstrapImage -}}
{{- if not $img.repository }}{{ fail "etcd: rbac.bootstrapImage.repository is required (the pg-ha-agent image; it runs `pg-ha-agent rbac-bootstrap`)" }}{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $full }}-rbac-bootstrap
  labels:
    {{- include "etcd.labels" . | nindent 4 }}
  annotations:
    # Run after the cluster is up on install AND upgrade; the bootstrap is idempotent
    # (existence-checked + auth-enable guarded), so re-running reconciles the tenants.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "etcd.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: rbac-bootstrap
          # The bundled etcd image is distroless (no shell -- it ships etcd + etcdctl
          # only), so the bootstrap runs in the pg-ha-agent image and drives the etcd
          # Auth API via the Go client (the same mTLS client the agent uses).
          image: "{{ $img.repository }}:{{ $img.tag }}{{ with $img.digest }}@{{ . }}{{ end }}"
          imagePullPolicy: {{ $img.pullPolicy | default "IfNotPresent" }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.rbac.resources | nindent 12 }}
          command: ["/usr/local/bin/pg-ha-agent", "rbac-bootstrap"]
          env:
            - name: ETCD_ENDPOINTS
              value: "https://{{ $full }}:{{ .Values.clientPort }}"
            - name: ETCD_TLS_CERT
              value: /admin-tls/tls.crt
            - name: ETCD_TLS_KEY
              value: /admin-tls/tls.key
            - name: ETCD_TLS_CA
              value: /admin-tls/ca.crt
            # etcd's reserved superuser is literally "root"; AuthEnable requires it,
            # so the admin cert's CN must be "root".
            - name: ETCD_RBAC_ROOT_CN
              value: "root"
            - name: ETCD_RBAC_TENANTS
              value: {{ .Values.rbac.tenants | toJson | quote }}
          volumeMounts:
            - name: admin-tls
              mountPath: /admin-tls
              readOnly: true
      volumes:
        - name: admin-tls
          secret:
            secretName: {{ .Values.rbac.adminSecret | quote }}
{{- end }}
