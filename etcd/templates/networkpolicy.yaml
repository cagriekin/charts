{{- if .Values.networkPolicy.enabled }}
{{- /*
Bundled etcd is plaintext (no TLS/auth), so its keyspace is the leadership store
for the whole cluster. Without this policy any pod in the namespace could reach
2379 and rewrite/wipe leadership keys. Lock ingress to the etcd peer mesh and the
agent (the parent's postgresql pods of this release); lock egress to DNS + the peer
mesh. Takes effect only on a NetworkPolicy-enforcing CNI.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "etcd.fullname" . }}
  labels:
    {{- include "etcd.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "etcd.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # etcd peer mesh: members reach each other on the peer and client ports.
    - from:
        - podSelector:
            matchLabels:
              {{- include "etcd.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.peerPort }}
          protocol: TCP
        - port: {{ .Values.clientPort }}
          protocol: TCP
    # the pg-ha-agent (the parent's postgresql pods, same release) on the client port.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: postgresql
      ports:
        - port: {{ .Values.clientPort }}
          protocol: TCP
    {{- with .Values.networkPolicy.allowedClients }}
    # shared/standalone etcd: explicitly allow-listed clients in other namespaces.
    # Each entry opens the client port from one namespace; podSelector is optional
    # and defaults to the agent's postgresql component label.
    - from:
        {{- range . }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .namespace | required "etcd networkPolicy.allowedClients[].namespace is required" }}
          podSelector:
            matchLabels:
              {{- with .podSelector }}
              {{- toYaml . | nindent 14 }}
              {{- else }}
              app.kubernetes.io/component: postgresql
              {{- end }}
        {{- end }}
      ports:
        - port: {{ $.Values.clientPort }}
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # DNS, to resolve peer FQDNs.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # peer mesh egress to the other members.
    - to:
        - podSelector:
            matchLabels:
              {{- include "etcd.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.peerPort }}
          protocol: TCP
        - port: {{ .Values.clientPort }}
          protocol: TCP
{{- end }}
